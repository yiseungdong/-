<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아바타 꾸미기 — ASTERIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --void:#020a18; --panel:rgba(5,12,30,0.96);
  --border:rgba(200,175,80,0.13); --gold:#f0c040;
  --accent:#4a90d9; --accent2:#2c6fbd; --accent3:#f0c040;
  --text:#e8ecf4; --muted:rgba(160,180,210,0.5);
  --league-color: #94a3b8;
}
html,body {
  width:100%; min-height:100%;
  background:var(--void); color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  -webkit-tap-highlight-color:transparent;
  user-select:none; overflow-x:hidden;
}
#app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; }


/* ══════════════════════
   TOP BAR
══════════════════════ */
.topbar {
  position:sticky; top:44px; z-index:200;
  display:flex; align-items:center; gap:10px; padding:13px 18px;
  background:var(--panel); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.tb-title { font-family:'Orbitron',monospace; font-size:14px; font-weight:700;
  letter-spacing:2px; flex:1; }
.tb-save {
  padding:8px 18px; border-radius:20px; border:none;
  background:linear-gradient(90deg,var(--gold),#e6a800);
  color:var(--void); font-size:13px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s;
}
.tb-save:hover { box-shadow:0 0 16px rgba(240,192,64,.5); }

/* ══════════════════════
   AVATAR PREVIEW
══════════════════════ */
.preview-section {
  position:relative; z-index:10;
  height:380px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
}
.preview-bg {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 40%, rgba(192,132,252,.15) 0%, transparent 65%);
  transition:background 1s ease;
}

/* 아바타 컨테이너 */
#avatarContainer {
  position:relative; z-index:5;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}

/* 아바타 이름 & 등급 */
.preview-info { position:relative; z-index:5; text-align:center; margin-top:10px; }
.preview-name { font-size:17px; font-weight:900; }
.preview-league {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:5px; padding:3px 14px; border-radius:20px;
  font-size:11px; font-weight:700;
  border:1px solid var(--league-color);
  background:rgba(var(--league-rgb,148,163,184),.1);
  color:var(--league-color);
}

/* 자동성장 표시 */
.auto-growth-bar {
  position:relative; z-index:5;
  width:calc(100% - 40px); margin-top:14px;
}
.agb-row { display:flex; justify-content:space-between; margin-bottom:5px; }
.agb-label { font-size:10px; color:var(--muted); }
.agb-val { font-size:10px; color:var(--gold); font-weight:700; }
.agb-bg { width:100%; height:6px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
.agb-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--gold));
  transition:width 1s cubic-bezier(.4,0,.2,1); position:relative; overflow:hidden; }
.agb-fill::after { content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  animation:shine 2s ease-in-out infinite; }
@keyframes shine { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
@keyframes auraPulse {
  0%,100% { transform:scale(1); opacity:0.7; }
  50% { transform:scale(1.1); opacity:1; }
}

/* ══════════════════════
   TAB 네비게이션
══════════════════════ */
.tab-nav {
  position:sticky; top:60px; z-index:190;
  display:flex; background:var(--panel); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border); overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.tab-nav::-webkit-scrollbar { display:none; }
.tab-btn {
  flex-shrink:0; padding:12px 16px;
  font-size:12px; font-weight:600; color:var(--muted);
  cursor:pointer; border-bottom:2px solid transparent;
  transition:all .2s; white-space:nowrap;
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-btn-icon { font-size:16px; }

/* ══════════════════════
   탭 컨텐츠
══════════════════════ */
.tab-content { display:none; padding:16px 18px; position:relative; z-index:10; background:transparent; }
.tab-content.active { display:block; background:transparent; min-height:200px; }

/* 섹션 타이틀 */
.sec-title {
  font-size:10px; color:var(--muted); letter-spacing:2px;
  text-transform:uppercase; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ══════════════════════
   얼굴형 / 피부색 탭
══════════════════════ */
.face-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.face-item {
  aspect-ratio:1; border-radius:14px;
  background:rgba(255,255,255,0.08); border:2px solid rgba(180,150,255,0.25);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s; gap:5px;
}
.face-item:hover { border-color:var(--accent); background:rgba(192,132,252,.08); }
.face-item.active { border-color:var(--accent); background:rgba(192,132,252,.12);
  box-shadow:0 0 12px rgba(192,132,252,.3); }
.face-item-emoji { font-size:28px; }
.face-item-label { font-size:9px; color:var(--muted); }

/* 피부색 팔레트 */
.skin-palette { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
.skin-swatch {
  width:40px; height:40px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:all .2s;
}
.skin-swatch:hover { transform:scale(1.1); }
.skin-swatch.active { border-color:#fff; box-shadow:0 0 10px rgba(255,255,255,.4); }

/* ══════════════════════
   헤어 탭
══════════════════════ */
.hair-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.hair-item {
  border-radius:14px; background:rgba(255,255,255,0.08); border:2px solid rgba(180,150,255,0.25);
  padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
}
.hair-item:hover { border-color:var(--accent); }
.hair-item.active { border-color:var(--accent); background:rgba(192,132,252,.1); }
.hair-item-img { font-size:32px; }
.hair-item-name { font-size:10px; color:var(--muted); text-align:center; }
.hair-item-lock { position:absolute; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center; border-radius:12px; font-size:20px; }

/* 헤어 컬러 */
.hair-colors { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.hair-color {
  width:36px; height:36px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:all .2s;
}
.hair-color:hover { transform:scale(1.1); }
.hair-color.active { border-color:#fff; box-shadow:0 0 10px rgba(255,255,255,.4); }

/* ══════════════════════
   의상 탭
══════════════════════ */
.outfit-tabs { display:flex; gap:8px; margin-bottom:14px; }
.outfit-tab {
  padding:6px 14px; border-radius:20px; font-size:11px; font-weight:600;
  border:1px solid var(--border); background:transparent; color:var(--muted);
  cursor:pointer; transition:all .2s; font-family:'Noto Sans KR',sans-serif;
}
.outfit-tab.active { background:rgba(192,132,252,.15); border-color:var(--accent); color:var(--accent); }
.outfit-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.outfit-item {
  border-radius:14px; background:rgba(255,255,255,0.08); border:2px solid rgba(180,150,255,0.25);
  padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; transition:all .2s; position:relative;
}
.outfit-item:hover { border-color:var(--accent); }
.outfit-item.active { border-color:var(--accent); background:rgba(192,132,252,.1); }
.outfit-item.equipped { border-color:var(--gold); background:rgba(240,192,64,.06); }
.outfit-emoji { font-size:30px; }
.outfit-name { font-size:10px; color:var(--muted); text-align:center; line-height:1.3; }
.outfit-rarity { font-size:9px; font-weight:700; }
.outfit-new { position:absolute; top:4px; right:4px;
  background:#ef4444; color:#fff; font-size:8px; font-weight:900;
  padding:2px 5px; border-radius:4px; }
.outfit-equipped { position:absolute; top:4px; left:4px;
  background:var(--gold); color:var(--void); font-size:8px; font-weight:900;
  padding:2px 5px; border-radius:4px; }
.outfit-lock { position:absolute; inset:0; background:rgba(0,0,0,.6);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-radius:12px; font-size:18px; gap:3px; }
.outfit-lock-txt { font-size:9px; color:var(--muted); text-align:center; padding:0 4px; }

/* ══════════════════════
   아우라 탭
══════════════════════ */
.aura-league-info {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.ali-icon { font-size:28px; }
.ali-info { flex:1; }
.ali-title { font-size:13px; font-weight:700; }
.ali-desc { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.5; }
.ali-auto { font-size:10px; color:var(--gold); margin-top:4px; font-weight:600; }

.aura-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.aura-item {
  border-radius:14px; background:rgba(255,255,255,0.08); border:2px solid rgba(180,150,255,0.25);
  padding:16px 12px; display:flex; flex-direction:column; align-items:center; gap:8px;
  cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
}
.aura-item:hover { border-color:var(--accent); }
.aura-item.active { border-color:var(--accent); background:rgba(192,132,252,.1); }
.aura-item.league-locked { opacity:.5; }
.aura-preview {
  width:60px; height:60px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:26px;
  position:relative;
}
.aura-ring {
  position:absolute; inset:-6px; border-radius:50%;
  border:2px solid transparent; animation:auraRing 4s linear infinite;
}
@keyframes auraRing { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.aura-name { font-size:12px; font-weight:700; text-align:center; }
.aura-desc { font-size:10px; color:var(--muted); text-align:center; line-height:1.4; }
.aura-league-req {
  font-size:9px; font-weight:700; padding:2px 8px; border-radius:10px; margin-top:2px;
}
.aura-lock { position:absolute; top:8px; right:8px; font-size:14px; }

/* ══════════════════════
   액세서리 탭
══════════════════════ */
.acc-category { font-size:11px; color:var(--muted); font-weight:600;
  margin-bottom:10px; margin-top:16px; letter-spacing:1px; }
.acc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px; }
.acc-item {
  aspect-ratio:1; border-radius:12px; background:rgba(255,255,255,0.08);
  border:2px solid rgba(180,150,255,0.25); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
  cursor:pointer; transition:all .2s; position:relative;
}
.acc-item:hover { border-color:var(--accent); }
.acc-item.active { border-color:var(--accent); background:rgba(192,132,252,.1); }
.acc-item.equipped { border-color:var(--gold); }
.acc-emoji { font-size:22px; }
.acc-name { font-size:8px; color:var(--muted); text-align:center; }
.acc-lock { position:absolute; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center; border-radius:10px; font-size:16px; }

/* ══════════════════════
   표정/모션 탭
══════════════════════ */
.emotion-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.emotion-item {
  border-radius:12px; background:rgba(255,255,255,0.08); border:2px solid rgba(180,150,255,0.25);
  padding:10px 6px; display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer; transition:all .2s;
}
.emotion-item:hover { border-color:var(--accent); }
.emotion-item.active { border-color:var(--accent); background:rgba(192,132,252,.1); }
.emotion-emoji { font-size:24px; }
.emotion-name { font-size:9px; color:var(--muted); text-align:center; }
.motion-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.motion-item {
  border-radius:12px; background:rgba(255,255,255,0.08); border:2px solid rgba(180,150,255,0.25);
  padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer; transition:all .2s; position:relative;
}
.motion-item:hover { border-color:var(--accent); }
.motion-item.active { border-color:var(--accent); background:rgba(192,132,252,.1); }
.motion-emoji { font-size:26px; }
.motion-name { font-size:9px; color:var(--muted); text-align:center; }
.motion-lock { position:absolute; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center; border-radius:10px; font-size:18px; }

/* ══════════════════════
   자동성장 현황 탭
══════════════════════ */
.growth-card {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:16px; padding:16px; margin-bottom:12px;
}
.gc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.gc-title { font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
.gc-pct { font-family:'Orbitron',monospace; font-size:16px; font-weight:900; color:var(--gold); }
.gc-bar-bg { width:100%; height:8px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden; margin-bottom:10px; }
.gc-bar-fill { height:100%; border-radius:4px; transition:width 1s; position:relative; overflow:hidden; }
.gc-bar-fill::after { content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shine 2s ease-in-out infinite; }
.gc-next { font-size:11px; color:var(--muted); }
.gc-next span { color:var(--accent); font-weight:700; }

.growth-timeline { display:flex; flex-direction:column; gap:10px; }
.gt-item {
  display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px;
}
.gt-icon { font-size:20px; width:32px; text-align:center; flex-shrink:0; }
.gt-info { flex:1; }
.gt-name { font-size:12px; font-weight:600; }
.gt-desc { font-size:10px; color:var(--muted); margin-top:2px; }
.gt-reward { font-size:10px; color:var(--accent); font-weight:700; flex-shrink:0; }
.gt-done { width:22px; height:22px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
.gt-pending { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; }

/* ══════════════════════
   BOTTOM NAV
══════════════════════ */






/* TOAST */
.toast { position:fixed; bottom:85px; left:50%; transform:translateX(-50%);
  background:rgba(12,12,26,.97); border:1px solid var(--border);
  border-radius:12px; padding:11px 22px; font-size:13px;
  z-index:8000; opacity:0; transition:opacity .3s; pointer-events:none;
  white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,.5); }
.toast.show { opacity:1; }

/* 파티클 */
.particle { position:fixed; pointer-events:none; z-index:9998; border-radius:50%; }

.spacer { height:90px; }

/* ── 상단 네비게이션 ── */
.top-nav {
  position:fixed; top:0; left:0; right:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  gap:28px;
  height:44px;
  background:rgba(10,10,22,0.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(180,150,255,0.13);
}
.top-nav-item {
  font-size:12px; font-weight:500; color:rgba(200,190,220,0.45);
  text-decoration:none;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:0.5px;
  padding:4px 2px;
  border-bottom:2px solid transparent;
}
.top-nav-item:hover { color:#e8e4f0; }
.top-nav-item.active {
  color:#c084fc; border-bottom-color:#c084fc;
}


/* ══════════════════════════
   우주 별빛 배경
══════════════════════════ */
#starCanvas {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  width:100%; height:100%;
}
</style>
</head>
<body style="padding-top:44px">

<nav class="top-nav">
  <a class="top-nav-item" href="/index.html">홈</a>
  <a class="top-nav-item" href="/fandom.html">팬덤</a>
  <a class="top-nav-item" href="/astra.html">아스트라</a>
  <a class="top-nav-item" href="/room3d.html">내방</a>
  <a class="top-nav-item active" href="/avatar.html">아바타</a>
  <a class="top-nav-item" href="/shop.html">상점</a>
</nav>

<canvas id="starCanvas"></canvas>

<div id="toast" class="toast"></div>

<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-title">아바타 꾸미기</div>
    <button class="tb-save" onclick="saveAvatar()">저장 ✦</button>
  </div>

  <!-- 아바타 프리뷰 -->
  <div class="preview-section">
    <div class="preview-bg" id="previewBg"></div>
    <div id="avatarContainer" style="width:180px;height:225px;position:relative;margin:20px auto 0;cursor:pointer">
      <div id="layer-aura"   style="position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;pointer-events:none"></div>
      <div id="layer-body"   style="position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none"></div>
      <div id="layer-bottom" style="position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;pointer-events:none"></div>
      <div id="layer-top"    style="position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;pointer-events:none"></div>
      <div id="layer-hair"   style="position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none"></div>
      <div id="layer-acc"    style="position:absolute;inset:0;z-index:6;pointer-events:none"></div>
    </div>
    <div class="preview-info">
      <div class="preview-name" id="previewName">별빛 탐험가</div>
      <div id="previewSerial" style="font-size:11px;letter-spacing:2px;margin-top:2px;margin-bottom:2px;opacity:0.9;"></div>
      <div class="preview-league" id="previewLeague">✨ 더스트 리그</div>
    </div>
    <div class="auto-growth-bar">
      <div class="agb-row">
        <div class="agb-label">자동 성장 진행도</div>
        <div class="agb-val" id="growthPct">47%</div>
      </div>
      <div class="agb-bg">
        <div class="agb-fill" id="growthFill" style="width:47%"></div>
      </div>
    </div>
  </div>

  <!-- TAB NAV -->
  <div class="tab-nav" id="tabNav">
    <div class="tab-btn active" onclick="switchTab('face',this)">
      <div class="tab-btn-icon">👤</div>캐릭터
    </div>
    <div class="tab-btn" onclick="switchTab('hair',this)">
      <div class="tab-btn-icon">💇</div>헤어
    </div>
    <div class="tab-btn" onclick="switchTab('outfit',this)">
      <div class="tab-btn-icon">👔</div>의상
    </div>
    <div class="tab-btn" onclick="switchTab('aura',this)">
      <div class="tab-btn-icon">✨</div>아우라
    </div>
    <div class="tab-btn" onclick="switchTab('acc',this)">
      <div class="tab-btn-icon">👑</div>악세서리
    </div>
    <div class="tab-btn" onclick="switchTab('emotion',this)">

function renderAvatarLayers(){
  const base = avatar.face || localStorage.getItem('asteria_avatar_base') || 'm1';
  const aura = AURAS.find(a=>a.id===avatar.aura) || AURAS[0];

  // 캐릭터별 원본 색상 매핑 (헤어/의상/피부)
  var COLOR_MAP = {
    'm1': { hair:'#1a1a1a', outfit:'#1e40af', skin:'#FDBCB4' },
    'm2': { hair:'#4c1d95', outfit:'#1a1a2e', skin:'#f0d0c0' },
    'm3': { hair:'#78350f', outfit:'#fbbf24', skin:'#f4a76f' },
    'f1': { hair:'#f472b6', outfit:'#fce7f3', skin:'#FDBCB4' },
    'f2': { hair:'#7dd3fc', outfit:'#e0f2fe', skin:'#fde8d8' },
    'f3': { hair:'#e2e8f0', outfit:'#4c1d95', skin:'#f0e0d0' }
  };

  document.getElementById('layer-aura').innerHTML = '<div style="width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,'+aura.color+'35 0%,transparent 70%);animation:auraPulse 3s ease-in-out infinite;box-shadow:0 0 50px '+aura.color+'30"></div>';

  var styledSvg = getBaseSVG(base);
  var map = COLOR_MAP[base] || COLOR_MAP['m1'];

  // 헤어 색상 교체
  if(avatar.hairColor && avatar.hairColor.toLowerCase() !== map.hair.toLowerCase()) {
    styledSvg = styledSvg.split('fill="' + map.hair + '"').join('fill="' + avatar.hairColor + '"');
  }
  // 의상 색상 교체
  if(avatar.outfitColor && avatar.outfitColor.toLowerCase() !== map.outfit.toLowerCase()) {
    styledSvg = styledSvg.split('fill="' + map.outfit + '"').join('fill="' + avatar.outfitColor + '"');
  }
  // 피부색 교체
  if(avatar.skin && avatar.skin.toLowerCase() !== map.skin.toLowerCase()) {
    styledSvg = styledSvg.split('fill="' + map.skin + '"').join('fill="' + avatar.skin + '"');
  }

  document.getElementById('layer-body').innerHTML = styledSvg;
  document.getElementById('layer-top').innerHTML = '';
  document.getElementById('layer-bottom').innerHTML = '';
  document.getElementById('layer-hair').innerHTML = '';
  document.getElementById('layer-acc').innerHTML = '';
}

  const leagueOrder=['dust','star','planet','nova','quasar'];

  document.getElementById('auraGrid').innerHTML=AURAS.map(a=>{
    const reqIdx=leagueOrder.indexOf(a.req);

    return `
      <div class="aura-item ${avatar.aura===a.id?'active':''} ${locked?'league-locked':''}"

function selectFace(id){
  const f=FACES.find(x=>x.id===id);
  if(!f||!f.unlocked){showToast(`🔒 ${f?.req||''} 달성 시 해금!`);return;}
  avatar.face=id;
  // 선택 즉시 localStorage 반영 (다른 페이지 실시간 연동)
  localStorage.setItem('asteria_avatar_base', id);
  renderFace(); renderAvatarLayers(); burst(); showToast('얼굴형 변경!');
}
function selectSkin(color){
  avatar.skin=color;
  localStorage.setItem('asteria_avatar_skin', color);
  renderFace(); renderAvatarLayers(); burst(); showToast('피부색 변경!');
}
function selectHair(id){
  const h=HAIRS.find(x=>x.id===id);
  if(!h||!h.unlocked){showToast(`🔒 ${h.req} 달성 시 해금!`);return;}
  avatar.hair=id; renderHair(); renderAvatarLayers(); burst(); showToast('헤어스타일 변경!');
}
function selectHairColor(color){
  avatar.hairColor=color;
  localStorage.setItem('asteria_avatar_hairColor', color);
  renderHair(); renderAvatarLayers(); burst(); showToast('헤어 컬러 변경!');
}
function selectOutfitColor(color){
  avatar.outfitColor=color;
  localStorage.setItem('asteria_avatar_outfitColor', color);
  renderOutfitColors(); renderAvatarLayers(); burst(); showToast('의상 컬러 변경!');
}
function renderOutfitColors(){
  var el = document.getElementById('outfitColors');
  if(!el) return;
  el.innerHTML=OUTFIT_COLORS.map(c=>
    '<div class="hair-color '+(avatar.outfitColor===c?'active':'')+'" style="background:'+c+';border:1px solid rgba(255,255,255,.1)" onclick="selectOutfitColor(\''+c+'\')"></div>'
  ).join('');
}
function selectOutfit(type,id){
  const o=(OUTFITS[type]||[]).find(x=>x.id===id);
  if(!o||!o.unlocked){showToast(`🔒 ${o.req} 달성 시 해금!`);return;}
  // 착용중 업데이트
  (OUTFITS[type]||[]).forEach(x=>x.equipped=false);
  o.equipped=true;
  avatar['outfit_'+type]=id;
  renderOutfit(type); renderAvatarLayers(); burst(); showToast(`${o.emoji} ${o.name} 착용!`);
}
function selectAura(id){
  avatar.aura=id; renderAura(); renderAvatarLayers(); burst();
  const a=AURAS.find(x=>x.id===id);
  showToast(`✨ ${a.name} 적용!`);
  updateLeagueColor();
}
function selectAcc(type,id){
  const items=ACCESSORIES[type]||[];
  const a=items.find(x=>x.id===id);
  if(!a||!a.unlocked){showToast(`🔒 ${a.req} 달성 시 해금!`);return;}
  // 토글 (같은 거 클릭하면 해제)
  avatar['acc_'+type] = avatar['acc_'+type]===id ? null : id;
  renderAcc(); renderAvatarLayers(); burst();
  showToast(avatar['acc_'+type]?`${a.emoji} ${a.name} 장착!`:`${a.emoji} 해제`);
}
function selectEmotion(id){
  const e=EMOTIONS.find(x=>x.id===id);
  if(!e||!e.unlocked){showToast(`🔒 ${e.req} 달성 시 해금!`);return;}
  avatar.emotion=id; renderEmotion(); renderAvatarLayers(); burst();
  showToast(`${e.emoji} 표정 변경!`);
}
function selectMotion(id){
  const m=MOTIONS.find(x=>x.id===id);
  if(!m||!m.unlocked){showToast(`🔒 ${m.req} 달성 시 해금!`);return;}
  avatar.motion=id; renderEmotion(); renderAvatarLayers(); burst();
  showToast(`${m.emoji} 모션 변경!`);
}

function switchTab(name, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='face') renderFace();
  if(name==='hair') renderHair();
  if(name==='outfit') { renderOutfit(); renderOutfitColors(); }
  if(name==='aura') renderAura();
  if(name==='acc') renderAcc();
  if(name==='emotion') renderEmotion();
}

function updateLeagueColor(){
  const league=LEAGUES.find(l=>l.id===avatar.league)||LEAGUES[0];
  document.documentElement.style.setProperty('--league-color',league.color);
  document.documentElement.style.setProperty('--league-rgb',league.rgb);
  document.getElementById('previewLeague').textContent=`${league.icon} ${league.name} 리그`;
  document.getElementById('previewBg').style.background=
    `radial-gradient(ellipse at 50% 40%, rgba(${league.rgb},.2) 0%, transparent 65%)`;
}

// 리그 변경 테스트 (키보드 1~5)
document.addEventListener('keydown',e=>{
  const l=['dust','star','planet','nova','quasar'];
  const idx=parseInt(e.key)-1;
  if(idx>=0&&idx<5){
    avatar.league=l[idx];
    avatar.aura='a'+(idx+1);
    updateLeagueColor();
    renderAura();
    showToast(`${LEAGUES[idx].icon} ${LEAGUES[idx].name} 리그로 변경 (테스트)`);
  }
});

// ════════════════════════════════════
// SAVE
// ════════════════════════════════════
function saveAvatar(){
  if(avatar.face) localStorage.setItem('asteria_avatar_base', avatar.face);
  localStorage.setItem('asteria_avatar', JSON.stringify(avatar));
  if (typeof BroadcastChannel !== 'undefined') {
    const ch = new BroadcastChannel('asteria_avatar_sync');
    ch.postMessage({ type: 'AVATAR_UPDATED', base: avatar.face || 'm1', hairColor: avatar.hairColor || '', outfitColor: avatar.outfitColor || '' });
    ch.close();
  }
  burst(); showToast('✨ 아바타가 저장됐어요!');
}

// ════════════════════════════════════
// PARTICLES
// ════════════════════════════════════
function burst(){
  const cx=window.innerWidth/2, cy=220;
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    const colors=['#f0c040','#c084fc','#38bdf8','#fff'];
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=Math.random()*5+2;
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*60+20;
    p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color};z-index:9999;pointer-events:none;transition:all ${.4+Math.random()*.3}s ease-out;transform:translate(-50%,-50%)`;
    document.body.appendChild(p);
    requestAnimationFrame(()=>{
      p.style.transform=`translate(calc(-50% + ${Math.cos(angle)*dist}px),calc(-50% + ${Math.sin(angle)*dist}px))`;
      p.style.opacity='0';
    });
    setTimeout(()=>p.remove(),800);
  }
}

function showToast(msg){

}

<script>
/* ══════════════════════════
   별빛 배경 스크립트
══════════════════════════ */
(function() {
  const canvas = document.getElementById('starCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 별 생성 — 크기 다양하게
  const STARS = Array.from({length: 280}, () => {
    const size = Math.random();
    return {
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      // 작은 별(70%), 중간 별(20%), 큰 별(10%)
      r: size < 0.7 ? Math.random() * 0.8 + 0.3
       : size < 0.9 ? Math.random() * 1.2 + 1.0
       :               Math.random() * 2.0 + 2.0,
      // 밝기 & 반짝임 속도
      brightness: Math.random() * 0.5 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.008 + 0.002,
      // 별 색상 — 대부분 흰색, 간혹 색깔 별
      color: Math.random() < 0.08 ? '#f0c040'   // 황금별
           : Math.random() < 0.06 ? '#c084fc'   // 보라별
           : Math.random() < 0.04 ? '#38bdf8'   // 파란별
           : '#ffffff',
      // 큰 별은 십자 모양
      isBig: size >= 0.9,
      // 유성 여부
      isShooting: false,
      shootX: 0, shootY: 0, shootLen: 0, shootOpacity: 0,
    };
  });

  // 유성 풀
  const METEORS = Array.from({length: 3}, () => ({
    active: false, x: 0, y: 0, vx: 0, vy: 0,
    len: 0, opacity: 0, timer: Math.random() * 300,
  }));

  function drawStar(star, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;

    if(star.isBig) {
      // 큰 별 — 십자 광채
      const grd = ctx.createRadialGradient(star.x % W, star.y % H, 0, star.x % W, star.y % H, star.r * 3);
      grd.addColorStop(0, star.color);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(star.x % W, star.y % H, star.r * 3, 0, Math.PI * 2);
      ctx.fill();

      // 십자
      ctx.strokeStyle = star.color;
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = alpha * 0.6;
      const cx = star.x % W, cy = star.y % H;
      const len = star.r * 6;
      ctx.beginPath();
      ctx.moveTo(cx - len, cy); ctx.lineTo(cx + len, cy);
      ctx.moveTo(cx, cy - len); ctx.lineTo(cx, cy + len);
      ctx.stroke();
    } else {
      // 작은/중간 별
      if(star.r > 1.0) {
        // 약한 글로우
        const grd = ctx.createRadialGradient(star.x % W, star.y % H, 0, star.x % W, star.y % H, star.r * 2.5);
        grd.addColorStop(0, star.color);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(star.x % W, star.y % H, star.r * 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = alpha;
      }
      ctx.fillStyle = star.color;
      ctx.beginPath();
      ctx.arc(star.x % W, star.y % H, star.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawMeteor(m) {
    if(!m.active) return;
    ctx.save();
    const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.vx * m.len, m.y - m.vy * m.len);
    grad.addColorStop(0, `rgba(255,255,255,${m.opacity})`);
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.vx * m.len, m.y - m.vy * m.len);
    ctx.stroke();
    ctx.restore();
  }

  let frame = 0;
  function loop() {
    frame++;
    ctx.clearRect(0, 0, W, H);

    // 별 그리기
    STARS.forEach(star => {
      star.phase += star.speed;
      const flicker = star.brightness * (0.5 + 0.5 * Math.sin(star.phase));
      drawStar(star, flicker);
    });

    // 유성
    METEORS.forEach(m => {
      if(!m.active) {
        m.timer--;
        if(m.timer <= 0) {
          m.active = true;
          m.x = Math.random() * W * 1.2;
          m.y = Math.random() * H * 0.4;
          const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
          const speed = 8 + Math.random() * 6;
          m.vx = Math.cos(angle) * speed;
          m.vy = Math.sin(angle) * speed;
          m.len = 12 + Math.random() * 10;
          m.opacity = 0.9;
          m.timer = 0;
        }
      } else {
        m.x += m.vx; m.y += m.vy;
        m.opacity -= 0.015;
        drawMeteor(m);
        if(m.opacity <= 0 || m.x > W + 100 || m.y > H + 100) {
          m.active = false;
          m.timer = 200 + Math.random() * 400;
        }
      }
    });

    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

<script>
async function submitBugReport(){var t=localStorage.getItem('accessToken');if(!t){alert('로그인이 필요합니다.');return}try{var r=await fetch('/api/bugs',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({page:document.getElementById('bugPage').value,issue_type:document.getElementById('bugType').value,description:document.getElementById('bugDesc').value})});var d=await r.json();if(r.ok){if(typeof showToast==='function')showToast(d.message);else alert(d.message);document.getElementById('bugModal').classList.remove('open');document.getElementById('bugDesc').value=''}else{alert(d.message||'제출 실패')}}catch(e){alert('네트워크 오류')}}
