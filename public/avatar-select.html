<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>아스트라 선택 | ASTERIA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--void:#0a0a14;--panel:rgba(10,10,22,0.96);--border:rgba(180,150,255,0.13);--accent:#c084fc;--gold:#f0c040;--text:#e8e4f0;--muted:rgba(200,190,220,0.5)}
html,body{height:100%;background:var(--void);color:var(--text);font-family:'Noto Sans KR',sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}
body{overflow-y:auto;overflow-x:hidden}

/* 별빛 캔버스 */
#starCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* 상단 네비 */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:400;
  display:flex;align-items:center;justify-content:center;
  gap:28px;height:44px;
  background:rgba(10,10,22,0.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(180,150,255,0.13);
}
.top-nav-item{
  font-size:12px;font-weight:500;
  color:rgba(200,190,220,0.45);
  text-decoration:none;cursor:pointer;
  transition:all .2s;letter-spacing:0.5px;
  padding:4px 2px;
  border-bottom:2px solid transparent;
}
.top-nav-item:hover{color:#e8e4f0}
.top-nav-item.active{color:#c084fc;border-bottom-color:#c084fc}

/* 메인 콘텐츠 */
.main{position:relative;z-index:1;padding-bottom:60px}

/* 아바타 카드 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  max-width:420px;
  margin:0 auto;
  padding:0 20px;
}
.card{
  display:flex;flex-direction:column;align-items:center;
  padding:18px 8px 14px;
  background:rgba(255,255,255,0.03);
  border:1.5px solid var(--border);
  border-radius:16px;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.card:hover{transform:translateY(-4px);border-color:rgba(192,132,252,0.3)}
.card.selected{
  border-color:var(--accent);
  box-shadow:0 0 20px rgba(192,132,252,0.25),0 0 40px rgba(192,132,252,0.1);
  background:rgba(192,132,252,0.06);
}
.card svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
.card-name{
  margin-top:10px;font-size:12px;font-weight:700;
  color:var(--text);letter-spacing:0.5px;
}
.card-name-en{
  font-size:9px;font-family:'Orbitron',monospace;
  color:var(--muted);margin-top:2px;letter-spacing:1px;
}

/* 시작 버튼 */
.start-wrap{text-align:center;margin-top:32px;padding:0 20px}
.start-btn{
  display:inline-block;
  padding:14px 48px;
  border-radius:50px;
  border:none;
  font-family:'Noto Sans KR',sans-serif;
  font-size:15px;font-weight:700;
  cursor:pointer;
  transition:all .3s;
  letter-spacing:1px;
}
.start-btn.disabled{
  background:rgba(255,255,255,0.06);
  color:rgba(200,190,220,0.3);
  pointer-events:none;
}
.start-btn.active{
  background:linear-gradient(135deg,#f0c040,#f59e0b);
  color:#0a0a14;
  box-shadow:0 0 24px rgba(240,192,64,0.3),0 4px 12px rgba(0,0,0,0.3);
}
.start-btn.active:hover{
  transform:translateY(-2px);
  box-shadow:0 0 32px rgba(240,192,64,0.4),0 6px 16px rgba(0,0,0,0.3);
}
</style>
</head>

<script>
// ── 별빛 캔버스 ──
(function(){
  const c=document.getElementById('starCanvas'),x=c.getContext('2d');
  let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+0.3,a:Math.random(),s:Math.random()*0.008+0.003})}
  function draw(){x.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.a+=s.s;if(s.a>1)s.s=-Math.abs(s.s);if(s.a<0)s.s=Math.abs(s.s);x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle=`rgba(200,190,255,${s.a*0.7})`;x.fill()});requestAnimationFrame(draw)}
  resize();draw();window.addEventListener('resize',resize);
})();

// ── 카드 선택 ──
let selectedCard=null;
function selectCard(el){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCard=el;
  const btn=document.getElementById('startBtn');
  btn.classList.remove('disabled');
  btn.classList.add('active');
}

// ── 시작하기 ──
function goStart(){
  if(!selectedCard)return;
  const id=selectedCard.dataset.id;
  const name=selectedCard.dataset.name;
  localStorage.setItem('asteria_avatar_base',id);
  localStorage.setItem('asteria_avatar',JSON.stringify({
    base:id,
    name:name,
    skin:'#FDBCB4',
    hair:'h1',
    hairColor:'#1a1a1a',
    outfit_top:'t1',
    outfit_bottom:'b1',
    outfit_full:null,
    aura:'a1',
    acc_crown:null,
    acc_wing:null,
    acc_weapon:null,
    emotion:'e1',
    motion:'m1',
    league:'dust'
  }));
  location.href='/avatar.html';
}
</script>
