<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>아스트라 선택 — ASTERIA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--void:#030308;--panel:rgba(10,10,22,0.96);--border:rgba(180,150,255,0.13);--gold:#f0c040;--accent:#c084fc;--text:#e8e4f0;--muted:rgba(200,190,220,0.5)}
html,body{width:100%;min-height:100vh;background:var(--void);color:var(--text);font-family:'Noto Sans KR',sans-serif;user-select:none;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding:20px 16px 40px;position:relative;z-index:1}
canvas#starCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.title{text-align:center;font-size:22px;font-weight:900;color:var(--gold);margin-bottom:6px;font-family:'Orbitron',monospace;letter-spacing:2px}
.subtitle{text-align:center;font-size:12px;color:var(--muted);margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.card{background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:16px 8px 12px;text-align:center;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(240,192,64,.25)}
.card-check{display:none;position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--gold);border-radius:50%;color:#030308;font-size:13px;font-weight:900;line-height:22px;text-align:center}
.card.selected .card-check{display:block}
.card-wrap{position:relative}
.card-svg{width:100px;height:125px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.card-svg svg{width:100%;height:100%}
.card-name{font-size:13px;font-weight:700;color:var(--text)}
.card-preview{font-size:11px;color:var(--gold);margin-top:4px;min-height:16px;font-weight:700}
.name-section{display:none;text-align:center;animation:fadeUp .3s ease}
.name-section.show{display:block}
.name-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:12px}
.name-input{width:100%;max-width:280px;padding:12px 16px;background:rgba(20,20,40,0.8);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:16px;font-family:'Noto Sans KR',sans-serif;text-align:center;outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--gold)}
.name-hint{font-size:10px;color:var(--muted);margin-top:6px}
.start-btn{display:block;width:100%;max-width:280px;margin:20px auto 0;padding:14px;background:linear-gradient(135deg,var(--gold),#c084fc);border:none;border-radius:14px;color:#030308;font-size:15px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;opacity:0.4;pointer-events:none;transition:all .2s}
.start-btn.active{opacity:1;pointer-events:auto}
.start-btn.active:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(240,192,64,.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div id="app">
  <div class="title">✨ ASTRA</div>
  <div class="subtitle">나의 아스트라를 선택하세요</div>
  <div class="grid" id="charGrid"></div>
  <div class="name-section" id="nameSection">
    <div class="name-title">아스트라의 이름을 지어주세요!</div>
    <input class="name-input" id="nameInput" placeholder="2~8글자" maxlength="8">
    <div class="name-hint">이름은 나중에 변경할 수 있어요 (스타더스트 소모)</div>
    <button class="start-btn" id="startBtn" onclick="goStart()">✦ 시작하기</button>
  </div>
</div>
<script src="/js/avatar-svgs.js"></script>
<script>
// 캐릭터 목록
var CHARS = [
  {id:'m1',name:'루카',en:'LUCA'},
  {id:'m2',name:'제이',en:'JAY'},
  {id:'m3',name:'코코',en:'COCO'},
  {id:'f1',name:'아리',en:'ARI'},
  {id:'f2',name:'세나',en:'SENA'},
  {id:'f3',name:'루나',en:'LUNA'}
];
var selectedChar = null;
// 그리드 렌더링
function renderGrid(){
  document.getElementById('charGrid').innerHTML = CHARS.map(function(c){
    var sel = selectedChar === c.id ? ' selected' : '';
    return '<div class="card-wrap"><div class="card' + sel + '" onclick="selectChar(\'' + c.id + '\')">' +
      '<div class="card-check">✓</div>' +
      '<div class="card-svg">' + (typeof getBaseSVG==='function'?getBaseSVG(c.id):'') + '</div>' +
      '<div class="card-name">' + c.name + ' ' + c.en + '</div>' +
      '<div class="card-preview" id="preview_' + c.id + '"></div>' +
    '</div></div>';
  }).join('');
}
function selectChar(id){
  selectedChar = id;
  renderGrid();
  document.getElementById('nameSection').classList.add('show');
  document.getElementById('nameInput').focus();
  updatePreview();
}
// 이름 입력 실시간 미리보기
document.getElementById('nameInput').addEventListener('input', function(){
  updatePreview();
  var len = this.value.trim().length;
  var btn = document.getElementById('startBtn');
  if(len >= 2) btn.classList.add('active');
  else btn.classList.remove('active');
});
function updatePreview(){
  var name = document.getElementById('nameInput').value.trim();
  CHARS.forEach(function(c){
    var el = document.getElementById('preview_' + c.id);
    if(el) el.textContent = (c.id === selectedChar && name) ? name : '';
  });
}
// 시작하기
function goStart(){
  var name = document.getElementById('nameInput').value.trim();
  if(!selectedChar){alert('캐릭터를 선택해주세요!');return;}
  if(name.length < 2){alert('이름은 2글자 이상이어야 해요!');return;}
  localStorage.setItem('asteria_avatar_base', selectedChar);
  localStorage.setItem('asteria_nick', name);
  localStorage.setItem('asteria_avatar', JSON.stringify({face:selectedChar}));
  window.location.href = '/avatar.html';
}
renderGrid();
// 별빛 배경
(function(){var c=document.getElementById('starCanvas');if(!c)return;var x=c.getContext('2d');var W,H;function r(){W=c.width=innerWidth;H=c.height=innerHeight}r();addEventListener('resize',r);var s=[];for(var i=0;i<200;i++)s.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.2+0.3,a:Math.random(),s:Math.random()*0.02+0.005});function d(){x.clearRect(0,0,W,H);s.forEach(function(p){p.a+=p.s;var o=0.3+Math.sin(p.a)*0.7;x.beginPath();x.arc(p.x%W,p.y%H,p.r,0,Math.PI*2);x.fillStyle='rgba(200,180,255,'+o+')';x.fill()});requestAnimationFrame(d)}d()})();
</script>
</body>
</html>
