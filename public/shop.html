<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>상점 — ASTERIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#030308;--panel:rgba(5,12,30,.96);
  --border:rgba(200,175,80,.13);--gold:#f0c040;
  --accent:#4a90d9;--text:#e8ecf4;--muted:rgba(160,180,210,.5);
  --common:#94a3b8;--rare:#38bdf8;--epic:#c084fc;--legendary:#f0c040;--genesis:linear-gradient(90deg,#f06,#f90,#0f0,#09f,#c0f);
}
html,body{width:100%;height:100%;background:var(--void);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}
#starCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}

/* ── 상단 네비게이션 ── */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:400;display:flex;align-items:center;justify-content:center;gap:28px;height:44px;background:rgba(10,10,22,0.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(180,150,255,0.13)}
.top-nav-item{font-size:12px;font-weight:500;color:rgba(200,190,220,0.45);text-decoration:none;cursor:pointer;transition:all .2s;letter-spacing:0.5px;padding:4px 2px;border-bottom:2px solid transparent}
.top-nav-item:hover{color:#e8e4f0}
.top-nav-item.active{color:#c084fc;border-bottom-color:#c084fc}

/* 잔액 바 */
.balance-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.bal-left{display:flex;align-items:center;gap:8px}
.bal-icon{font-size:20px}
.bal-amount{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--gold)}
.bal-label{font-size:9px;color:var(--muted)}
.bal-charge{padding:5px 14px;border-radius:14px;background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.4);color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 탭바 */
.tab-bar{display:flex;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 14px;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans KR',sans-serif}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* 아이템 그리드 */
.content{flex:1;overflow-y:auto;padding:12px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(240,192,64,.3);border-radius:3px}
.item-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item-card{background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.item-card:hover{transform:translateY(-3px);border-color:var(--gold)}
.item-card.locked{opacity:.6}
.item-card .lock-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:13px;font-size:10px;color:var(--muted);gap:4px}
.item-card .lock-overlay .lock-icon{font-size:22px}
.ic-emoji{font-size:32px;margin-bottom:6px}
.ic-name{font-size:10px;font-weight:600;margin-bottom:2px}
.ic-en{font-size:8px;color:var(--muted);margin-bottom:6px}
.ic-price{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--gold)}
.ic-rarity{font-size:7px;font-weight:900;letter-spacing:1px;margin-top:4px}
/* 등급 색상 */
.r-common{color:var(--common);border-color:var(--common)}.r-rare{color:var(--rare);border-color:var(--rare)}.r-epic{color:var(--epic);border-color:var(--epic)}
.r-legendary{color:var(--legendary);border-color:var(--legendary);box-shadow:0 0 12px rgba(240,192,64,.15)}
.r-genesis{border-image:var(--genesis) 1;box-shadow:0 0 16px rgba(192,132,252,.2)}

/* 거래소 */
.market-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.market-item:hover{border-color:var(--gold)}
.mi-emoji{font-size:28px;flex-shrink:0}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:12px;font-weight:700}
.mi-seller{font-size:9px;color:var(--muted)}
.mi-right{text-align:right;flex-shrink:0}
.mi-price{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:var(--gold)}
.mi-rarity{font-size:8px;font-weight:700}
.market-search{display:flex;gap:8px;margin-bottom:12px}
.market-search input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;font-family:'Noto Sans KR',sans-serif}
.market-search input:focus{border-color:var(--gold)}
.market-search select{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px;color:var(--text);font-size:11px;outline:none}

/* 뽑기 */
.gacha-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.gacha-orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(240,192,64,.3),rgba(192,132,252,.2),rgba(0,0,0,.6));border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:50px;cursor:pointer;margin-bottom:16px;box-shadow:0 0 40px rgba(240,192,64,.2);transition:all .3s}
.gacha-orb:hover{transform:scale(1.08);box-shadow:0 0 60px rgba(240,192,64,.4)}
.gacha-orb.spinning{animation:gachaSpin 1s ease-in-out}
@keyframes gachaSpin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(360deg) scale(1.15)}100%{transform:rotate(720deg) scale(1)}}
.gacha-btns{display:flex;gap:12px;margin-bottom:20px}
.gacha-btn{padding:12px 24px;border-radius:16px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.gacha-btn.single{background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.4);color:var(--gold)}
.gacha-btn.multi{background:linear-gradient(90deg,var(--gold),#e6a800);color:var(--void)}
.gacha-btn:hover{transform:translateY(-2px)}
.gacha-result{text-align:center;min-height:80px}
.gacha-result-card{display:inline-flex;flex-direction:column;align-items:center;gap:6px;padding:16px 24px;border-radius:16px;background:rgba(255,255,255,.04);border:2px solid var(--border);animation:resultPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes resultPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.gr-emoji{font-size:40px}.gr-name{font-size:13px;font-weight:700}.gr-rarity{font-size:10px;font-weight:900;letter-spacing:1px}
.gacha-history{margin-top:16px;width:100%}
.gacha-history-title{font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px}
.gh-list{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.gh-item{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,.04);border:1px solid var(--border)}

/* 상세 모달 */
.shop-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px}
.shop-modal.show{display:flex}
.sm-card{background:rgba(8,8,22,.97);border:1px solid var(--border);border-radius:20px;width:340px;max-width:95vw;padding:24px;text-align:center}
.sm-close{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.sm-emoji{font-size:56px;margin:10px 0}
.sm-name{font-size:18px;font-weight:900;margin-bottom:2px}
.sm-en{font-size:11px;color:var(--muted);margin-bottom:8px}
.sm-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.sm-price{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--gold);margin-bottom:14px}
.sm-buy{width:100%;padding:12px;border-radius:14px;border:none;background:linear-gradient(90deg,var(--gold),#e6a800);color:var(--void);font-size:14px;font-weight:900;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.sm-buy:disabled{opacity:.5;cursor:not-allowed}

/* NPC 영역 */
.npc-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.npc-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(240,192,64,.3),rgba(7,7,15,.9));border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;animation:npcFloat 3s ease-in-out infinite}
@keyframes npcFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.npc-speech{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:8px 12px;font-size:11px;line-height:1.5;color:var(--text);position:relative}
.npc-speech::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:rgba(255,255,255,.04)}
.npc-chat-btn{padding:6px 14px;border-radius:12px;background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.35);color:var(--gold);font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'Noto Sans KR',sans-serif}
.npc-chat-btn:hover{background:rgba(240,192,64,.2)}

/* NPC 대화 모달 */
.npc-modal{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;padding:16px}
.npc-modal.show{display:flex}
.npc-chat-card{background:rgba(8,8,22,.97);border:1px solid var(--border);border-radius:20px 20px 0 0;width:480px;max-width:100%;max-height:70vh;display:flex;flex-direction:column;overflow:hidden}
.npc-chat-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.npc-chat-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,rgba(240,192,64,.3),rgba(7,7,15,.9));border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px}
.npc-chat-name{font-size:13px;font-weight:700;flex:1}
.npc-chat-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.npc-chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.npc-chat-body::-webkit-scrollbar{width:3px}
.npc-chat-body::-webkit-scrollbar-thumb{background:rgba(240,192,64,.3);border-radius:3px}
.npc-msg{max-width:80%;padding:8px 12px;border-radius:14px;font-size:12px;line-height:1.5}
.npc-msg.npc{background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.2);border-bottom-left-radius:4px;align-self:flex-start}
.npc-msg.user{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.2);border-bottom-right-radius:4px;align-self:flex-end}
.npc-chat-input{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border)}
.npc-chat-input input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:18px;padding:8px 14px;color:var(--text);font-size:12px;outline:none;font-family:'Noto Sans KR',sans-serif}
.npc-chat-input input:focus{border-color:var(--gold)}
.npc-chat-input button{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e6a800);border:none;color:var(--void);font-size:14px;cursor:pointer}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(12,12,26,.97);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body style="padding-top:44px">

<nav class="top-nav">
  <a class="top-nav-item" href="/index.html">홈</a>

  <a class="top-nav-item" href="/astra.html">아스트라</a>
  <a class="top-nav-item" href="/room3d.html">내방</a>

</nav>

<canvas id="starCanvas"></canvas>
<div id="toast" class="toast"></div>
<!-- NPC 대화 모달 -->
<div class="npc-modal" id="npcModal">
  <div class="npc-chat-card">
    <div class="npc-chat-header">
      <div class="npc-chat-av">🧙</div>
      <div class="npc-chat-name">별빛 상인 루미 — Shopkeeper Lumi</div>
      <button class="npc-chat-close" onclick="closeNpcChat()">✕</button>
    </div>
    <div class="npc-chat-body" id="npcChatBody">
      <div class="npc-msg npc">어서오세요! 무엇을 찾으시나요? 추천해드릴까요? 😊<br>Welcome! What are you looking for?</div>
    </div>
    <div class="npc-chat-input">
      <input id="npcInput" placeholder="상인에게 말하기... — Talk to shopkeeper" onkeydown="if(event.key==='Enter')sendNpcMsg()">
      <button onclick="sendNpcMsg()">➤</button>
    </div>
  </div>
</div>

<div class="shop-modal" id="shopModal">
  <div class="sm-card">
    <button class="sm-close" onclick="closeShopModal()">✕</button>
    <div class="sm-emoji" id="smEmoji"></div>
    <div class="sm-name" id="smName"></div>
    <div class="sm-en" id="smEn"></div>
    <div id="smRarity" class="ic-rarity" style="margin-bottom:8px"></div>
    <div class="sm-desc" id="smDesc"></div>
    <div class="sm-price" id="smPrice"></div>
    <button class="sm-buy" id="smBuy" onclick="buyItem()">구매하기 — Purchase</button>
  </div>
</div>

<div id="app">
  <div class="balance-bar">
    <div class="bal-left">
      <div class="bal-icon">⭐</div>
      <div><div class="bal-amount" id="balAmount">2,150</div><div class="bal-label">스타더스트 — Stardust</div></div>
    </div>
    <button class="bal-charge" onclick="showToast('💫 충전 기능은 추후 오픈!')">+ 충전</button>
  </div>

  <!-- 내 프로필 -->
  <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;margin-bottom:8px;background:var(--panel);border:1px solid var(--border);border-radius:14px;">
    <div id="shopMyAv" style="width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(192,132,252,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;"></div>
    <div>
      <div id="shopMyName" style="font-size:13px;font-weight:700;"></div>
      <div id="shopMySerial" style="font-size:9px;letter-spacing:1px;margin-top:1px;"></div>
    </div>
  </div>

  <!-- 상점 주인 NPC -->
  <div class="npc-bar">
    <div class="npc-avatar">🧙</div>
    <div class="npc-speech">어서오세요! 오늘의 추천 아이템이에요! ✨<br><span style="font-size:9px;color:var(--muted)">Welcome! Here are today's picks!</span></div>
    <button class="npc-chat-btn" onclick="openNpcChat()">💬 대화<br><span style="font-size:8px">Chat</span></button>
  </div>

  <div class="tab-bar" id="tabBar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ══════════════════════════════════════════
//  별빛 배경
// ══════════════════════════════════════════
(function(){const cv=document.getElementById('starCanvas'),ctx=cv.getContext('2d');let W,H;function r(){W=cv.width=innerWidth;H=cv.height=innerHeight}r();addEventListener('resize',r);const S=Array.from({length:150},()=>({x:Math.random()*2e3,y:Math.random()*2e3,r:Math.random()<.8?Math.random()*.6+.3:Math.random()*1.2+.8,b:Math.random()*.5+.3,p:Math.random()*6.28,s:Math.random()*.008+.002,c:Math.random()<.08?'#f0c040':Math.random()<.06?'#c084fc':'#fff'}));(function l(){ctx.clearRect(0,0,W,H);S.forEach(s=>{s.p+=s.s;ctx.globalAlpha=s.b*(.5+.5*Math.sin(s.p));ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,6.28);ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(l)})()})();

// ══════════════════════════════════════════
//  데이터
// ══════════════════════════════════════════
let stardust=2150;
let currentTab='furniture';
let selectedItem=null;
let gachaHistory=[];

const TABS=[
  {id:'furniture',name:'🛋️ 가구',en:'Furniture'},
  {id:'wall',name:'🖼️ 벽장식',en:'Wall'},
  {id:'lighting',name:'💡 조명',en:'Light'},
  {id:'goods',name:'🎁 굿즈',en:'Goods'},
  {id:'avatar',name:'👤 아바타',en:'Avatar'},
  {id:'effect',name:'✨ 이펙트',en:'Effect'},
  {id:'market',name:'🏪 거래소',en:'Market'},
  {id:'gacha',name:'🎰 뽑기',en:'Gacha'},
];

const ITEMS={
  furniture:[
    {emoji:'🛏️',name:'별빛 침대',en:'Star Bed',rarity:'common',price:200,desc:'은은한 별빛이 나는 침대 / A bed with gentle starlight'},
    {emoji:'🛋️',name:'우주 소파',en:'Cosmic Sofa',rarity:'rare',price:450,desc:'우주를 닮은 보라빛 소파 / A purple sofa like the cosmos'},
    {emoji:'📚',name:'오라클 책장',en:'Oracle Shelf',rarity:'common',price:180,desc:'지혜를 담는 책장 / A bookshelf of wisdom'},
    {emoji:'💄',name:'스타 화장대',en:'Star Vanity',rarity:'epic',price:800,desc:'별처럼 빛나는 화장대 / A vanity that shines like stars'},
    {emoji:'🪵',name:'성운 러그',en:'Nebula Rug',rarity:'common',price:150,desc:'성운 패턴의 포근한 러그 / A cozy nebula-pattern rug'},
  ],
  wall:[
    {emoji:'🖼️',name:'컴백 포스터',en:'Comeback Poster',rarity:'common',price:120,desc:'아티스트 컴백 포스터 / Artist comeback poster'},
    {emoji:'🪞',name:'우주 거울',en:'Cosmic Mirror',rarity:'rare',price:380,desc:'우주가 비치는 거울 / A mirror reflecting the cosmos'},
    {emoji:'⏰',name:'별자리 시계',en:'Star Clock',rarity:'rare',price:350,desc:'별자리가 돌아가는 시계 / A clock with rotating constellations'},
    {emoji:'💜',name:'네온사인',en:'Neon Sign',rarity:'epic',price:750,desc:'LOVE 네온사인 / LOVE neon sign'},
    {emoji:'🏅',name:'챔피언 액자',en:'Champion Frame',rarity:'legendary',price:2000,desc:'리그 1위 기념 액자 / League champion frame',locked:true,lockMsg:'노바 리그'},
  ],
  lighting:[
    {emoji:'🕯️',name:'오로라 캔들',en:'Aurora Candle',rarity:'common',price:100,desc:'오로라빛 캔들 / An aurora-glowing candle'},
    {emoji:'💡',name:'별빛 무드등',en:'Starlight Lamp',rarity:'common',price:160,desc:'은은한 별빛 무드등 / Soft starlight mood lamp'},

const MARKET=[
  {emoji:'🛋️',name:'우주 소파',en:'Cosmic Sofa',rarity:'rare',price:380,seller:'NovaFan99'},

];

const RARITY_LABEL={common:'COMMON',rare:'RARE',epic:'EPIC',legendary:'LEGENDARY',genesis:'GENESIS'};
const RARITY_COLOR={common:'var(--common)',rare:'var(--rare)',epic:'var(--epic)',legendary:'var(--legendary)',genesis:'#c084fc'};

// ══════════════════════════════════════════
//  탭 렌더
// ══════════════════════════════════════════
function renderTabs(){
  document.getElementById('tabBar').innerHTML=TABS.map(t=>`
    <button class="tab-btn ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.name}</button>
  `).join('');
}
function switchTab(id){currentTab=id;renderTabs();renderContent()}

// ══════════════════════════════════════════
//  콘텐츠 렌더
// ══════════════════════════════════════════
function renderContent(){
  const el=document.getElementById('content');
  if(currentTab==='market'){renderMarket(el);return}
  if(currentTab==='gacha'){renderGacha(el);return}
  const items=ITEMS[currentTab]||[];
  el.innerHTML=`<div class="item-grid">${items.map((item,i)=>`
    <div class="item-card r-${item.rarity} ${item.locked?'locked':''}" onclick="${item.locked?'':`openShopModal('${currentTab}',${i})`}">
      ${item.locked?`<div class="lock-overlay"><div class="lock-icon">🔒</div>${item.lockMsg}</div>`:''}
      <div class="ic-emoji">${item.emoji}</div>
      <div class="ic-name">${item.name}</div>
      <div class="ic-en">${item.en}</div>
      <div class="ic-price">${item.price>0?'⭐ '+item.price:'—'}</div>
      <div class="ic-rarity" style="color:${RARITY_COLOR[item.rarity]}">${RARITY_LABEL[item.rarity]}</div>
    </div>
  `).join('')}</div>`;
}

// ══════════════════════════════════════════
//  거래소
// ══════════════════════════════════════════
function renderMarket(el){
  el.innerHTML=`
    <div class="market-search">
      <input placeholder="아이템 검색 — Search items" oninput="filterMarket(this.value)">
      <select onchange="sortMarket(this.value)">
        <option value="price-asc">가격↑</option>
        <option value="price-desc">가격↓</option>
        <option value="rarity">등급순</option>
      </select>
    </div>
    <div id="marketList">${renderMarketList(MARKET)}</div>
    <button style="width:100%;padding:12px;border-radius:14px;border:1px solid var(--gold);background:rgba(240,192,64,.1);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Noto Sans KR',sans-serif" onclick="showToast('📦 판매 기능은 추후 오픈!')">내 아이템 판매하기 — Sell My Items</button>
  `;
}
function renderMarketList(items){
  return items.map(m=>`
    <div class="market-item" onclick="showToast('⭐ ${m.price} 스타더스트로 구매! — Purchase for ${m.price}⭐')">
      <div class="mi-emoji">${m.emoji}</div>
      <div class="mi-info">
        <div class="mi-name">${m.name} <span style="color:var(--muted);font-size:9px">— ${m.en}</span></div>
        <div class="mi-seller">판매자 — ${m.seller}</div>
      </div>
      <div class="mi-right">
        <div class="mi-price">⭐ ${m.price}</div>
        <div class="mi-rarity" style="color:${RARITY_COLOR[m.rarity]}">${RARITY_LABEL[m.rarity]}</div>
      </div>
    </div>
  `).join('');
}
function filterMarket(q){
  const filtered=MARKET.filter(m=>m.name.includes(q)||m.en.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('marketList').innerHTML=renderMarketList(filtered);
}
function sortMarket(by){
  const sorted=[...MARKET];
  if(by==='price-asc')sorted.sort((a,b)=>a.price-b.price);
  else if(by==='price-desc')sorted.sort((a,b)=>b.price-a.price);
  else sorted.sort((a,b)=>{const o={genesis:0,legendary:1,epic:2,rare:3,common:4};return o[a.rarity]-o[b.rarity]});
  document.getElementById('marketList').innerHTML=renderMarketList(sorted);
}

// ══════════════════════════════════════════
function renderGacha(el){
  el.innerHTML=`
    <div class="gacha-wrap">
      <div class="gacha-orb" id="gachaOrb" onclick="doGacha(1)">🌟</div>
      <div class="gacha-btns">
        <button class="gacha-btn single" onclick="doGacha(1)">1회 뽑기 (100⭐)</button>
        <button class="gacha-btn multi" onclick="doGacha(10)">10연차 (900⭐)</button>
      </div>
      <div class="gacha-result" id="gachaResult"></div>
      <div class="gacha-history">
        <div class="gacha-history-title">최근 뽑기 — RECENT</div>
        <div class="gh-list" id="ghList">${gachaHistory.map(g=>`<div class="gh-item r-${g.rarity}" title="${g.name}">${g.emoji}</div>`).join('')||'<span style="font-size:11px;color:var(--muted)">아직 뽑기 기록이 없어요</span>'}</div>
      </div>
    </div>
  `;
}
function doGacha(count){
  const cost=count===1?100:900;
  if(stardust<cost){showToast('⭐ 스타더스트가 부족해요!');return}
  stardust-=cost;
  updateBalance();

  const orb=document.getElementById('gachaOrb');
  orb.classList.add('spinning');

  setTimeout(()=>{
    orb.classList.remove('spinning');
    const results=[];
    for(let i=0;i<count;i++){
      const rand=Math.random()*100;
      let rarity;
      if(rand<1) rarity='genesis';
      else if(rand<5) rarity='legendary';
      else if(rand<15) rarity='epic';
      else if(rand<40) rarity='rare';
      else rarity='common';
      // 해당 등급 랜덤 아이템
      const allItems=Object.values(ITEMS).flat().filter(it=>it.rarity===rarity&&!it.locked);
      const item=allItems.length?allItems[Math.floor(Math.random()*allItems.length)]:{emoji:'⭐',name:'별조각',en:'Star Shard',rarity};
      results.push(item);
      gachaHistory.unshift(item);
    }
    if(gachaHistory.length>20) gachaHistory=gachaHistory.slice(0,20);

    // 결과 표시
    const best=results.sort((a,b)=>{const o={genesis:0,legendary:1,epic:2,rare:3,common:4};return o[a.rarity]-o[b.rarity]})[0];
    document.getElementById('gachaResult').innerHTML=`
      <div class="gacha-result-card r-${best.rarity}" style="border-color:${RARITY_COLOR[best.rarity]}">
        <div class="gr-emoji">${best.emoji}</div>
        <div class="gr-name">${best.name}</div>
        <div class="gr-rarity" style="color:${RARITY_COLOR[best.rarity]}">${RARITY_LABEL[best.rarity]}${count>1?' 외 '+(count-1)+'개':''}</div>
      </div>
    `;
    document.getElementById('ghList').innerHTML=gachaHistory.map(g=>`<div class="gh-item r-${g.rarity}" title="${g.name}">${g.emoji}</div>`).join('');

    if(best.rarity==='legendary'||best.rarity==='genesis'){
      showToast('🎉 축하합니다! '+RARITY_LABEL[best.rarity]+' 획득!');
      flashScreen();
    } else {
      showToast('✨ '+best.name+' 획득!');
    }
  },1100);
}
function flashScreen(){
  const f=document.createElement('div');
  f.style.cssText='position:fixed;inset:0;z-index:9998;background:rgba(240,192,64,.3);pointer-events:none;animation:flashFade .8s ease-out forwards';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),800);
  const style=document.createElement('style');
  style.textContent='@keyframes flashFade{from{opacity:1}to{opacity:0}}';
  document.head.appendChild(style);
}

// ══════════════════════════════════════════
//  상세 모달

function openShopModal(cat,idx){
  const item=ITEMS[cat][idx];
  if(!item||item.locked) return;
  selectedItem=item;
  document.getElementById('smEmoji').textContent=item.emoji;
  document.getElementById('smName').textContent=item.name;
  document.getElementById('smEn').textContent=item.en;
  document.getElementById('smRarity').textContent=RARITY_LABEL[item.rarity];
  document.getElementById('smRarity').style.color=RARITY_COLOR[item.rarity];
  document.getElementById('smDesc').textContent=item.desc;
  document.getElementById('smPrice').textContent='⭐ '+item.price;
  document.getElementById('smBuy').disabled=stardust<item.price;
  document.getElementById('shopModal').classList.add('show');
}
function closeShopModal(){document.getElementById('shopModal').classList.remove('show');selectedItem=null}
function buyItem(){
  if(!selectedItem||stardust<selectedItem.price) return;
  stardust-=selectedItem.price;
  updateBalance();
  closeShopModal();
  showToast(`📦 ${selectedItem.name} 구매 완료! 내 방으로 배달됩니다! — Purchased!`);
}
function updateBalance(){document.getElementById('balAmount').textContent=stardust.toLocaleString()}

const NPC_RESPONSES=[

  '거래소에 레어 아이템 올라왔어요! 빨리 가보세요! 🏪\nRare items just listed in the market! Hurry!',

  '오로라 이펙트 진짜 예뻐요. 방에 설치하면 우와... ✨\nThe Aurora effect is gorgeous. Your room will be amazing!',
  '인형 귀엽지 않아요? 저도 하나 갖고 싶어요 ㅎㅎ 🧸\nIsn\'t the plush cute? I want one too hehe!',
];
function openNpcChat(){document.getElementById('npcModal').classList.add('show')}
function closeNpcChat(){document.getElementById('npcModal').classList.remove('show')}
function sendNpcMsg(){
  const inp=document.getElementById('npcInput');
  const msg=inp.value.trim();
  if(!msg) return;
  inp.value='';
  const body=document.getElementById('npcChatBody');
  body.innerHTML+=`<div class="npc-msg user">${msg}</div>`;
  body.scrollTop=body.scrollHeight;
  setTimeout(()=>{
    const reply=NPC_RESPONSES[Math.floor(Math.random()*NPC_RESPONSES.length)];
    body.innerHTML+=`<div class="npc-msg npc">${reply.replace(/\n/g,'<br>')}</div>`;
    body.scrollTop=body.scrollHeight;
  },600+Math.random()*800);
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderTabs();renderContent();
