<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스타리움 STARIUM | ASTERIA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#030308;--panel:rgba(10,10,22,0.96);--border:rgba(180,150,255,0.13);
  --gold:#f0c040;--accent:#c084fc;--text:#e8e4f0;--muted:rgba(200,190,220,0.5);
  /* 리그 동적 변수 */
  --lp:#fbbf24;--ls:#f59e0b;--lg:rgba(251,191,36,0.3);
  --sky1:#060612;--sky2:#0c0c24;--ground1:#1a1a2e;--ground2:#12122a;
  --road1:#2a2540;--road2:#332e4a;--road-border:#3d3660;
}
html,body{height:100%;overflow:hidden;background:var(--ground1);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;}

/* ═══ 하늘 ═══ */
.sky{position:fixed;top:0;left:0;right:0;height:45%;z-index:0;pointer-events:none;background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 50%,var(--ground1) 100%);}
.sky-star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite alternate;}
@keyframes tw{0%{opacity:0.15;transform:scale(.7);}100%{opacity:var(--o,.7);transform:scale(1.1);}}

/* ═══ 날씨 ═══ */
#weatherOv{position:fixed;inset:0;z-index:3;pointer-events:none;transition:all 2s;}
.w-clear{background:transparent;}.w-fog{background:rgba(60,60,80,0.4);}.w-dark{background:rgba(0,0,0,0.5);}
.w-aurora{background:linear-gradient(180deg,rgba(56,189,248,0.08) 0%,rgba(192,132,252,0.05) 40%,transparent 80%);}
.w-fest{background:radial-gradient(ellipse at 50% 20%,rgba(var(--lr,251),var(--lgr,191),var(--lb,36),0.12) 0%,transparent 60%);}

/* ═══ 헤더 ═══ */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(180deg,rgba(6,6,18,.95),rgba(6,6,18,.5) 90%,transparent);backdrop-filter:blur(8px);}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:.3s;}
.hdr-back:hover{background:rgba(255,255,255,.15);transform:scale(1.1);}
.hdr-name{font-family:'Orbitron',monospace;font-weight:700;font-size:14px;color:var(--lp);text-shadow:0 0 12px var(--lg);}
.hdr-sub{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--lp);box-shadow:0 0 5px var(--lg);}
.hdr-r{display:flex;align-items:center;gap:10px;}
.hdr-w{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);padding:3px 8px;border-radius:16px;background:rgba(255,255,255,.05);}
.hdr-on{font-size:10px;color:#38bdf8;display:flex;align-items:center;gap:3px;}
.hdr-on-dot{width:5px;height:5px;border-radius:50%;background:#34d399;animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ═══ 마을 컨테이너 ═══ */
.vc{position:fixed;inset:0;z-index:2;overflow:hidden;cursor:grab;}.vc:active{cursor:grabbing;}
.vw{position:absolute;width:2400px;height:2000px;}

/* ═══ 마을 바닥 ═══ */
.ground{position:absolute;inset:0;background:var(--ground1);}

/* ═══ SVG 아이소메트릭 건물 ═══ */
.bld{position:absolute;cursor:pointer;z-index:10;transition:transform .3s cubic-bezier(.34,1.56,.64,1),filter .3s;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5));}
.bld:hover{transform:translateY(-8px) scale(1.03);filter:drop-shadow(0 12px 24px rgba(0,0,0,.4)) drop-shadow(0 0 15px var(--lg));}
.bld:active{transform:translateY(-3px) scale(1.01);}
.bld-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap;}
.bld-name{font-size:10px;font-weight:700;color:var(--text);text-shadow:0 1px 4px rgba(0,0,0,.8);}
.bld-name-en{font-size:8px;color:var(--muted);}
.bld-badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;border-radius:8px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--ground1);z-index:15;}

/* ═══ 중앙 조형물 ═══ */
.monument{position:absolute;z-index:12;display:flex;flex-direction:column;align-items:center;}
.mon-symbol{font-size:44px;animation:monG 3s ease-in-out infinite;filter:drop-shadow(0 0 20px var(--lg));}
@keyframes monG{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.mon-base{text-align:center;}
.mon-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--lp);letter-spacing:3px;text-shadow:0 0 10px var(--lg);}
.mon-sub{font-size:9px;color:var(--muted);}
.mon-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:140px;height:30px;background:radial-gradient(ellipse,var(--lg),transparent 70%);opacity:.6;pointer-events:none;}

/* ═══ 랜드마크 ═══ */
.lm{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:8;animation:lmF 5s ease-in-out infinite;pointer-events:none;}
.lm-icon{font-size:20px;filter:drop-shadow(0 0 6px var(--lg));}
.lm-txt{font-size:7px;color:var(--lp);font-weight:500;margin-top:1px;white-space:nowrap;}
@keyframes lmF{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

/* ═══ 아바타 ═══ */
.avatar{position:absolute;z-index:20;transition:left .8s ease-in-out,top .8s ease-in-out;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.av-body{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--lp),var(--ls));border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 8px var(--lg),0 3px 8px rgba(0,0,0,.5);animation:avB 3s ease-in-out infinite;}
.av-tag{font-size:7px;font-weight:700;color:var(--text);background:rgba(0,0,0,.6);padding:1px 5px;border-radius:6px;margin-top:1px;}
@keyframes avB{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.avatar.walk .av-body{animation:avW .3s ease-in-out infinite alternate;}
@keyframes avW{0%{transform:translateY(0) rotate(-3deg);}100%{transform:translateY(-3px) rotate(3deg);}}
/* NPC */
.npc{position:absolute;z-index:14;display:flex;flex-direction:column;align-items:center;pointer-events:none;transition:left 3s ease-in-out,top 3s ease-in-out;}
.npc-b{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:9px;}
.npc-n{font-size:6px;color:var(--muted);margin-top:1px;}

/* ═══ 하단 바 ═══ */
.bot{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:8px 14px 12px;background:linear-gradient(0deg,rgba(6,6,18,.95),rgba(6,6,18,.5) 90%,transparent);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;}
.bot-s{display:flex;gap:12px;}
.bot-sv{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--lp);}
.bot-sl{font-size:8px;color:var(--muted);}
.bot-e{display:flex;flex-direction:column;align-items:center;gap:2px;}
.bot-eb{width:100px;height:7px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
.bot-ef{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ls),var(--lp));transition:width 1s;box-shadow:0 0 5px var(--lg);}
.bot-el{font-size:8px;color:var(--muted);}
.bot-d{padding:3px 10px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:10px;color:var(--gold);font-family:'Orbitron',monospace;}

/* ═══ 모달 ═══ */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;}
.mo.show{display:flex;opacity:1;}
.mo-c{width:90%;max-width:400px;max-height:78vh;background:var(--panel);border:1px solid var(--border);border-radius:18px;overflow-y:auto;padding:22px 18px;transform:translateY(16px) scale(.96);transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.mo.show .mo-c{transform:translateY(0) scale(1);}
.mo-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mo-t{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--lp);}
.mo-x{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--muted);}
.mo-x:hover{background:rgba(255,255,255,.15);}
.mc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.mc-t{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;}
.mc-c{font-size:11px;color:var(--muted);line-height:1.6;}
.pb{width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,.08);margin-top:5px;overflow:hidden;}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ls),var(--lp));transition:width 1.5s;}

/* 힌트 */
.hint{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:50;padding:5px 14px;border-radius:16px;background:rgba(0,0,0,.7);border:1px solid var(--border);font-size:10px;color:var(--muted);opacity:0;transition:opacity 1s;pointer-events:none;}
.hint.show{opacity:1;}
/* 토스트 */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);padding:8px 18px;border-radius:18px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:12px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* 진입 */
.ent{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s;}
.ent.fo{opacity:0;pointer-events:none;}
.ent-t{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--lp);text-shadow:0 0 20px var(--lg);animation:ep 1.5s ease-in-out infinite;}
.ent-s{font-size:12px;color:var(--muted);margin-top:6px;font-family:'Orbitron',monospace;}
@keyframes ep{0%,100%{opacity:.5;transform:scale(.98);}50%{opacity:1;transform:scale(1);}}

@media(max-width:600px){.vw{width:2000px;height:1700px;}.hdr-name{font-size:12px;}.bot-eb{width:70px;}}
</style>
</head>
<body>

<div class="sky" id="sky"></div>
<div id="weatherOv" class="w-clear"></div>

<!-- 진입 -->
<div class="ent" id="ent">
  <div class="ent-t" id="entT">STARIUM</div>
  <div class="ent-s" id="entS">entering...</div>
</div>

<!-- 헤더 -->
<header class="hdr">
  <div class="hdr-l">
    <div class="hdr-back" onclick="goBack()">←</div>

      <div class="hdr-name" id="hName">BTS ARMY STARIUM</div>

    </div>

  <div class="hdr-r">
    <div class="hdr-w"><span id="wIco">☀️</span><span id="wTxt">맑음</span></div>

<!-- 마을 -->
<div class="vc" id="vc">
  <div class="vw" id="vw">
    <div class="ground" id="ground"></div>
    <!-- SVG 레이어 (길/장식/건물 전부 JS로 동적 생성) -->
    <svg id="villageSvg" width="2400" height="2000" style="position:absolute;inset:0;z-index:5;pointer-events:none;"></svg>
    <!-- 건물 클릭 영역 (HTML) -->
    <div id="buildingsLayer"></div>
    <!-- 중앙 조형물 -->
    <div class="monument" id="monument"></div>
    <!-- 랜드마크 -->
    <div id="landmarksLayer"></div>
    <!-- 아바타 -->
    <div class="avatar" id="myAv" style="left:1150px;top:1050px;"><div class="av-body">🧑</div><div class="av-tag">나 Me</div></div>
    <!-- NPC -->
    <div id="npcLayer"></div>
  </div>
</div>

<!-- 하단 -->
<div class="bot">

    <div><div class="bot-sv" id="bMem">98,432</div><div class="bot-sl">멤버</div></div>

  </div>
  <div class="bot-e"><div class="bot-eb"><div class="bot-ef" id="bEf" style="width:72%"></div></div><div class="bot-el">에너지 <span id="bEp">72%</span></div></div>
  <div class="bot-d" id="bDd">D-14</div>
</div>

<div class="hint" id="hint">빈 곳을 클릭하면 아바타가 이동해요!</div>
<div class="mo" id="mo" onclick="closeMo(event)"><div class="mo-c" id="moC" onclick="event.stopPropagation()"></div></div>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════

/* 건물 배치 (공통) */

/* ═══════════════════════════════════════════════
   SVG 아이소메트릭 건물 생성
   ═══════════════════════════════════════════════ */
function createIsoBuilding(x,y,w,h,t){
  const depth=w*0.3, roofH=h*0.2;
  // 아이소메트릭 면 계산
  const frontW=w, frontH=h-roofH;
  const sideW=depth;
  return `
    <g transform="translate(${x},${y})">
      <!-- 건물 그림자 -->
      <ellipse cx="${w/2}" cy="${h+8}" rx="${w*0.45}" ry="10" fill="rgba(0,0,0,0.35)"/>
      <!-- 오른쪽 면 (어두운) -->
      <polygon points="${w},${roofH+sideW*0.3} ${w+sideW},${roofH} ${w+sideW},${h-sideW*0.3} ${w},${h}" fill="${t.wallSide}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <!-- 정면 (밝은) -->
      <rect x="0" y="${roofH}" width="${w}" height="${frontH}" rx="2" fill="${t.wallLight}" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <!-- 정면 그라데이션 -->
      <rect x="0" y="${roofH}" width="${w}" height="${frontH*0.3}" rx="2" fill="rgba(255,255,255,0.04)"/>
      <!-- 지붕 윗면 -->
      <polygon points="0,${roofH} ${sideW},${roofH-sideW*0.5} ${w+sideW},${roofH-sideW*0.5} ${w},${roofH}" fill="${t.roofMain}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <!-- 지붕 정면 -->
      <rect x="-2" y="${roofH-4}" width="${w+4}" height="6" rx="2" fill="${t.roofMain}" opacity="0.9"/>
      <!-- 지붕 측면 -->
      <polygon points="${w},${roofH} ${w+sideW},${roofH-sideW*0.5} ${w+sideW},${roofH-sideW*0.5+6} ${w},${roofH+4}" fill="${t.roofSide}"/>
      <!-- 창문들 -->
      ${generateWindows(w,h,roofH,t)}
      <!-- 문 -->
      <rect x="${w/2-8}" y="${h-20}" width="16" height="20" rx="8 8 0 0" fill="${t.doorColor}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
      <circle cx="${w/2+4}" cy="${h-10}" r="1.5" fill="rgba(255,220,100,0.6)"/>
    </g>`;
}

function generateWindows(w,h,roofH,t){
  let svg='';
  const winW=12, winH=15, gap=6;
  const cols=Math.floor((w-20)/(winW+gap));
  const rows=Math.floor((h-roofH-30)/(winH+gap));
  const startX=(w-(cols*(winW+gap)-gap))/2;
  const startY=roofH+12;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const wx=startX+c*(winW+gap);
      const wy=startY+r*(winH+gap);
      const lit=Math.random()>0.4;
      svg+=`<rect x="${wx}" y="${wy}" width="${winW}" height="${winH}" rx="1.5" fill="${lit?t.windowLit:t.windowDark}" stroke="rgba(255,255,255,0.06)" stroke-width="0.3"/>`;
      if(lit) svg+=`<rect x="${wx}" y="${wy}" width="${winW}" height="${winH}" rx="1.5" fill="rgba(255,255,255,0.05)">
        <animate attributeName="opacity" values="0.8;0.4;0.8" dur="${2+Math.random()*3}s" repeatCount="indefinite"/>
      </rect>`;
    }
  }
  return svg;
}

/* ═══ 길/바닥 SVG ═══ */
function createPaths(t,pathType){
  let svg='';
  const rc=t.road1, rc2=t.road2, rb=t.roadBorder;
  const pw=40;
  // 메인 가로길
  svg+=`<rect x="250" y="940" width="1900" height="${pw}" rx="4" fill="${rc}" stroke="${rb}" stroke-width="1.5"/>`;
  // 세로길들
  svg+=`<rect x="880" y="500" width="${pw}" height="600" rx="4" fill="${rc}" stroke="${rb}" stroke-width="1.5"/>`;
  svg+=`<rect x="1480" y="500" width="${pw}" height="600" rx="4" fill="${rc}" stroke="${rb}" stroke-width="1.5"/>`;
  // 보조 가로
  svg+=`<rect x="600" y="700" width="1000" height="${pw}" rx="4" fill="${rc}" stroke="${rb}" stroke-width="1.5"/>`;
  svg+=`<rect x="600" y="1180" width="1000" height="${pw}" rx="4" fill="${rc}" stroke="${rb}" stroke-width="1.5"/>`;
  // 중앙 광장
  svg+=`<ellipse cx="1170" cy="860" rx="200" ry="150" fill="${rc}" stroke="${rb}" stroke-width="2" opacity="0.7"/>`;

  // 텍스처
  if(pathType==='dirt'){
    for(let i=0;i<60;i++){
      const px=300+Math.random()*1800, py=700+Math.random()*600;
      svg+=`<circle cx="${px}" cy="${py}" r="${1+Math.random()*2}" fill="rgba(255,255,255,0.03)"/>`;
    }
  } else if(pathType==='stone'){
    // 포석 패턴
    for(let i=0;i<40;i++){
      const px=300+Math.random()*1800, py=700+Math.random()*600;
      svg+=`<rect x="${px}" y="${py}" width="${4+Math.random()*8}" height="${3+Math.random()*6}" rx="1" fill="rgba(255,255,255,0.03)" transform="rotate(${Math.random()*30},${px},${py})"/>`;
    }
  } else if(pathType==='glow'){
    svg+=`<rect x="250" y="940" width="1900" height="${pw}" rx="4" fill="none" stroke="${t.lp}" stroke-width="0.5" opacity="0.3"/>`;
    svg+=`<rect x="880" y="500" width="${pw}" height="600" rx="4" fill="none" stroke="${t.lp}" stroke-width="0.5" opacity="0.3"/>`;
  } else if(pathType==='marble'){
    svg+=`<rect x="250" y="940" width="1900" height="${pw}" rx="4" fill="url(#marbleGrad)" opacity="0.15"/>`;
  }
  return svg;
}

/* ═══ 장식(나무/가로등/기타) SVG ═══ */
function createDecorations(t){
  let svg='';
  // 나무 배치
  const treePositions=[[300,450],[380,500],[260,600],[1700,500],[1750,580],[1800,650],[350,1150],[280,1200],[1750,1100],[1700,1150],[500,400],[1600,400]];
  treePositions.forEach(([tx,ty])=>{
    const big=Math.random()>0.4;
    const sz=big?34:22;
    svg+=`<g transform="translate(${tx},${ty})">
      <ellipse cx="0" cy="${sz+8}" rx="${sz*0.5}" ry="4" fill="rgba(0,0,0,0.25)"/>
      <rect x="-3" y="${sz*0.6}" width="6" height="${sz*0.45}" rx="2" fill="#3a2a18"/>
      <circle cx="0" cy="${sz*0.3}" r="${sz*0.5}" fill="${t.treeColor1}"/>
      <circle cx="${-sz*0.15}" cy="${sz*0.2}" r="${sz*0.3}" fill="${t.treeColor2}" opacity="0.7"/>
    </g>`;
  });

  // 가로등
  const lampPos=[[550,700],[850,700],[1200,700],[1500,700],[750,940],[1100,940],[1450,940],[850,1180],[1200,1180]];
  lampPos.forEach(([lx,ly])=>{
    if(t.lampStyle==='torch'){
      svg+=`<g transform="translate(${lx},${ly-50})">
        <rect x="-2" y="10" width="4" height="40" rx="2" fill="#5a4a30"/>
        <circle cx="0" cy="8" r="6" fill="rgba(255,150,50,0.4)"/>
        <circle cx="0" cy="6" r="3" fill="rgba(255,200,80,0.7)"/>
        <circle cx="0" cy="8" r="12" fill="rgba(255,150,50,0.08)"/>
      </g>`;
    } else if(t.lampStyle==='neon'){
      svg+=`<g transform="translate(${lx},${ly-55})">
        <rect x="-2" y="10" width="4" height="45" rx="2" fill="#4a3a6a"/>
        <rect x="-8" y="0" width="16" height="12" rx="3" fill="#6a5a8a" stroke="${t.lp}" stroke-width="0.5"/>
        <circle cx="0" cy="6" r="4" fill="${t.lp}" opacity="0.6"/>
        <ellipse cx="0" cy="55" rx="30" ry="20" fill="${t.lg}" opacity="0.15"/>
      </g>`;
    } else if(t.lampStyle==='golden'){
      svg+=`<g transform="translate(${lx},${ly-55})">
        <rect x="-3" y="10" width="6" height="45" rx="2" fill="#8a7a40"/>
        <rect x="-12" y="0" width="24" height="14" rx="4" fill="#b8960a" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <circle cx="0" cy="7" r="5" fill="rgba(255,220,100,0.7)"/>
        <ellipse cx="0" cy="55" rx="35" ry="25" fill="rgba(255,220,100,0.08)"/>
      </g>`;
    } else {
      svg+=`<g transform="translate(${lx},${ly-50})">
        <rect x="-2" y="10" width="4" height="40" rx="2" fill="#4a4060"/>
        <rect x="-8" y="2" width="16" height="10" rx="4" fill="#5a5070"/>
        <circle cx="0" cy="7" r="3" fill="rgba(255,220,150,0.6)"/>
        <ellipse cx="0" cy="50" rx="25" ry="18" fill="rgba(255,220,150,0.06)"/>
      </g>`;
    }
  });

  // 꽃/덤불/벤치
  const decoPos=[[620,650],[1500,650],[500,1100],[1600,1100],[1000,650],[1350,650]];
  decoPos.forEach(([dx,dy],i)=>{
    if(i%3===0) svg+=`<ellipse cx="${dx}" cy="${dy}" rx="18" ry="10" fill="${t.treeColor1}" opacity="0.6"/>`; // 덤불
    else if(i%3===1) svg+=`<rect x="${dx-14}" y="${dy}" width="28" height="8" rx="3" fill="#4a3a28" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>`; // 벤치
  });

  return svg;
}

/* ═══ 드래그 ═══ */
function initDrag(){
  const cont=document.getElementById('vc'),world=document.getElementById('vw');
  let drag=false,sx=0,sy=0,cx=0,cy=0,ox=0,oy=0,moved=false;
  const ww=window.innerWidth,wh=window.innerHeight;
  cx=-(2400/2-ww/2);cy=-(2000/2-wh/2);
  world.style.transform=`translate(${cx}px,${cy}px)`;

  function st(x,y){drag=true;sx=x;sy=y;ox=cx;oy=cy;moved=false;}
  function mv(x,y){if(!drag)return;const dx=x-sx,dy=y-sy;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;cx=ox+dx;cy=oy+dy;cx=Math.max(-(2400-ww+200),Math.min(200,cx));cy=Math.max(-(2000-wh+200),Math.min(200,cy));world.style.transform=`translate(${cx}px,${cy}px)`;}
  function en(){drag=false;}

  cont.addEventListener('mousedown',e=>{if(e.target.closest('.bld,.hdr-back,.mo'))return;st(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));
  window.addEventListener('mouseup',()=>{en();});
  cont.addEventListener('click',e=>{if(moved||e.target.closest('.bld,.hdr,.bot,.mo'))return;moveAv(e.clientX-cx,e.clientY-cy);});
  cont.addEventListener('touchstart',e=>{if(e.target.closest('.bld'))return;const tc=e.touches[0];st(tc.clientX,tc.clientY);},{passive:true});
  cont.addEventListener('touchmove',e=>{const tc=e.touches[0];mv(tc.clientX,tc.clientY);},{passive:true});
  cont.addEventListener('touchend',e=>{if(!moved){const tc=e.changedTouches[0];moveAv(tc.clientX-cx,tc.clientY-cy);}en();});
}

    <div class="mc"><div class="mc-t">📌 진행 중</div><div class="mc-c">${[{s:'투표중',c:'#34d399',t:'생일 카페 장소 선정',d:'잔여 18시간'},{s:'공감중',c:'#fbbf24',t:'슬로건 변경 제안',d:'공감 67/200'},{s:'확정',c:'#94a3b8',t:'총공 시간대 결정',d:'찬성 82%'}].map(v=>'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);"><span style="padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(255,255,255,.06);color:'+v.c+';">'+v.s+'</span><div><div style="font-size:11px;font-weight:500;">'+v.t+'</div><div style="font-size:9px;color:var(--muted);">'+v.d+'</div></div></div>').join('')}</div></div>`,
  wish:()=>`<div class="mo-h"><div class="mo-t">⭐ 소원의 신전</div><div class="mo-x" onclick="closeMo()">✕</div></div>
    <div class="mc"><div class="mc-t">🌟 메인 소원</div><div class="mc-c"><div style="text-align:center;font-size:32px;padding:10px 0;animation:monG 3s ease-in-out infinite;">⭐</div><div style="text-align:center;"><div style="font-size:13px;font-weight:700;color:var(--gold);">팬 생일 카페 이벤트</div><div class="pb" style="margin-top:8px;height:7px;"><div class="pf" style="width:64%"></div></div><div style="font-size:10px;color:var(--lp);margin-top:3px;font-family:Orbitron;">128,000 / 200,000</div></div></div></div>`,
  org:()=>`<div class="mo-h"><div class="mo-t">🏗️ 조직도 타워</div><div class="mo-x" onclick="closeMo()">✕</div></div>
    <div class="mc"><div class="mc-t">📊 조직 구조</div><div class="mc-c">${[{i:'🏰',n:'팬클럽',c:'98,432명',m:0},{i:'🏘️',n:'테리토리',c:'~20,000명',m:14},{i:'🏠',n:'베이스',c:'~2,000명',m:28},{i:'👥',n:'유닛 (내 소속)',c:'~200명',m:42,my:1},{i:'⭐',n:'아스트라',c:'나',m:56}].map(o=>'<div class="org-level'+(o.my?' my-org':'')+'" style="margin-left:'+o.m+'px;"><span style="font-size:14px;">'+o.i+'</span><b>'+o.n+'</b><span style="font-size:9px;color:var(--muted);margin-left:auto;">'+o.c+'</span></div>').join('')}</div></div>`,
  event:()=>`<div class="mo-h"><div class="mo-t">🎪 이벤트 광장</div><div class="mo-x" onclick="closeMo()">✕</div></div>
    <div class="mc"><div class="mc-t">🔥 진행 중</div><div class="mc-c"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:22px;">⚔️</span><div style="flex:1;"><div style="font-size:11px;font-weight:700;">라이벌 & 스탯킹</div><div style="font-size:9px;color:var(--muted);">3주차 대결!</div></div><span style="font-family:Orbitron;font-size:10px;color:var(--lp);">D-2</span></div></div></div>
    <div class="mc"><div class="mc-t">📊 화력 전선</div><div class="mc-c"><div class="pb" style="height:8px;"><div class="pf" style="width:${DEMO.energy}%"></div></div><div style="font-size:10px;color:var(--lp);margin-top:3px;">${DEMO.energy}%</div></div></div>`,
  honor:()=>`<div class="mo-h"><div class="mo-t">🏛️ 명예의 전당</div><div class="mo-x" onclick="closeMo()">✕</div></div>
    <div class="mc"><div class="mc-t">🏆 역대 MVP</div><div class="mc-c">${[{m:'🥇',t:'S3 활동왕',n:'StarWarrior'},{m:'🥇',t:'S3 성장왕',n:'RisingStar'},{m:'🌟',t:'S3 신인상',n:'BrightNewbie'}].map(h=>'<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);"><span style="font-size:16px;">'+h.m+'</span><div><div style="font-size:11px;font-weight:700;">'+h.t+'</div><div style="font-size:9px;color:var(--muted);">'+h.n+'</div></div></div>').join('')}</div></div>
    <div style="text-align:center;font-size:9px;color:var(--muted);margin-top:5px;">방문 보상: INT+1 (일 1회)</div>`
};
function openMo(k){if(!MO[k])return;document.getElementById('moC').innerHTML=MO[k]();document.getElementById('mo').classList.add('show');setTimeout(()=>{document.querySelectorAll('.pf').forEach(el=>{const w=el.style.width;el.style.width='0%';setTimeout(()=>el.style.width=w,50);});},100);}
function closeMo(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('mo').classList.remove('show');}

/* ═══ 유틸 ═══ */
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}
function goBack(){window.history.length>1?window.history.back():window.location.href='/';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMo();});

/* ═══ 초기화 ═══ */
window.addEventListener('DOMContentLoaded',()=>{
  renderVillage(DEMO.league);
  showData(DEMO);
  setWeather(DEMO.energy);
  initDrag();
  playEnt(DEMO.name);
  animNPC();
});

// 리그 전환 테스트: switchLeague('nova')
window.switchLeague=function(l){if(!LEAGUES[l])return;DEMO.league=l;renderVillage(l);showData(DEMO);showToast('🌟 '+LEAGUES[l].name+' 리그 - '+LEAGUES[l].villageName);};
</script>
</body>
</html>
