<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스타리움 STARIUM | ASTERIA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--lp:#fbbf24;--ls:#f59e0b;--lg:rgba(251,191,36,.3);--g1:#141828;--text:#e8e4f0;--muted:rgba(200,190,220,.5);--panel:rgba(10,10,22,.96);--border:rgba(180,150,255,.13);--gold:#f0c040}
html,body{height:100%;overflow:hidden;background:#0a0a14;color:var(--text);font-family:'Noto Sans KR',sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}

/* 헤더 제거됨 */

/* 마을 */
.vc{position:fixed;top:44px;left:0;right:0;bottom:44px;z-index:2;overflow:hidden;cursor:grab}.vc:active{cursor:grabbing}
.vw{position:absolute}
canvas{position:absolute;inset:0;z-index:1}
/* 건물 클릭 영역 */
.bld{position:absolute;cursor:pointer;z-index:10;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.bld:hover{transform:translateY(-6px) scale(1.03)}
.bld-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}
.bld-name{font-size:9px;font-weight:700;color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,.8)}
.bld-name-en{font-size:7px;color:var(--muted)}
.bld-badge{position:absolute;top:-5px;right:-5px;min-width:14px;height:14px;border-radius:7px;background:#ef4444;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid #0a0a14;z-index:15}

/* 아바타 */
.avatar{position:absolute;z-index:20;transition:left .7s ease-in-out,top .7s ease-in-out;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.av-body{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--lp),var(--ls));border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 0 10px var(--lg),0 2px 6px rgba(0,0,0,.5)}
.av-tag{font-size:6px;font-weight:700;background:rgba(0,0,0,.7);padding:1px 4px;border-radius:4px;margin-top:1px;color:#fff}
.avatar.walk .av-body{animation:avW .25s ease-in-out infinite alternate}
@keyframes avW{0%{transform:translateY(0) rotate(-4deg)}100%{transform:translateY(-3px) rotate(4deg)}}
.npc{position:absolute;z-index:14;display:flex;flex-direction:column;align-items:center;pointer-events:none;transition:left 4s ease-in-out,top 4s ease-in-out}
.npc-b{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:8px}
.npc-n{font-size:5px;color:var(--muted);margin-top:1px}

/* 하단 */
.bot{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:12px;padding:6px 16px;background:rgba(10,10,22,0.85);backdrop-filter:blur(8px);border:1px solid rgba(180,150,255,0.13);border-radius:20px;}
.bot-e{display:flex;flex-direction:column;align-items:center;gap:1px}
.bot-eb{width:90px;height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.bot-ef{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ls),var(--lp));box-shadow:0 0 4px var(--lg);transition:width 1s}
.bot-el{font-size:7px;color:var(--muted)}
.bot-d{padding:2px 8px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:9px;color:var(--gold);font-family:'Orbitron',monospace}

/* 모달 */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
.mo.show{display:flex;opacity:1}
.mo-c{width:88%;max-width:380px;max-height:76vh;background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow-y:auto;padding:20px 16px;transform:translateY(14px) scale(.96);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.mo.show .mo-c{transform:translateY(0) scale(1)}
.mo-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mo-t{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--lp)}
.mo-x{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--muted)}
.mc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px}
.mc-t{font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px}
.mc-c{font-size:10px;color:var(--muted);line-height:1.5}
.pb{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:4px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--ls),var(--lp));transition:width 1.5s}

.hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:50;padding:4px 12px;border-radius:12px;background:rgba(0,0,0,.7);border:1px solid var(--border);font-size:9px;color:var(--muted);opacity:0;transition:opacity 1s;pointer-events:none}.hint.show{opacity:1}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);padding:7px 16px;border-radius:14px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:11px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ent{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s}.ent.fo{opacity:0;pointer-events:none}
.ent-t{font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--lp);text-shadow:0 0 30px var(--lg);animation:ep 1.5s ease-in-out infinite}
.ent-s{font-size:11px;color:var(--muted);margin-top:5px;font-family:'Orbitron',monospace}
@keyframes ep{0%,100%{opacity:.4;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}

.top-nav {
  position:fixed; top:0; left:0; right:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  gap:28px;
  height:44px;
  background:rgba(10,10,22,0.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(180,150,255,0.13);
}
.top-nav-item {
  font-size:12px; font-weight:500;
  color:rgba(200,190,220,0.45);
  text-decoration:none;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:0.5px;
  padding:4px 2px;
  border-bottom:2px solid transparent;
}
.top-nav-item:hover { color:#e8e4f0; }
.top-nav-item.active {
  color:#c084fc; border-bottom-color:#c084fc;
}
/* 접이식 헤더 */
.fc-header {
  position:fixed;
  top:52px; left:12px;
  z-index:350;
  min-width:200px;
  max-width:260px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(180,150,255,0.18);
  backdrop-filter:blur(12px);
}
.fc-header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px;
  background:rgba(10,10,22,0.92);
  cursor:pointer;
  user-select:none;
}
.fc-header-name {
  font-family:'Orbitron',monospace;
  font-size:11px; font-weight:700;
  color:var(--lp);
  text-shadow:0 0 8px var(--lg);
}
.fc-header-rank {
  font-size:9px; color:var(--muted);
  display:flex; align-items:center; gap:4px;
  margin-top:2px;
}
.fc-header-stats {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:3px;
  font-size:9px;
  color:rgba(200,190,220,0.6);
  font-family:'Orbitron',monospace;
}
.fc-header-arrow {
  font-size:10px; color:var(--muted);
  transition:transform .3s;
}
.fc-header-arrow.open { transform:rotate(180deg); }
.fc-header-body {
  background:rgba(10,10,22,0.92);
  border-top:1px solid rgba(180,150,255,0.1);
  max-height:0; overflow:hidden;
  transition:max-height .35s ease;
}
.fc-header-body.open { max-height:200px; }
.fc-compare-row {
  padding:8px 12px;
  border-bottom:1px solid rgba(180,150,255,0.07);
}
.fc-compare-label {
  font-size:8px; color:var(--muted);
  margin-bottom:4px;
  display:flex; align-items:center; gap:3px;
}
.fc-compare-name {
  font-size:10px; font-weight:700; color:var(--text);
  margin-bottom:4px;
}
.fc-compare-bar-wrap {
  width:100%; height:5px;
  background:rgba(255,255,255,0.08);
  border-radius:3px; overflow:hidden;
  margin-bottom:3px;
}
.fc-compare-bar-fill {
  height:100%; border-radius:3px;
  background:linear-gradient(90deg, var(--ls), var(--lp));
  transition:width 1.2s ease;
}
.fc-compare-diff {
  font-size:8px; font-family:'Orbitron',monospace;
  color:var(--lp);
}
.fc-special {
  padding:8px 12px;
  font-size:9px; color:var(--gold);
  text-align:center;
  letter-spacing:0.5px;
}
/* 미니 이벤트 팝업 */
.mini-evt-float{position:absolute;z-index:25;pointer-events:none;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:12px;background:rgba(10,10,22,.85);border:1px solid var(--border);backdrop-filter:blur(4px);white-space:nowrap;animation:evtFloat 3.5s ease-out forwards}
.mini-evt-float .ei{font-size:12px}
.mini-evt-float .et{font-size:8px;color:var(--text)}
.mini-evt-float .en{color:var(--lp);font-weight:700}
@keyframes evtFloat{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}75%{opacity:1;transform:translateY(-8px)}100%{opacity:0;transform:translateY(-20px)}}
/* 리그 탭 제거됨 */
/* 미니 채팅창 */
/* 미니채팅창 공통 */
.mini-chat-window {
  position:fixed;
  z-index:500;
  width:260px;
  background:rgba(10,10,22,0.97);
  border:1px solid rgba(180,150,255,0.2);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  transition:box-shadow .2s;
}
.mini-chat-window:hover {
  box-shadow:0 12px 40px rgba(0,0,0,0.6);
}
.mini-chat-window.minimized .mcw-body,
.mini-chat-window.minimized .mcw-footer {
  display:none;
}

/* 미니채팅창 헤더 */
.mcw-hdr {
  display:flex;
  align-items:center;
  padding:8px 10px;
  gap:6px;
  cursor:move;
  user-select:none;
  border-bottom:1px solid rgba(180,150,255,0.1);
  flex-shrink:0;
}
.mcw-dot {
  width:8px; height:8px;
  border-radius:50%;
  flex-shrink:0;
  animation:p 2s infinite;
}
.mcw-title {
  flex:1;
  font-size:10px;
  font-weight:700;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.mcw-btns {
  display:flex;
  gap:4px;
}
.mcw-btn {
  width:20px; height:20px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(180,150,255,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; cursor:pointer;
  color:var(--muted);
  transition:.2s;
  flex-shrink:0;
}
.mcw-btn:hover { background:rgba(255,255,255,0.14); }

/* 미니채팅창 바디 */
.mcw-body {
  height:180px;
  overflow-y:auto;
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.mcw-body::-webkit-scrollbar { width:3px; }
.mcw-body::-webkit-scrollbar-thumb {
  background:rgba(180,150,255,0.2);
  border-radius:2px;
}
.mcw-msg {
  display:flex;
  flex-direction:column;
  max-width:85%;
}
.mcw-msg.me { align-self:flex-end; align-items:flex-end; }
.mcw-msg.other { align-self:flex-start; }
.mcw-msg-name {
  font-size:7px;
  color:var(--muted);
  margin-bottom:2px;
}
.mcw-msg-bubble {
  padding:5px 9px;
  border-radius:10px;
  font-size:9px;
  line-height:1.5;
  color:var(--text);
  word-break:break-word;
}
.mcw-msg.other .mcw-msg-bubble {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(180,150,255,0.1);
  border-bottom-left-radius:2px;
}
.mcw-msg.me .mcw-msg-bubble {
  background:rgba(192,132,252,0.2);
  border:1px solid rgba(192,132,252,0.25);
  border-bottom-right-radius:2px;
}

/* 미니채팅창 푸터 */
.mcw-footer {
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 8px;
  border-top:1px solid rgba(180,150,255,0.1);
  flex-shrink:0;
}
.mcw-input {
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(180,150,255,0.15);
  border-radius:14px;
  padding:5px 10px;
  font-size:9px;
  color:var(--text);
  outline:none;
  font-family:'Noto Sans KR',sans-serif;
}
.mcw-input::placeholder { color:var(--muted); }
.mcw-send {
  width:26px; height:26px;
  border-radius:50%;
  border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
  cursor:pointer;
  transition:.2s;
  flex-shrink:0;
}
.mcw-send:hover { transform:scale(1.1); }

/* 팬클럽 본부 채팅방 목록 */
.hq-chat-list {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:4px;
}
.hq-chat-btn {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(180,150,255,0.1);
  cursor:pointer;
  transition:all .2s;
}
.hq-chat-btn:hover {
  background:rgba(255,255,255,0.08);
  border-color:rgba(180,150,255,0.25);
  transform:translateX(3px);
}
.hq-chat-btn-dot {
  width:8px; height:8px;
  border-radius:50%;
  flex-shrink:0;
}
.hq-chat-btn-label {
  font-size:10px;
  font-weight:600;
  color:var(--text);
  flex:1;
}
.hq-chat-btn-count {
  font-size:8px;
  color:var(--muted);
  font-family:'Orbitron',monospace;
}

/* 팬클럽 전체채팅 하단 고정바 */
.fc-chat-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:350;
  height:44px;
  background:rgba(10,10,22,0.96);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(180,150,255,0.18);
  display:flex; align-items:center;
  padding:0 16px; gap:10px;
  cursor:pointer;
  transition:background .2s;
}
.fc-chat-bar:hover { background:rgba(20,20,40,0.98); }
.fc-chat-bar-icon { font-size:16px; }
.fc-chat-bar-label {
  font-size:11px; font-weight:600;
  color:rgba(200,190,220,0.7);
  flex:1;
}
.fc-chat-bar-count {
  font-size:9px;
  color:var(--lp);
  font-family:'Orbitron',monospace;
  display:flex; align-items:center; gap:4px;
}
.fc-chat-bar-dot {
  width:5px; height:5px; border-radius:50%;
  background:#34d399;
  animation:p 2s infinite;
}

/* 채팅 전체 패널 */
.chat-panel {
  position:fixed; top:44px; right:0; bottom:44px;
  width:0; z-index:300;
  background:rgba(10,10,22,0.97);
  backdrop-filter:blur(16px);
  border-left:1px solid rgba(180,150,255,0.15);
  display:flex; flex-direction:column;
  overflow:hidden;
  transition:width .35s cubic-bezier(.4,0,.2,1);
}
.chat-panel.open { width:320px; }
@media(max-width:600px){
  .chat-panel.open { width:100vw; }
}
.chat-panel-hdr {
  display:flex; align-items:center;
  padding:10px 14px; gap:10px;
  border-bottom:1px solid rgba(180,150,255,0.13);
  background:rgba(255,255,255,0.03);
  min-height:48px;
}
.chat-panel-title {
  flex:1; font-size:12px; font-weight:700;
  color:var(--lp); font-family:'Orbitron',monospace;
}
.chat-panel-close {
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(180,150,255,0.13);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; cursor:pointer; color:var(--muted);
}

/* 모임 경로 브레드크럼 */
.chat-breadcrumb {
  display:flex; align-items:center;
  padding:8px 14px; gap:4px;
  border-bottom:1px solid rgba(180,150,255,0.1);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  flex-shrink:0;
}
.chat-breadcrumb::-webkit-scrollbar { display:none; }
.chat-bc-item {
  display:flex; align-items:center; gap:4px;
  white-space:nowrap;
}
.chat-bc-btn {
  padding:4px 10px; border-radius:12px;
  font-size:9px; font-weight:600;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(180,150,255,0.15);
  color:rgba(200,190,220,0.6);
  cursor:pointer; transition:all .2s;
  white-space:nowrap;
}
.chat-bc-btn:hover,
.chat-bc-btn.active {
  background:rgba(192,132,252,0.15);
  border-color:var(--lp);
  color:var(--lp);
}
.chat-bc-arrow {
  font-size:8px; color:var(--muted);
}

/* 채팅 메시지 영역 */
.chat-body {
  flex:1; overflow-y:auto;
  padding:10px 12px;
  display:flex; flex-direction:column; gap:8px;
}
.chat-body::-webkit-scrollbar { width:3px; }
.chat-body::-webkit-scrollbar-thumb {
  background:rgba(180,150,255,0.2); border-radius:2px;
}
.chat-msg {
  display:flex; align-items:flex-start; gap:7px;
}
.chat-msg.me { flex-direction:row-reverse; }
.chat-msg-avatar {
  width:24px; height:24px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; flex-shrink:0;
  border:1px solid rgba(255,255,255,0.1);
}
.chat-msg-body { max-width:75%; }
.chat-msg-name {
  font-size:8px; color:var(--muted);
  margin-bottom:2px;
}
.chat-msg.me .chat-msg-name { text-align:right; }
.chat-msg-bubble {
  padding:6px 10px; border-radius:12px;
  font-size:10px; line-height:1.5; color:var(--text);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(180,150,255,0.1);
  word-break:break-word;
}
.chat-msg.me .chat-msg-bubble {
  background:rgba(192,132,252,0.2);
  border-color:rgba(192,132,252,0.3);
}
.chat-msg-time {
  font-size:7px; color:var(--muted);
  margin-top:2px;
}
.chat-msg.me .chat-msg-time { text-align:right; }

/* 채팅 입력 */
.chat-footer {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px;
  border-top:1px solid rgba(180,150,255,0.1);
}
.chat-input {
  flex:1; background:rgba(255,255,255,0.05);
  border:1px solid rgba(180,150,255,0.15);
  border-radius:20px; padding:7px 14px;
  font-size:10px; color:var(--text);
  outline:none; font-family:'Noto Sans KR',sans-serif;
}
.chat-input::placeholder { color:var(--muted); }
.chat-send {
  width:32px; height:32px; border-radius:50%;
  background:var(--lp); border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; cursor:pointer; transition:.2s;
  flex-shrink:0;
}
.chat-send:hover { transform:scale(1.1); }

/* 말풍선 */

function openMiniChatWindow(roomId, roomName, color) {
  const existing = miniChatWindows.find(w => w.roomId === roomId);
  if (existing) {
    existing.el.style.zIndex = ++miniChatZIndex;
    existing.el.classList.remove('minimized');
    return;
  }
  if (miniChatWindows.length >= 5) {
    const oldest = miniChatWindows.shift();
    oldest.el.remove();
  }
  const offset = miniChatWindows.length * 28;
  const startX = Math.min(window.innerWidth - 280, 80 + offset);
  const startY = Math.min(window.innerHeight - 320, 80 + offset);

  const win = document.createElement('div');
  win.className = 'mini-chat-window';
  win.style.cssText = `left:${startX}px;top:${startY}px;border-color:${color}44;`;

      <div class="mcw-title">💬 ${roomName}</div>

        <div class="mcw-btn" onclick="closeMcw(this)">✕</div>

      <button class="mcw-send" style="background:${color}"
        onclick="sendMcwMsg('${roomId}','${color}')">➤</button>
    </div>`;
  document.body.appendChild(win);
  miniChatWindows.push({ roomId, el: win });
  loadMcwMsgs(roomId, color);

  /* 현재 인원수 표시 */
  const currentCount = roomCounts[roomId] || 0;
  if (currentCount > 0) {
    setTimeout(() => updateOpenWindowCount(roomId, currentCount), 100);
  }

  /* Socket.IO로 room 인원수 요청 */
  if (socket && socket.connected) {
    const league = DM.league;
    const roomName = roomId === 'all' ? 'global' : `org:${roomId.replace('org', '')}`;

      .then(r => r.json())
      .then(data => {

/* ═══ 목업 메시지 로드 ═══ */
function loadMcwMsgs(roomId, color) {
  const body = document.getElementById('mcwBody_' + roomId);
  if (!body) return;
  body.innerHTML = '';
  const count = 4 + Math.floor(Math.random() * 3);
  const names = [...CHAT_MOCK_NAMES]
    .sort(() => Math.random() - 0.5).slice(0, count);
  const msgs = [
    '안녕하세요! 💜','오늘 미션 같이해요!','화이팅!! 🔥',
    '스밍 고고~','반가워요 👋','우리 팬클럽 최고 ✨',
    '오늘도 열심히!','레벨업 했어요 🎉'
  ];
  names.forEach((name, i) => {
    const isMe = i === names.length - 1;
    const time = new Date(Date.now() - (names.length - i) * 120000);
    const timeStr = time.getHours() + ':' +
      String(time.getMinutes()).padStart(2, '0');
    const msg = isMe ? '안녕하세요! 👋' :
      msgs[Math.floor(Math.random() * msgs.length)];
    const el = document.createElement('div');
    el.className = 'mcw-msg ' + (isMe ? 'me' : 'other');
    el.innerHTML = `
      ${!isMe ? `<div class="mcw-msg-name"
        style="color:${color}">${name}</div>` : ''}
      <div class="mcw-msg-bubble">${msg}</div>
      <div style="font-size:7px;color:var(--muted);margin-top:1px;
        ${isMe ? 'text-align:right' : ''}">${timeStr}</div>`;
    body.appendChild(el);
  });
  body.scrollTop = body.scrollHeight;
}

/* ═══ 메시지 전송 ═══ */
function sendMcwMsg(roomId, color) {
  const input = document.getElementById('mcwInput_' + roomId);
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  const body = document.getElementById('mcwBody_' + roomId);
  if (!body) return;
  const time = new Date();
  const timeStr = time.getHours() + ':' +    String(time.getMinutes()).padStart(2, '0');
  const el = document.createElement('div');
  el.className = 'mcw-msg me';
  el.innerHTML = `
    <div class="mcw-msg-bubble">${msg}</div>
    <div style="font-size:7px;color:var(--muted);
      margin-top:1px;text-align:right">${timeStr}</div>`;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
  input.value = '';
  showSpeechBubble('myAv', '나', msg, true);
  setTimeout(() => {
    const replies = [
      '맞아요! 💜','오~ 좋아요 ✨','화이팅!! 🔥',
      '저도요! 😊','완전 공감 💫','같이해요~ 👋'
    ];
    const name = CHAT_MOCK_NAMES[
      Math.floor(Math.random() * CHAT_MOCK_NAMES.length)];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    const replyEl = document.createElement('div');
    replyEl.className = 'mcw-msg other';
    replyEl.innerHTML = `
      <div class="mcw-msg-name" style="color:${color}">${name}</div>
      <div class="mcw-msg-bubble">${reply}</div>`;
    body.appendChild(replyEl);
    body.scrollTop = body.scrollHeight;
    const npcIdx = Math.floor(Math.random() * 5);
    showNpcBubble(npcIdx, reply);
  }, 1000 + Math.random() * 1500);
}

/* ═══ 최소화/닫기 ═══ */
function minimizeMcw(btn) {
  const win = btn.closest('.mini-chat-window');
  if (!win) return;
  win.classList.toggle('minimized');
  btn.textContent = win.classList.contains('minimized') ? '□' : '_';
}

function closeMcw(btn) {
  const win = btn.closest('.mini-chat-window');
  if (!win) return;
  const idx = miniChatWindows.findIndex(w => w.el === win);
  if (idx !== -1) miniChatWindows.splice(idx, 1);
  win.remove();
}

/* ═══ 드래그 ═══ */
function initMcwDrag(win) {
  const hdr = win.querySelector('.mcw-hdr');
  let isDrag = false;
  let startX = 0, startY = 0, origX = 0, origY = 0;
  hdr.addEventListener('mousedown', e => {
    if (e.target.closest('.mcw-btn')) return;
    isDrag = true;
    startX = e.clientX; startY = e.clientY;
    const rect = win.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
    win.style.transition = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!isDrag) return;
    win.style.left = (origX + e.clientX - startX) + 'px';
    win.style.top = (origY + e.clientY - startY) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!isDrag) return;
    isDrag = false;
    win.style.transition = 'box-shadow .2s';
  });
  hdr.addEventListener('touchstart', e => {
    if (e.target.closest('.mcw-btn')) return;
    isDrag = true;
    const tc = e.touches[0];
    startX = tc.clientX; startY = tc.clientY;
    const rect = win.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
  }, { passive:true });  document.addEventListener('touchmove', e => {
    if (!isDrag) return;
    const tc = e.touches[0];
    win.style.left = (origX + tc.clientX - startX) + 'px';
    win.style.top = (origY + tc.clientY - startY) + 'px';
  }, { passive:true });
  document.addEventListener('touchend', () => { isDrag = false; });
}

function calcBLD(league){
  const sc=SCALE[league]||1;
  BLD=BLD_BASE.map(b=>({
    id:b.id,
    x:Math.round(b.rx*W),
    y:Math.round(b.ry*H),
    w:Math.round(b.rw*W*sc),
    h:Math.round(b.rh*H*sc),
    nK:b.nK,
    nE:b.nE
  }));
}

let cv,ctx,t,anim;

function init(){
  cv=document.getElementById('cv');ctx=cv.getContext('2d');
  cv.width=W;cv.height=H;
  document.getElementById('vw').style.width=W+'px';
  document.getElementById('vw').style.height=H+'px';
}

/* ═══ 메인 드로잉 ═══ */
function draw(){
  if(!t)return;
  ctx.clearRect(0,0,W,H);
  drawSky();drawGround();drawRoads();drawPlaza();
  drawPond();drawBridge();drawFlowers();
  drawBuildings();drawLamps();drawMonument();drawGate();drawProps();
  drawSmoke();drawParticles();
  anim=requestAnimationFrame(draw);
}

function drawSky(){
  const skyH=H*.45;
  const g=ctx.createLinearGradient(0,0,0,skyH);
  g.addColorStop(0,t.sky[0]);g.addColorStop(1,t.ground);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,skyH);
  const time=Date.now()/1000;
  const league=DM.league;

  // === 별 (공통, 개수만 차등) ===
  const starCount=t.stars||80;
  for(let i=0;i<starCount;i++){
    const sx=(i*137.5)%W,sy=(i*97.3)%(skyH);
    const a=.15+Math.sin(time*.5+i)*(.2+(t.sBright||.5)*.3);
    ctx.globalAlpha=Math.max(0,a);ctx.fillStyle='#fff';
    const starR=i%10===0?1.5:0.8;
    ctx.beginPath();ctx.arc(sx,sy,starR,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  if(league==='dust'){
    // 먼지 안개 레이어
    for(let i=0;i<3;i++){
      const fogY=skyH*.3+i*skyH*.15;
      const fg=ctx.createLinearGradient(0,fogY,0,fogY+skyH*.2);
      fg.addColorStop(0,'transparent');
      fg.addColorStop(.5,'rgba(80,70,50,.04)');
      fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;
      ctx.fillRect(0,fogY,W,skyH*.2);
    }
    // 유성 1개 (느리게)
    const mPhase=(time*.08)%1;
    if(mPhase<.3){
      const mx=W*.2+mPhase*W*.6,my=skyH*.1+mPhase*skyH*.5;
      ctx.globalAlpha=.3*(1-mPhase/.3);
      ctx.strokeStyle='#aa9060';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx-30,my-15);ctx.stroke();
      ctx.fillStyle='#aa9060';ctx.beginPath();ctx.arc(mx,my,1.2,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }

  } else if(league==='star'){
    // 은하수 (희미한 띠)
    ctx.save();
    ctx.globalAlpha=.06;
    const mgrd=ctx.createLinearGradient(W*.1,0,W*.9,skyH);
    mgrd.addColorStop(0,'transparent');mgrd.addColorStop(.3,'#ffeedd');
    mgrd.addColorStop(.5,'#ffe8cc');mgrd.addColorStop(.7,'#ffeedd');
    mgrd.addColorStop(1,'transparent');
    ctx.fillStyle=mgrd;
    ctx.beginPath();
    ctx.moveTo(W*.05,0);ctx.quadraticCurveTo(W*.3,skyH*.4,W*.5,skyH*.5);
    ctx.quadraticCurveTo(W*.7,skyH*.6,W*.95,skyH*.2);
    ctx.lineTo(W*.9,skyH*.15);ctx.quadraticCurveTo(W*.65,skyH*.5,W*.45,skyH*.45);
    ctx.quadraticCurveTo(W*.25,skyH*.35,W*.1,0);
    ctx.closePath();ctx.fill();
    ctx.restore();
    // 유성 가끔
    const mP2=(time*.12)%1;
    if(mP2<.2){
      const mx=W*.3+mP2*W*.5,my=skyH*.05+mP2*skyH*.4;
      ctx.globalAlpha=.4*(1-mP2/.2);      ctx.strokeStyle='#ffd700';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx-40,my-18);ctx.stroke();
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(mx,my,1.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }

  } else if(league==='planet'){
    // 거대 고리 행성
    const px=W*.75,py=skyH*.3,pr=skyH*.28;
    // 행성 본체
    const pgrd=ctx.createRadialGradient(px-pr*.2,py-pr*.1,0,px,py,pr);
    pgrd.addColorStop(0,'#1a4a3a');pgrd.addColorStop(.5,'#0e3028');
    pgrd.addColorStop(1,'#082018');
    ctx.fillStyle=pgrd;
    ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fill();
    // 행성 대기
    ctx.strokeStyle='rgba(52,211,153,.08)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px,py,pr+3,0,Math.PI*2);ctx.stroke();
    // 행성 줄무늬
    ctx.globalAlpha=.06;
    for(let i=-3;i<=3;i++){
      ctx.strokeStyle='#40e0a0';ctx.lineWidth=2;
      ctx.beginPath();
      const sy2=py+i*pr*.18;
      ctx.moveTo(px-pr*.9,sy2);ctx.quadraticCurveTo(px,sy2+i*2,px+pr*.9,sy2);ctx.stroke();
    }
    ctx.globalAlpha=1;
    // 고리 (앞쪽)
    ctx.strokeStyle='rgba(52,211,153,.12)';ctx.lineWidth=8;
    ctx.beginPath();ctx.ellipse(px,py,pr*1.7,pr*.25,.15,Math.PI*.05,Math.PI*.95);ctx.stroke();
    ctx.strokeStyle='rgba(52,211,153,.06)';ctx.lineWidth=4;
    ctx.beginPath();ctx.ellipse(px,py,pr*1.9,pr*.3,.15,Math.PI*.1,Math.PI*.9);ctx.stroke();
    // 행성 그림자 (고리 뒷부분 가림)
    ctx.fillStyle=pgrd;
    ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fill();
    // 고리 (뒤쪽)
    ctx.strokeStyle='rgba(52,211,153,.08)';ctx.lineWidth=6;
    ctx.beginPath();ctx.ellipse(px,py,pr*1.7,pr*.25,.15,Math.PI*1.05,Math.PI*1.95);ctx.stroke();

  } else if(league==='nova'){
    // 오로라 물결
    for(let i=0;i<4;i++){
      const ay=skyH*(.15+i*.12);
      const wave=Math.sin(time*.3+i*.8)*skyH*.05;
      ctx.globalAlpha=.04+Math.sin(time*.5+i)*.02;
      const agrd=ctx.createLinearGradient(0,ay+wave,0,ay+wave+skyH*.15);
      const colors=[
        ['#c084fc','#a855f7','#7c3aed'],
        ['#818cf8','#6366f1','#4f46e5'],
        ['#c084fc','#d946ef','#a855f7'],
        ['#38bdf8','#818cf8','#c084fc']
      ][i];
      agrd.addColorStop(0,'transparent');agrd.addColorStop(.3,colors[0]);
      agrd.addColorStop(.6,colors[1]);agrd.addColorStop(1,'transparent');
      ctx.fillStyle=agrd;
      ctx.beginPath();
      ctx.moveTo(0,ay+wave);
      for(let x=0;x<=W;x+=W/20){
        const yy=ay+wave+Math.sin(time*.4+x*.003+i*1.5)*skyH*.06;
        ctx.lineTo(x,yy);
      }
      for(let x=W;x>=0;x-=W/20){
        const yy=ay+wave+skyH*.15+Math.sin(time*.3+x*.004+i)*skyH*.04;
        ctx.lineTo(x,yy);
      }
      ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;

  } else if(league==='quasar'){
    // 황금빛 은하수 (굵고 밝게)
    ctx.save();
    ctx.globalAlpha=.1;
    const mgrd=ctx.createLinearGradient(0,0,W,skyH);
    mgrd.addColorStop(0,'transparent');mgrd.addColorStop(.2,'#f0c040');
    mgrd.addColorStop(.4,'#ffe080');mgrd.addColorStop(.6,'#f0c040');
    mgrd.addColorStop(.8,'#ffe080');mgrd.addColorStop(1,'transparent');
    ctx.fillStyle=mgrd;
    ctx.beginPath();
    ctx.moveTo(0,skyH*.1);
    ctx.bezierCurveTo(W*.2,skyH*.5,W*.4,skyH*.15,W*.5,skyH*.4);
    ctx.bezierCurveTo(W*.6,skyH*.65,W*.8,skyH*.2,W,skyH*.35);
    ctx.lineTo(W,skyH*.25);
    ctx.bezierCurveTo(W*.75,skyH*.1,W*.55,skyH*.55,W*.45,skyH*.3);
    ctx.bezierCurveTo(W*.35,skyH*.05,W*.15,skyH*.4,0,skyH*.02);
    ctx.closePath();ctx.fill();
    ctx.restore();
    // 별자리 라인 연결
    ctx.strokeStyle='rgba(240,192,64,.08)';ctx.lineWidth=.5;
    const constellations=[
      [[W*.1,skyH*.15],[W*.15,skyH*.1],[W*.2,skyH*.18],[W*.18,skyH*.25]],
      [[W*.55,skyH*.08],[W*.6,skyH*.15],[W*.65,skyH*.05],[W*.7,skyH*.12]],
      [[W*.8,skyH*.2],[W*.85,skyH*.12],[W*.9,skyH*.22],[W*.88,skyH*.3]]
    ];
    constellations.forEach(pts=>{
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.stroke();
      pts.forEach(([px,py])=>{
        ctx.fillStyle='#f0c040';ctx.globalAlpha=.6;
        ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      });
    });
    // 유성우 (3개 동시)
    for(let m=0;m<3;m++){      const mP=(time*.15+m*.33)%1;
      if(mP<.25){
        const mmx=W*(.1+m*.3)+mP*W*.3,mmy=skyH*.05+mP*skyH*.5;
        ctx.globalAlpha=.5*(1-mP/.25);
        ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(mmx,mmy);ctx.lineTo(mmx-50,mmy-22);ctx.stroke();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(mmx,mmy,2,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
}

function drawGround(){
  ctx.fillStyle=t.ground;ctx.fillRect(0,H*.35,W,H*.65);
  // 잔디 그라데이션
  const patches=[[200,500,300,200],[1500,450,350,250],[250,1100,280,180],[1550,1050,300,200]];
  patches.forEach(([x,y,w,h])=>{
    const g=ctx.createRadialGradient(x+w/2,y+h/2,0,x+w/2,y+h/2,w/2);
    g.addColorStop(0,t.groundAlt+'80');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  });
}

function drawRoads(){
  ctx.lineWidth=1.5;
  const roads=[
    [W*.08,H*.44,W*.84,32],[W*.08,H*.56,W*.84,32],
    [W*.3,H*.24,32,H*.53],[W*.68,H*.24,32,H*.53],
    [W*.22,H*.66,W*.56,28],
  ];
  roads.forEach(([x,y,w,h])=>{
    ctx.fillStyle=t.roadColor;ctx.strokeStyle=t.roadLine;
    ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();ctx.stroke();
    // 점선 중앙선
    ctx.setLineDash([8,6]);ctx.strokeStyle=t.roadLine+'80';ctx.lineWidth=.5;
    if(w>h){ctx.beginPath();ctx.moveTo(x+10,y+h/2);ctx.lineTo(x+w-10,y+h/2);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(x+w/2,y+10);ctx.lineTo(x+w/2,y+h-10);ctx.stroke();}
    ctx.setLineDash([]);ctx.lineWidth=1.5;
  });
}

function drawPlaza(){
  const mx=W/2,my=H/2;
  const league=DM.league;
  const time=Date.now()/1000;

  if(league==='dust'){
    // 더스트: 모닥불 둘러싼 모래바닥 원형
    ctx.fillStyle=t.plazaColor;
    ctx.beginPath();ctx.ellipse(mx,my,200,160,0,0,Math.PI*2);ctx.fill();
    // 모래 텍스처 점
    ctx.fillStyle='rgba(255,255,255,.02)';
    for(let i=0;i<30;i++){
      const a=i*Math.PI*2/30,r=40+i*4.5;
      ctx.beginPath();ctx.arc(mx+Math.cos(a)*r,my+Math.sin(a)*r*.8,1,0,Math.PI*2);ctx.fill();
    }
    // 돌 테두리
    ctx.fillStyle=t.plazaLine;
    for(let i=0;i<20;i++){
      const a=i*Math.PI*2/20,r=195;
      ctx.beginPath();ctx.ellipse(mx+Math.cos(a)*r,my+Math.sin(a)*r*.8,5,3.5,a,0,Math.PI*2);ctx.fill();
    }
  } else if(league==='star'){
    // 스타: 벽돌 포장 광장
    ctx.fillStyle=t.plazaColor;ctx.strokeStyle=t.plazaLine;ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(mx,my,260,200,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle=t.plazaLine+'60';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(mx,my,180,140,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(mx,my,100,80,0,0,Math.PI*2);ctx.stroke();
    // 방사형 벽돌 패턴
    ctx.strokeStyle=t.plazaLine+'30';ctx.lineWidth=.5;
    for(let a=0;a<Math.PI*2;a+=Math.PI/8){
      ctx.beginPath();ctx.moveTo(mx+Math.cos(a)*50,my+Math.sin(a)*40);
      ctx.lineTo(mx+Math.cos(a)*250,my+Math.sin(a)*195);ctx.stroke();
    }  } else if(league==='planet'){
    // 플래닛: 네온 타일 광장
    ctx.fillStyle=t.plazaColor;ctx.strokeStyle=t.plazaLine;ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(mx,my,260,200,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    // 육각형 타일 패턴
    ctx.strokeStyle=t.lp+'12';ctx.lineWidth=.5;
    for(let row=-4;row<=4;row++){
      for(let col=-5;col<=5;col++){        const hx=mx+col*40+(row%2)*20,hy=my+row*35;
        const dist=Math.sqrt(((hx-mx)/260)**2+((hy-my)/200)**2);
        if(dist>1)continue;
        ctx.beginPath();
        for(let i=0;i<6;i++){          const a=i*Math.PI/3-Math.PI/6;
          const px=hx+Math.cos(a)*18,py=hy+Math.sin(a)*18;
i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.closePath();ctx.stroke();
      }
    }
    // 네온 빛
    const g=ctx.createRadialGradient(mx,my,0,mx,my,280);
    g.addColorStop(0,t.lg);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(mx,my,280,220,0,0,Math.PI*2);ctx.fill();
  } else if(league==='nova'){
    // 노바: 홀로그램 광장
    ctx.fillStyle=t.plazaColor;ctx.strokeStyle=t.plazaLine;ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(mx,my,260,200,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    // 동심원 네온 펄스
    for(let i=0;i<5;i++){
      const pulse=(time*.3+i*.2)%1;
      const r=50+pulse*210;
      ctx.strokeStyle=t.lp+(Math.floor((1-pulse)*40)).toString(16).padStart(2,'0');
      ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(mx,my,r,r*.77,0,0,Math.PI*2);ctx.stroke();
    }
    // 빛    const g=ctx.createRadialGradient(mx,my,0,mx,my,300);
    g.addColorStop(0,t.lg);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(mx,my,300,230,0,0,Math.PI*2);ctx.fill();
  } else if(league==='quasar'){
    // 퀘이사: 황금 대광장
    ctx.fillStyle=t.plazaColor;ctx.strokeStyle=t.plazaLine;ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(mx,my,280,220,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    // 이중 테두리
    ctx.strokeStyle='#f0c04020';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(mx,my,270,212,0,0,Math.PI*2);ctx.stroke();
    // 별 모양 포장 패턴
    ctx.strokeStyle='#f0c04015';ctx.lineWidth=.8;
    for(let i=0;i<12;i++){
      const a=i*Math.PI/6;
      ctx.beginPath();ctx.moveTo(mx,my);
      ctx.lineTo(mx+Math.cos(a)*270,my+Math.sin(a)*212);ctx.stroke();
    }
    ctx.beginPath();ctx.ellipse(mx,my,180,140,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(mx,my,90,70,0,0,Math.PI*2);ctx.stroke();
    // 황금빛
    const g=ctx.createRadialGradient(mx,my,0,mx,my,320);
    g.addColorStop(0,'rgba(240,192,64,.15)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(mx,my,320,250,0,0,Math.PI*2);ctx.fill();
  }
}

function drawPond(){
  const px=W*.83,py=H*.59,pw=W*.05,ph=H*.038;
  const time=Date.now()/1000;
  // 물
  const g=ctx.createRadialGradient(px,py,0,px,py,pw/2);
  g.addColorStop(0,'rgba(40,80,140,.35)');g.addColorStop(1,'rgba(20,40,80,.15)');
  ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(px,py,pw/2,ph/2,0,0,Math.PI*2);ctx.fill();
  // 물결
  for(let i=0;i<3;i++){
    const r=15+i*14+Math.sin(time*.8+i)*4;
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.ellipse(px,py,r,r*.6,0,0,Math.PI*2);ctx.stroke();
  }
  // 반짝임
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.beginPath();ctx.arc(px-15+Math.sin(time)*5,py-10,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+10+Math.cos(time*1.3)*4,py+5,1,0,Math.PI*2);ctx.fill();
}

function drawBridge(){
  ctx.fillStyle=t.roadColor;
  const bx=W*.8,by2=H*.585;
  ctx.beginPath();ctx.roundRect(bx,by2,W*.025,14,3);ctx.fill();
  ctx.strokeStyle=t.roadLine;ctx.lineWidth=1;ctx.stroke();
  // 난간
  ctx.fillRect(bx+5,by2-6,3,8);ctx.fillRect(bx+W*.025-8,by2-6,3,8);
  ctx.fillRect(bx+4,by2-7,W*.025-8,2);
}

/* 꽃 위치를 미리 생성 (매 프레임 Math.random 호출 방지) */
let flowerCache=null;
function initFlowers(){
  flowerCache=[];
  const beds=[[W*.18,H*.42,W*.04],[W*.79,H*.42,W*.035],[W*.19,H*.6,W*.03],[W*.77,H*.6,W*.033],[W*.35,H*.68,W*.035],[W*.6,H*.68,W*.033]];
  beds.forEach(([fx,fy,fw])=>{
    for(let i=0;i<6;i++){
      flowerCache.push({
        cx:fx-fw/2+Math.random()*fw,cy:fy-10+Math.random()*20,
        sz:2+Math.random()*2.5,useColor1:Math.random()>.5
      });
    }
  });
}
function drawFlowers(){
  if(!flowerCache)initFlowers();
  flowerCache.forEach(f=>{
    ctx.fillStyle=f.useColor1?t.flower1:t.flower2;
    ctx.beginPath();ctx.arc(f.cx,f.cy,f.sz,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=t.groundAlt;ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(f.cx,f.cy+f.sz);ctx.lineTo(f.cx,f.cy+f.sz+4);ctx.stroke();
  });
}

function drawBuildings(){
  BLD.forEach((b,i)=>{
    const{x,y,w,h}=b;

    /* org_chat 건물은 별도 처리 */
    if(b.id==='org_chat'){
      drawOrgChatBuilding(x,y,w,h);
      return;
    }

    const s=t.buildings[i];
    if(!s) return; /* 안전장치 */
    const league=DM.league;
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath();ctx.ellipse(x+w/2,y+h+8,w*.5,10,0,0,Math.PI*2);ctx.fill();
    if(league==='dust') drawDustBuilding(x,y,w,h,s,b);
    else if(league==='star') drawStarBuilding(x,y,w,h,s,b);
    else if(league==='planet') drawPlanetBuilding(x,y,w,h,s,b);
    else if(league==='nova') drawNovaBuilding(x,y,w,h,s,b);
    else if(league==='quasar') drawQuasarBuilding(x,y,w,h,s,b);
    if(t.extraGlow){
      const bg=ctx.createRadialGradient(x+w/2,y+h+5,0,x+w/2,y+h+5,w*.6);
      bg.addColorStop(0,t.lg);bg.addColorStop(1,'transparent');
      ctx.fillStyle=bg;ctx.fillRect(x-w*.1,y+h,w*1.2,20);
    }
  });
}

function drawOrgChatBuilding(x,y,w,h){
  const time=Date.now()/1000;
  const league=DM.league;
  const lp=t.lp;
  const lg=t.lg;

  /* 그림자 */
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(x+w/2,y+h+8,w*.55,11,0,0,Math.PI*2);ctx.fill();

  /* 건물 본체 — 리그 테마색 적용 */
  const wallGrd=ctx.createLinearGradient(x,y,x,y+h);
  wallGrd.addColorStop(0,t.plazaLine);
  wallGrd.addColorStop(1,t.roadColor);
  ctx.fillStyle=wallGrd;
  ctx.beginPath();ctx.roundRect(x,y+h*.25,w,h*.75,[3,3,0,0]);ctx.fill();

  /* 지붕 — 둥근 돔 형태 */
  ctx.fillStyle=lp;
  ctx.beginPath();ctx.ellipse(x+w/2,y+h*.25,w/2+4,h*.28,0,Math.PI,0);ctx.fill();

  /* 지붕 빛 */
  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.beginPath();ctx.ellipse(x+w/2-5,y+h*.18,w*.2,h*.1,-.3,Math.PI,0);ctx.fill();

  /* 펄스 링 (채팅 활성화 느낌) */
  for(let i=0;i<3;i++){
    const pulse=((time*.6+i*.33)%1);
    const r=8+pulse*22;
    ctx.strokeStyle=lp;
    ctx.globalAlpha=.25*(1-pulse);
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x+w/2,y+h*.25,r,Math.PI,0);ctx.stroke();
  }
  ctx.globalAlpha=1;

  /* 창문 — 채팅 말풍선 모양 */
  const winY=y+h*.38;
  [[x+w*.18,winY],[x+w*.52,winY],[x+w*.18,winY+h*.22],[x+w*.52,winY+h*.22]]
    .forEach(([wx,wy],idx)=>{
      const lit=Math.sin(time*1.5+idx)>.2;
      ctx.fillStyle=lit ? lp+'80' : 'rgba(30,30,50,.5)';
      ctx.beginPath();
      ctx.roundRect(wx,wy,w*.26,h*.16,[3,3,3,0]);
      ctx.fill();
      if(lit){
        ctx.shadowColor=lp;ctx.shadowBlur=6;
        ctx.fill();ctx.shadowBlur=0;
      }
    });

  /* 상단 안테나 (채팅 신호) */
  ctx.strokeStyle=lp+'80';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x+w/2,y+h*.25-h*.28);ctx.lineTo(x+w/2,y-8);ctx.stroke();
  const pulse2=.6+Math.sin(time*3)*.3;
  ctx.globalAlpha=pulse2;ctx.fillStyle=lp;
  ctx.beginPath();ctx.arc(x+w/2,y-8,3,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=lp;ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
  ctx.globalAlpha=1;

  /* 문 */
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.beginPath();ctx.roundRect(x+w/2-9,y+h-22,18,22,[6,6,0,0]);ctx.fill();
  ctx.strokeStyle=lp+'40';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(x+w/2-9,y+h-22,18,22,[6,6,0,0]);ctx.stroke();

  /* 네온 사인 */
  if(t.neon){
    ctx.shadowColor=lp;ctx.shadowBlur=12;
    ctx.fillStyle=lp+'50';
    ctx.beginPath();ctx.roundRect(x+w/2-26,y+h*.32,52,14,3);ctx.fill();
    ctx.font='bold 8px "Noto Sans KR"';
    ctx.fillStyle=lp;ctx.textAlign='center';
    ctx.fillText('💬 '+ORG_BUILDING[DM.league],x+w/2,y+h*.32+11);
    ctx.textAlign='start';ctx.shadowBlur=0;
  }

  /* 빛 확산 */
  if(t.extraGlow){
    const bg=ctx.createRadialGradient(x+w/2,y+h,0,x+w/2,y+h,w*.7);
    bg.addColorStop(0,lg);bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg;ctx.fillRect(x-w*.2,y+h*.5,w*1.4,h*.8);
  }
}

function drawDustBuilding(x,y,w,h,s,b){
  const isHQ=b.id==='hq';
  if(isHQ){
    ctx.fillStyle=s.wall;
    ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.5;
    for(let j=1;j<4;j++){
      const ratio=j/4;
      ctx.beginPath();
      ctx.moveTo(x+w*ratio*.5,y+h-h*ratio*.1);
      ctx.lineTo(x+w/2,y+h*(1-ratio));
      ctx.lineTo(x+w-w*ratio*.5,y+h-h*ratio*.1);
      ctx.stroke();
    }
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.beginPath();ctx.moveTo(x+w/2-12,y+h);ctx.lineTo(x+w/2,y+h-25);ctx.lineTo(x+w/2+12,y+h);ctx.closePath();ctx.fill();
    ctx.fillStyle=s.roof;ctx.fillRect(x+w/2-1,y-12,2,14);
    ctx.fillStyle=s.roofH;ctx.beginPath();ctx.moveTo(x+w/2+1,y-12);ctx.lineTo(x+w/2+12,y-8);ctx.lineTo(x+w/2+1,y-4);ctx.closePath();ctx.fill();
  } else {
    const hh=h*.7;
    ctx.fillStyle=s.wall;
    ctx.beginPath();ctx.roundRect(x+8,y+h-hh,w-16,hh,2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.5;
    for(let j=1;j<4;j++){
      const ly=y+h-hh+j*(hh/4);
      ctx.beginPath();ctx.moveTo(x+10,ly);ctx.lineTo(x+w-10,ly);ctx.stroke();
    }
    ctx.fillStyle=s.roof;
    ctx.beginPath();ctx.moveTo(x,y+h-hh+2);ctx.lineTo(x+w/2,y+h-hh-22);ctx.lineTo(x+w,y+h-hh+2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=s.roofH+'60';ctx.lineWidth=.5;
    for(let j=0;j<3;j++){      const ry=y+h-hh-18+j*7;
      ctx.beginPath();ctx.moveTo(x+5+j*8,ry+j*2);ctx.quadraticCurveTo(x+w/2,ry-3,x+w-5-j*8,ry+j*2);ctx.stroke();
    }
    ctx.fillStyle=s.win;
    ctx.beginPath();ctx.roundRect(x+w/2-5,y+h-hh+10,10,10,1);ctx.fill();
    ctx.fillStyle='rgba(40,30,20,.6)';
    ctx.beginPath();ctx.roundRect(x+w/2-7,y+h-18,14,18,[4,4,0,0]);ctx.fill();
  }
  if(b.id==='event'||b.id==='honor'){
    const fx=x+w/2,fy=y+h+5;
    const time=Date.now()/1000;
    ctx.fillStyle='rgba(60,30,10,.5)';
    for(let j=0;j<5;j++){ctx.beginPath();ctx.arc(fx-6+j*3,fy+2,2,0,Math.PI*2);ctx.fill();}
    for(let j=0;j<3;j++){
      const fa=.4+Math.sin(time*4+j*2)*.3;
      ctx.globalAlpha=fa;ctx.fillStyle=j===0?'#ff6020':'#ffaa30';
      ctx.beginPath();ctx.ellipse(fx+Math.sin(time*3+j)*3,fy-2-j*4,3-j*.5,5-j,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function drawStarBuilding(x,y,w,h,s,b){
  const depth=w*.2,roofH=h*.25;
  ctx.fillStyle=s.wallD;
  ctx.beginPath();ctx.moveTo(x+w,y+roofH);ctx.lineTo(x+w+depth,y+roofH-depth*.4);
  ctx.lineTo(x+w+depth,y+h-depth*.3);ctx.lineTo(x+w,y+h);ctx.fill();
  ctx.fillStyle=s.wall;
  ctx.beginPath();ctx.roundRect(x,y+roofH,w,h-roofH,1);ctx.fill();
  const fg=ctx.createLinearGradient(x,y+roofH,x,y+roofH+20);
  fg.addColorStop(0,'rgba(255,255,255,.06)');fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;ctx.fillRect(x,y+roofH,w,20);
  ctx.fillStyle=s.roof;
  ctx.beginPath();ctx.moveTo(x-6,y+roofH+2);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w+6,y+roofH+2);ctx.closePath();ctx.fill();
  ctx.fillStyle=s.roofH;
  ctx.beginPath();ctx.moveTo(x+w+6,y+roofH+2);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w/2+depth,y-depth*.3);ctx.lineTo(x+w+depth+6,y+roofH-depth*.3);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.5;  ctx.beginPath();ctx.moveTo(x-6,y+roofH+2);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w+6,y+roofH+2);ctx.stroke();
  const winW=11,winH=14,gap=5;
  const cols=Math.max(2,Math.floor((w-14)/(winW+gap)));
  const rows=Math.max(1,Math.floor((h-roofH-26)/(winH+gap)));
  const sx=(w-(cols*(winW+gap)-gap))/2;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const wx=x+sx+c*(winW+gap),wy=y+roofH+12+r*(winH+gap);
      const lit=((r*cols+c+b.x)%3)!==0;
      ctx.fillStyle=lit?s.win:'rgba(30,30,50,.4)';
      ctx.beginPath();ctx.roundRect(wx,wy,winW,winH,1.5);ctx.fill();
      if(lit){ctx.shadowColor=s.win;ctx.shadowBlur=8;ctx.fillStyle=s.win.replace(/[\d.]+\)$/,'.08)');ctx.fillRect(wx-3,wy+winH,winW+6,8);ctx.shadowBlur=0;}
      ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.3;
      ctx.beginPath();ctx.roundRect(wx,wy,winW,winH,1.5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(wx+winW/2,wy);ctx.lineTo(wx+winW/2,wy+winH);ctx.stroke();
    }
  }
  ctx.fillStyle='rgba(40,30,20,.7)';
  ctx.beginPath();ctx.roundRect(x+w/2-9,y+h-22,18,22,[8,8,0,0]);ctx.fill();
  ctx.fillStyle='rgba(255,220,100,.4)';ctx.beginPath();ctx.arc(x+w/2+5,y+h-11,1.5,0,Math.PI*2);ctx.fill();
  if(s.chimney){
    ctx.fillStyle=s.wallD;ctx.fillRect(x+w*.65,y+6,8,roofH-4);
    ctx.fillStyle=s.roof;ctx.fillRect(x+w*.65-1,y+4,10,3);
  }
  if(s.sign&&t.neon){
    ctx.shadowColor=s.sign;ctx.shadowBlur=10;
    ctx.fillStyle=s.sign+'40';
    ctx.beginPath();ctx.roundRect(x+w/2-22,y+roofH+3,44,13,3);ctx.fill();
ctx.strokeStyle=s.sign+'80';ctx.lineWidth=.8;ctx.stroke();
    ctx.font='bold 7px "Noto Sans KR"';ctx.fillStyle=s.sign;ctx.textAlign='center';
    ctx.fillText(b.nK,x+w/2,y+roofH+13);ctx.textAlign='start';
    ctx.shadowBlur=0;
  }
}

function drawPlanetBuilding(x,y,w,h,s,b){
  const depth=w*.18;
  const floors=b.id==='hq'?3:2;
  ctx.fillStyle=s.wallD;
  ctx.beginPath();ctx.moveTo(x+w,y);ctx.lineTo(x+w+depth,y-depth*.3);
  ctx.lineTo(x+w+depth,y+h-depth*.3);ctx.lineTo(x+w,y+h);ctx.fill();
  ctx.fillStyle=s.wall;
  ctx.beginPath();ctx.roundRect(x,y,w,h,2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.5;
  for(let f=1;f<floors;f++){
    const fy=y+f*(h/floors);
    ctx.beginPath();ctx.moveTo(x+3,fy);ctx.lineTo(x+w-3,fy);ctx.stroke();
  }
  ctx.fillStyle=s.roof;
  ctx.fillRect(x-4,y-4,w+8+depth,6);
  ctx.fillStyle=s.wallD;ctx.fillRect(x+w*.3,y-14,w*.15,10);
  ctx.fillStyle=s.roof;ctx.fillRect(x+w*.3-2,y-16,w*.15+4,3);
  const winW=14,winH=16,gap=4;
  const cols=Math.max(2,Math.floor((w-10)/(winW+gap)));
  const floorH=h/floors;
  for(let f=0;f<floors;f++){
    const sx=(w-(cols*(winW+gap)-gap))/2;
    for(let c=0;c<cols;c++){
      const wx=x+sx+c*(winW+gap),wy=y+f*floorH+8;
      const lit=((f*cols+c+b.x)%4)!==0;
      ctx.fillStyle=lit?s.win:'rgba(20,40,30,.5)';
      ctx.beginPath();ctx.roundRect(wx,wy,winW,floorH-14,2);ctx.fill();
      if(lit){ctx.shadowColor=s.win;ctx.shadowBlur=6;ctx.fillRect(wx,wy,winW,floorH-14);ctx.shadowBlur=0;}
      ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.3;
      ctx.beginPath();ctx.roundRect(wx,wy,winW,floorH-14,2);ctx.stroke();
    }
  }
  ctx.fillStyle=s.win;
  ctx.beginPath();ctx.roundRect(x+w/2-12,y+h-26,24,26,[4,4,0,0]);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(x+w/2,y+h-26);ctx.lineTo(x+w/2,y+h);ctx.stroke();
  if(s.sign){
    ctx.shadowColor=s.sign;ctx.shadowBlur=12;
    ctx.fillStyle=s.sign+'50';
    ctx.beginPath();ctx.roundRect(x+w/2-25,y+6,50,14,3);ctx.fill();
    ctx.font='bold 8px "Noto Sans KR"';ctx.fillStyle=s.sign;ctx.textAlign='center';
    ctx.fillText(b.nK,x+w/2,y+17);ctx.textAlign='start';
    ctx.shadowBlur=0;
  }
}

function drawNovaBuilding(x,y,w,h,s,b){
  const depth=w*.15;
  const floors=b.id==='hq'?5:3;
  const bh=b.id==='hq'?h*1.3:h;
  const by=y+h-bh;
  ctx.fillStyle=s.wallD;
  ctx.beginPath();ctx.moveTo(x+w,by);ctx.lineTo(x+w+depth,by-depth*.3);
  ctx.lineTo(x+w+depth,y+h-depth*.3);ctx.lineTo(x+w,y+h);ctx.fill();
  const grd=ctx.createLinearGradient(x,by,x,y+h);
  grd.addColorStop(0,s.wall);grd.addColorStop(.5,s.wallD);grd.addColorStop(1,s.wall);
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.roundRect(x,by,w,bh,[3,3,0,0]);ctx.fill();
  const ref=ctx.createLinearGradient(x,by,x+w*.6,by);
  ref.addColorStop(0,'rgba(255,255,255,.04)');ref.addColorStop(.5,'rgba(255,255,255,.08)');ref.addColorStop(1,'transparent');
  ctx.fillStyle=ref;ctx.fillRect(x,by,w,bh);
  ctx.strokeStyle=t.lp+'30';ctx.lineWidth=.8;
  const floorH=bh/floors;
  for(let f=0;f<=floors;f++){
    const fy=by+f*floorH;
    ctx.beginPath();ctx.moveTo(x,fy);ctx.lineTo(x+w,fy);ctx.stroke();
  }
  ctx.strokeStyle=t.lp+'20';ctx.lineWidth=.5;
  for(let c=1;c<3;c++){
    const cx2=x+c*(w/3);
    ctx.beginPath();ctx.moveTo(cx2,by);ctx.lineTo(cx2,y+h);ctx.stroke();
  }
  for(let f=0;f<floors;f++){
    for(let c=0;c<3;c++){
      const wx=x+6+c*(w/3-2),wy=by+f*floorH+4;
      const ww=w/3-10,wh=floorH-8;
      const lit=((f*3+c+b.x)%5)!==0;
      if(lit){
        ctx.fillStyle=s.win;

function drawQuasarBuilding(x,y,w,h,s,b){
  const depth=w*.2;
  const isHQ=b.id==='hq';
  ctx.fillStyle=s.wallD;
  ctx.beginPath();ctx.moveTo(x+w,y+h*.2);ctx.lineTo(x+w+depth,y+h*.2-depth*.3);
  ctx.lineTo(x+w+depth,y+h-depth*.3);ctx.lineTo(x+w,y+h);ctx.fill();
  ctx.fillStyle=s.wall;
  ctx.beginPath();ctx.roundRect(x,y+h*.2,w,h*.8,[2,2,0,0]);ctx.fill();
  const gg=ctx.createLinearGradient(x,y+h*.2,x,y+h*.2+30);
  gg.addColorStop(0,'rgba(240,192,64,.08)');gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.fillRect(x,y+h*.2,w,30);
  ctx.fillStyle=s.roof;
  ctx.beginPath();ctx.ellipse(x+w/2,y+h*.2,w/2+8,h*.22,0,Math.PI,0);ctx.fill();
  ctx.fillStyle=s.roofH+'40';
  ctx.beginPath();ctx.ellipse(x+w/2-5,y+h*.2-5,w*.25,h*.12,-.2,Math.PI,0);ctx.fill();
  ctx.fillStyle='#f0c040';
  ctx.beginPath();ctx.arc(x+w/2,y+h*.2-h*.2,4,0,Math.PI*2);ctx.fill();
  ctx.shadowColor='#f0c040';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(x+w/2,y+h*.2-h*.2,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  if(isHQ){
    for(let p=0;p<4;p++){
      const px=x+8+p*((w-16)/3);
      ctx.fillStyle=s.roofH+'80';
      ctx.beginPath();ctx.roundRect(px,y+h*.3,6,h*.65,1);ctx.fill();
      ctx.fillStyle=s.roofH;
      ctx.beginPath();ctx.roundRect(px-2,y+h*.28,10,5,1);ctx.fill();
      ctx.beginPath();ctx.roundRect(px-2,y+h*.95,10,5,1);ctx.fill();
    }
  }
  const winW=13,gap=6;
  const cols=Math.max(2,Math.floor((w-20)/(winW+gap)));
  const sx=(w-(cols*(winW+gap)-gap))/2;
  for(let r=0;r<2;r++){
    for(let c=0;c<cols;c++){
      const wx=x+sx+c*(winW+gap),wy=y+h*.32+r*32;
      const lit=((r*cols+c+b.x)%3)!==0;
      ctx.fillStyle=lit?s.win:'rgba(40,30,10,.4)';
      ctx.beginPath();ctx.moveTo(wx,wy+18);ctx.lineTo(wx,wy+5);
      ctx.quadraticCurveTo(wx+winW/2,wy-4,wx+winW,wy+5);
      ctx.lineTo(wx+winW,wy+18);ctx.closePath();ctx.fill();
      if(lit){ctx.shadowColor=s.win;ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;}
    }
  }
  ctx.fillStyle='rgba(100,80,30,.7)';
  ctx.beginPath();ctx.roundRect(x+w/2-14,y+h-28,28,28,[10,10,0,0]);ctx.fill();
  ctx.strokeStyle='#f0c04040';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(x+w/2,y+h-14,8,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#f0c040';ctx.beginPath();ctx.arc(x+w/2+8,y+h-14,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w/2-8,y+h-14,1.5,0,Math.PI*2);ctx.fill();
  if(s.sign){
    ctx.shadowColor=s.sign;ctx.shadowBlur=15;
    ctx.fillStyle=s.sign+'40';

function drawSmoke(){
  const time=Date.now()/1000;
  BLD.forEach((b,i)=>{
    if(!t.buildings[i] || !t.buildings[i].chimney)return;
    const sx=b.x+b.w*.65+4,sy=b.y+4;
    for(let j=0;j<5;j++){
      const age=((time*.4+j*.6)%3)/3;
      const px=sx+Math.sin(time*1.5+j*1.8)*6*age;
      const py=sy-age*35;
      const sz=2+age*5;
      ctx.globalAlpha=.12*(1-age);ctx.fillStyle='rgba(180,180,200,1)';

  });

}

function drawParticles(){
  const time=Date.now()/1000;
  if(t.particles==='firefly'){
    for(let i=0;i<12;i++){
      const px=300+Math.sin(time*.3+i*1.7)*600+i*80;
      const py=450+Math.cos(time*.4+i*2.1)*300+Math.sin(time+i)*40;
      ctx.globalAlpha=.25+Math.sin(time*2+i)*.2;ctx.fillStyle=t.particleColor;
      ctx.beginPath();ctx.arc(px,py,1.2+Math.sin(time*3+i)*.5,0,Math.PI*2);ctx.fill();
    }
  } else if(t.particles==='sparkle'||t.particles==='golden'){
    for(let i=0;i<18;i++){
      const px=200+Math.sin(time*.25+i*1.5)*700+i*70;
      const py=400+Math.cos(time*.35+i*1.9)*350;
      const a=.2+Math.sin(time*2.5+i)*.15;
      ctx.globalAlpha=a;ctx.fillStyle=t.particleColor;
      ctx.beginPath();ctx.arc(px,py,1+Math.sin(time*4+i)*.6,0,Math.PI*2);ctx.fill();
    }
  } else if(t.particles==='neonPulse'){
    for(let i=0;i<20;i++){
      const px=200+Math.sin(time*.2+i*1.3)*800+i*60;
      const py=400+Math.cos(time*.3+i*1.7)*350;
      const a=.15+Math.sin(time*3+i)*.15;
      ctx.globalAlpha=a;ctx.fillStyle=t.particleColor;
      const sz=1+Math.sin(time*5+i)*.8;
      ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fill();
      // 네온 트레일
      ctx.globalAlpha=a*.3;
      ctx.beginPath();ctx.arc(px-3,py+2,sz*.6,0,Math.PI*2);ctx.fill();
    }
  } else if(t.particles==='glow'){
    for(let i=0;i<15;i++){
      const px=250+Math.sin(time*.3+i*1.4)*700+i*75;
      const py=420+Math.cos(time*.35+i*2)*320;
      ctx.globalAlpha=.18+Math.sin(time*2+i)*.12;ctx.fillStyle=t.particleColor;
      ctx.beginPath();ctx.arc(px,py,1.3,0,Math.PI*2);ctx.fill();
    }
  }
  // 조형물 파티클 (항상)
  for(let i=0;i<10;i++){
    const angle=(time*.4+i*Math.PI/5)%(Math.PI*2);
    const r=35+Math.sin(time+i)*12;
    const px=W/2+Math.cos(angle)*r,py=H/2+Math.sin(angle)*r*.6-10;
    ctx.globalAlpha=.25+Math.sin(time*2.5+i)*.15;ctx.fillStyle=t.lp;
    ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

    {type:'bench',x:W*.32,y:H*.46},{type:'bench',x:W*.65,y:H*.46},
    {type:'pot',x:W*.25,y:H*.38},{type:'pot',x:W*.73,y:H*.38},
    {type:'pot',x:W*.38,y:H*.62},{type:'pot',x:W*.58,y:H*.62},
    {type:'post',x:W*.15,y:H*.52},{type:'sign',x:W*.82,y:H*.52},
  ];
  if(league==='planet'||league==='nova'||league==='quasar'){
    props.push({type:'vend',x:W*.28,y:H*.55},{type:'vend',x:W*.7,y:H*.55});
  }
  if(league==='nova'||league==='quasar'){
    props.push({type:'holo',x:W*.4,y:H*.35},{type:'holo',x:W*.58,y:H*.35});
  }
  if(league==='quasar'){
    props.push({type:'banner',x:W*.12,y:H*.42},{type:'banner',x:W*.86,y:H*.42});
  }
  props.forEach(p=>{
    const{type,x,y}=p;
    if(type==='bench'){
      ctx.fillStyle=league==='dust'?'#5a4a30':league==='quasar'?'#8a7030':t.roadLine;
      ctx.beginPath();ctx.roundRect(x-12,y,24,5,1);ctx.fill();
      ctx.fillRect(x-10,y+5,3,8);ctx.fillRect(x+7,y+5,3,8);
      ctx.fillRect(x-11,y-6,2,7);ctx.fillRect(x+9,y-6,2,7);
      ctx.fillRect(x-11,y-7,22,2);
    } else if(type==='pot'){
      ctx.fillStyle=league==='dust'?'#6a5030':'#5a3020';
      ctx.beginPath();ctx.moveTo(x-5,y);ctx.lineTo(x-7,y+10);ctx.lineTo(x+7,y+10);ctx.lineTo(x+5,y);ctx.closePath();ctx.fill();
      ctx.fillStyle=t.flower1;ctx.beginPath();ctx.arc(x-2,y-3,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=t.flower2;ctx.beginPath();ctx.arc(x+2,y-4,2.5,0,Math.PI*2);ctx.fill();
    } else if(type==='post'){
      ctx.fillStyle=league==='dust'?'#6a5a40':'#cc3333';
      ctx.beginPath();ctx.roundRect(x-5,y-14,10,18,[3,3,0,0]);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(x-3,y-8,6,2);
      ctx.fillStyle=league==='dust'?'#5a4a30':'#aa2222';ctx.fillRect(x-2,y+4,4,8);
    } else if(type==='sign'){
      ctx.fillStyle=t.roadLine;ctx.fillRect(x-1,y-20,2,24);
      ctx.fillStyle=t.lp+'40';ctx.beginPath();ctx.roundRect(x+1,y-20,22,8,2);ctx.fill();
      ctx.fillStyle=t.lp+'30';ctx.beginPath();ctx.roundRect(x-23,y-12,22,8,2);ctx.fill();
      ctx.font='5px "Noto Sans KR"';ctx.fillStyle=t.lp;ctx.textAlign='center';
      ctx.fillText('HQ →',x+12,y-14);ctx.fillText('← 상점',x-12,y-6);ctx.textAlign='start';
    } else if(type==='vend'){
      ctx.fillStyle=league==='nova'?'#1e1040':league==='quasar'?'#2e2414':'#182e28';
      ctx.beginPath();ctx.roundRect(x-7,y-16,14,20,2);ctx.fill();
      ctx.fillStyle=t.lp+'30';ctx.fillRect(x-5,y-14,10,8);
      ctx.globalAlpha=.3+Math.sin(time*2+x)*.2;ctx.fillStyle=t.lp;
      ctx.fillRect(x-4,y-13,8,6);ctx.globalAlpha=1;
    } else if(type==='holo'){
      ctx.fillStyle=t.plazaLine;ctx.fillRect(x-1,y-5,2,10);
      ctx.globalAlpha=.15+Math.sin(time*1.5+x)*.08;ctx.fillStyle=t.lp;
      ctx.beginPath();ctx.roundRect(x-12,y-22,24,18,3);ctx.fill();ctx.globalAlpha=1;
      ctx.strokeStyle=t.lp+'40';ctx.lineWidth=.5;
      ctx.beginPath();ctx.roundRect(x-12,y-22,24,18,3);ctx.stroke();
    } else if(type==='banner'){
      ctx.fillStyle='#3a3020';ctx.fillRect(x-1,y-30,2,35);
      const wave=Math.sin(time*2+x)*.08;
      ctx.fillStyle='#d4a01060';
      ctx.beginPath();ctx.moveTo(x+1,y-28);ctx.quadraticCurveTo(x+12,y-24+wave*20,x+1,y-14);ctx.closePath();ctx.fill();
    }
  });
}

function render(league){

  const r=document.documentElement;
  r.style.setProperty('--lp',t.lp);r.style.setProperty('--ls',t.ls);r.style.setProperty('--lg',t.lg);
  r.style.setProperty('--lr',t.lr);r.style.setProperty('--lgr',t.lgr);r.style.setProperty('--lb',t.lb);
  document.body.style.background=t.ground;

  // 건물 클릭 영역
  const bl=document.getElementById('bL');bl.innerHTML='';
  const ic=icons[league];
  BLD.forEach(b=>{
    const d=document.createElement('div');d.className='bld';
    d.style.cssText=`left:${b.x-8}px;top:${b.y-8}px;width:${b.w+30}px;height:${b.h+28}px`;

    d.innerHTML=`${badge}<div class="bld-label"><div class="bld-name">${ic[b.id]} ${b.nK}</div><div class="bld-name-en">${b.nE}</div></div>`;
    bl.appendChild(d);
  });

  // 조형물 HTML (이모지)
  let mon=document.getElementById('mon-html');

  mon.style.left=(W/2-40)+'px';mon.style.top=(H/2-70)+'px';mon.style.width='80px';
  mon.innerHTML=`<div style="font-size:40px;animation:monG 3s ease-in-out infinite;filter:drop-shadow(0 0 20px ${t.lg})">${t.symbol}</div><div style="font-family:Cinzel,serif;font-size:10px;font-weight:700;color:${t.lp};letter-spacing:2px;text-shadow:0 0 10px ${t.lg};text-align:center;margin-top:2px">${DM.name}<br>STARIUM</div><div style="font-size:7px;color:var(--muted);text-align:center">${t.vName}</div>`;

  // NPC
  const nl=document.getElementById('nL');nl.innerHTML='';
  ['StarFan','MoonChild','ArmyLove','PurpleU','Dreamer'].forEach((n,i)=>{
    const pos=[[W*.3,H*.53],[W*.68,H*.47],[W*.43,H*.46],[W*.7,H*.53],[W*.45,H*.66]];
    const d=document.createElement('div');d.className='npc';d.id='npc'+i;
    d.style.cssText=`left:${pos[i][0]}px;top:${pos[i][1]}px`;
    const bgc=`rgba(${t.lr},${t.lgr},${t.lb},.15)`;
    d.innerHTML=`<div class="npc-b" style="background:${bgc}">👤</div><div class="npc-n">${n}</div>`;
    nl.appendChild(d);
  });

  if(anim)cancelAnimationFrame(anim);
  draw();
}

function initDrag(){
  const cont=document.getElementById('vc'),world=document.getElementById('vw');
  let drag=false,sx=0,sy=0,cx=0,cy=0,ox=0,oy=0,moved=false;
  const ww=window.innerWidth,wh=window.innerHeight;
  cx=-(W/2-ww/2);cy=-(H/2-wh/2);
  world.style.transform=`translate(${cx}px,${cy}px)`;
  function st(x,y){drag=true;sx=x;sy=y;ox=cx;oy=cy;moved=false}
  function mv(x,y){if(!drag)return;const dx=x-sx,dy=y-sy;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;cx=ox+dx;cy=oy+dy;const padX=Math.min(150,ww*.2),padY=Math.min(150,wh*.2);cx=Math.max(-(W-ww+padX),Math.min(padX,cx));cy=Math.max(-(H-wh+padY),Math.min(padY,cy));world.style.transform=`translate(${cx}px,${cy}px)`}
  function en(){drag=false}
  cont.addEventListener('mousedown',e=>{if(e.target.closest('.bld,.hdr-back,.mo'))return;st(e.clientX,e.clientY)});
  window.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));window.addEventListener('mouseup',en);
  cont.addEventListener('click',e=>{if(moved||e.target.closest('.bld,.hdr,.bot,.mo'))return;const a=document.getElementById('myAv');a.style.left=(e.clientX-cx-12)+'px';a.style.top=(e.clientY-cy-12)+'px';a.classList.add('walk');setTimeout(()=>a.classList.remove('walk'),700)});
  cont.addEventListener('touchstart',e=>{if(e.target.closest('.bld'))return;const tc=e.touches[0];st(tc.clientX,tc.clientY)},{passive:true});
  cont.addEventListener('touchmove',e=>{const tc=e.touches[0];mv(tc.clientX,tc.clientY)},{passive:true});
  cont.addEventListener('touchend',e=>{if(!moved){const tc=e.changedTouches[0];const a=document.getElementById('myAv');a.style.left=(tc.clientX-cx-12)+'px';a.style.top=(tc.clientY-cy-12)+'px';a.classList.add('walk');setTimeout(()=>a.classList.remove('walk'),700)}en()});
}

  {icon:'🎪',tpl:'이벤트 광장이 활기차요!'},
  {icon:'💫',tpl:'{name}님 아키타입 진화!'},
  {icon:'🔥',tpl:'우리 팬클럽 순위 상승!'},
  {icon:'🏅',tpl:'{name}님이 뱃지 획득!'},
  {icon:'💜',tpl:'{name}님이 팬아트 업로드!'},
  {icon:'📊',tpl:'오늘 활동 에너지 +5%!'},];
const MINI_NAMES=['StarFan','MoonChild','ArmyLove','PurpleU','Dreamer','GalaxyHeart','NovaRider','CosmicSoul','StellarBoy','LightBeam','OrbitGirl','StarDust99','NeonWave','EchoStar','LunarFox'];
let miniEvtTimer=null;

function startMiniEvents(){  const container=document.getElementById('miniEvts');
  if(!container||miniEvtTimer)return;

  function spawn(){
    if(document.hidden)return;
    const evt=MINI_EVENTS[Math.floor(Math.random()*MINI_EVENTS.length)];

    setTimeout(()=>el.remove(),4000);
  }

  setTimeout(spawn,3000);
  miniEvtTimer=setInterval(spawn,6000+Math.random()*4000);
}

/* ═══ 채팅 시스템 ═══ */
function openFcChat(type, orgPath) {
  const panel = document.getElementById('chatPanel');
  const title = document.getElementById('chatPanelTitle');
  const breadcrumb = document.getElementById('chatBreadcrumb');
  const body = document.getElementById('chatBody');

  panel.classList.add('open');
  currentChatRoom = type;

  if (type === 'all') {
    title.textContent = '💬 팬클럽 전체 채팅';
    breadcrumb.style.display = 'none';
    loadMockMsgs(body, 'all');
  } else {
    title.textContent = '🏠 모임 채팅';
    breadcrumb.style.display = 'flex';
    renderBreadcrumb(orgPath || 0);
    loadMockMsgs(body, 'org');
  }

  setTimeout(() => {
    document.getElementById('chatInput').focus();
  }, 400);
}

function closeChatPanel() {
  document.getElementById('chatPanel').classList.remove('open');
}

function renderBreadcrumb(activeIdx) {
  const league = DM.league;
  const path = MY_ORG[league] || [];
  const bc = document.getElementById('chatBreadcrumb');
  const body = document.getElementById('chatBody');

  bc.innerHTML = '';
  path.forEach((name, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'chat-bc-arrow';
      arrow.textContent = '›';
      bc.appendChild(arrow);
    }
    const item = document.createElement('div');
    item.className = 'chat-bc-item';
    const btn = document.createElement('div');
    btn.className = 'chat-bc-btn' + (i === activeIdx ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      renderBreadcrumb(i);
      loadMockMsgs(body, name);
    };
    item.appendChild(btn);
    bc.appendChild(item);
  });
}

function loadMockMsgs(body, roomType) {
  body.innerHTML = '';
  const count = 6 + Math.floor(Math.random() * 4);
  const msgs = [...MOCK_MSGS]
    .sort(() => Math.random() - 0.5)
    .slice(0, count);

  msgs.forEach((m, i) => {
    const isMe = i === msgs.length - 1;
    const color = LEAGUE_COLORS[m.league] || '#c084fc';
    const time = new Date(Date.now() - (msgs.length - i) * 180000);
    const timeStr = time.getHours() + ':' +
      String(time.getMinutes()).padStart(2, '0');

    const el = document.createElement('div');
    el.className = 'chat-msg' + (isMe ? ' me' : '');
    el.innerHTML = `
      <div class="chat-msg-avatar"
        style="background:${color}22;border-color:${color}44">
        ${isMe ? '🧑' : '👤'}
      </div>
      <div class="chat-msg-body">
        <div class="chat-msg-name"
          style="color:${color}">${isMe ? '나' : m.name}</div>
        <div class="chat-msg-bubble">${isMe ? '안녕하세요! 👋' : m.msg}</div>
        <div class="chat-msg-time">${timeStr}</div>
      </div>`;
    body.appendChild(el);
  });
  body.scrollTop = body.scrollHeight;
}

function sendChatMsg() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  const body = document.getElementById('chatBody');
  const time = new Date();
  const timeStr = time.getHours() + ':' +
    String(time.getMinutes()).padStart(2, '0');

  const el = document.createElement('div');
  el.className = 'chat-msg me';
  el.innerHTML = `
    <div class="chat-msg-avatar"
      style="background:rgba(192,132,252,0.2);border-color:rgba(192,132,252,0.4)">
      🧑
    </div>
    <div class="chat-msg-body">
      <div class="chat-msg-name" style="color:var(--lp)">나</div>
      <div class="chat-msg-bubble">${msg}</div>
      <div class="chat-msg-time">${timeStr}</div>
    </div>`;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
  input.value = '';

  showSpeechBubble('myAv', '나', msg, true);
}

function showSpeechBubble(avatarId, name, msg, isMe) {
  const av = document.getElementById(avatarId);
  if (!av) return;

  const old = av.querySelector('.speech-bubble');
  if (old) old.remove();

  const league = DM.league;
  const color = isMe
    ? (LEAGUE_COLORS[league] || '#c084fc')
    : '#94a3b8';

  const bubble = document.createElement('div');
  bubble.className = 'speech-bubble';
  if(msg.length > 15) bubble.classList.add('long');
  bubble.style.cssText = `
    left:50%;
    bottom:calc(100% + 6px);
    border-color:${color}44;
  `;
  bubble.innerHTML = `
    <div class="speech-bubble-name"
      style="color:${color}">${name}</div>
    ${msg}`;
  av.style.position = 'absolute';
  av.appendChild(bubble);

  clearTimeout(av._bubbleTimer);
  av._bubbleTimer = setTimeout(() => {
    bubble.remove();
  }, 5000);
}

function showNpcBubble(npcIdx, msg) {
  const npc = document.getElementById('npc' + npcIdx);
  if (!npc) return;
  const old = npc.querySelector('.speech-bubble');
  if (old) old.remove();

  const bubble = document.createElement('div');
  bubble.className = 'speech-bubble';
  if(msg.length > 15) bubble.classList.add('long');
  bubble.style.cssText = 'left:50%;bottom:calc(100% + 4px);';
  bubble.innerHTML = msg;
  npc.appendChild(bubble);

  clearTimeout(npc._bubbleTimer);
  npc._bubbleTimer = setTimeout(() => bubble.remove(), 5000);
}

function startNpcChat() {
  const npcMsgs = [
    '오늘도 열심히! 💪', '같이 미션 해요~', '안녕하세요 👋',
    '스밍 고고! 🔥', '우리 팬클럽 최고 ✨', '화이팅!! 💜',

  ];
  setInterval(() => {
    const idx = Math.floor(Math.random() * 5);
    const msg = npcMsgs[Math.floor(Math.random() * npcMsgs.length)];
    showNpcBubble(idx, msg);
  }, 8000 + Math.random() * 6000);
}

function initSocket() {
  try {    socket = io(window.location.origin, {
      transports: ['websocket', 'polling'],
      timeout: 5000
    });

    socket.on('connect', () => {
      console.log('✅ Socket.IO 연결됨:', socket.id);
      /* 임시 토큰으로 인증 (실제 구현 시 JWT 토큰 사용) */
      const token = localStorage.getItem('asteria_token');
      if (token) socket.emit('authenticate', token);
    });

    socket.on('disconnect', () => {
      console.log('🔌 Socket.IO 연결 끊김');
    });

    /* room별 인원수 업데이트 */
    socket.on('room_count', (data) => {
      updateRoomCount(data.room, data.count);
    });

    /* 실시간 채팅 메시지 수신 */
    socket.on('new_message', (data) => {
      receiveSocketMessage(data);
    });

    /* 연결 실패 시 폴백 */
    socket.on('connect_error', () => {
      console.log('⚠️ Socket.IO 연결 실패 — 목업 모드로 전환');
      loadFallbackCounts();
    });

  } catch (err) {
    console.log('⚠️ Socket.IO 초기화 실패 — 목업 모드');
    loadFallbackCounts();
  }
}

function updateRoomCount(room, count) {
  /* room ID를 미니채팅창 roomId로 변환 */
  const league = DM.league;
  const path = MY_ORG[league] || [];

  let roomId = null;
  if (room === 'global' || room === `fandom:${DM.fandom_id}`) {
    roomId = 'all';
  } else if (room.startsWith('org:')) {
    /* 소속 경로 인덱스로 매핑 */
    path.forEach((name, i) => {
      if (room === `org:${i}`) roomId = 'org' + i;
    });
    roomId = roomId || 'org0';
  }

  if (roomId) {
    roomCounts[roomId] = count;
    /* 열려있는 채팅창 인원수 업데이트 */
    updateOpenWindowCount(roomId, count);
  }

  /* 하단 전체채팅바 인원수도 업데이트 */
  if (roomId === 'all') {
    const onlineEl = document.getElementById('fcChatOnline');
    if (onlineEl) onlineEl.textContent = count.toLocaleString();
  }
}

function updateOpenWindowCount(roomId, count) {
  const win = miniChatWindows.find(w => w.roomId === roomId);
  if (!win) return;

  let countEl = win.el.querySelector('.mcw-count');
  if (!countEl) {
    const hdr = win.el.querySelector('.mcw-hdr');
    if (!hdr) return;
    countEl = document.createElement('span');
    countEl.className = 'mcw-count';
    countEl.style.cssText = `
      font-size:8px;
      color:var(--muted);
      font-family:'Orbitron',monospace;
      margin-right:4px;
      display:flex;
      align-items:center;
      gap:2px;
    `;
    const btns = hdr.querySelector('.mcw-btns');
    if (btns) hdr.insertBefore(countEl, btns);
  }
  countEl.innerHTML = `
    <span style="width:5px;height:5px;border-radius:50%;
      background:#34d399;display:inline-block"></span>
    ${count.toLocaleString()}명
  `;
}

function loadFallbackCounts() {
  /* Socket.IO 연결 실패 시 API로 폴백 */
  const league = DM.league;
  const fandomRoom = `fandom:${DM.fandom_id || 1}`;

  fetch(`/api/realtime/room-count?room=global`)
    .then(r => r.json())
    .then(data => {
      roomCounts['all'] = data.count || 0;
      updateOpenWindowCount('all', data.count || 0);
    })
    .catch(() => {
      /* API도 실패 시 목업 숫자 */
      roomCounts['all'] = Math.floor(800 + Math.random() * 800);
      updateOpenWindowCount('all', roomCounts['all']);
    });
}

function receiveSocketMessage(data) {
  /* 현재 열린 채팅창에서 해당 room 찾기 */
  const league = DM.league;
  const path = MY_ORG[league] || [];

  let targetRoomId = null;
  if (data.room === 'global' || data.room === `fandom:${DM.fandom_id}`) {
    targetRoomId = 'all';
  }

  if (!targetRoomId) return;

  const win = miniChatWindows.find(w => w.roomId === targetRoomId);
  if (!win) return;

  const body = win.el.querySelector('.mcw-body');
  if (!body) return;

  /* 내 메시지는 이미 표시됨 — 다른 사람 메시지만 추가 */
  if (data.userId === DM.myUserId) return;

  const color = LEAGUE_COLORS['star'] || '#fbbf24';
  const time = new Date(data.createdAt);
  const timeStr = time.getHours() + ':' +
    String(time.getMinutes()).padStart(2, '0');

  const el = document.createElement('div');
  el.className = 'mcw-msg other';
  el.innerHTML = `
    <div class="mcw-msg-name" style="color:${color}">${data.nickname}</div>
    <div class="mcw-msg-bubble">${data.message}</div>
    <div style="font-size:7px;color:var(--muted);margin-top:1px">${timeStr}</div>`;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;

  /* 상대방 NPC 말풍선 */
  const npcIdx = Math.floor(Math.random() * 5);
  showNpcBubble(npcIdx, data.message);
}

function toggleFcHeader(){
  const body=document.getElementById('fcBody');
  const arrow=document.getElementById('fcArrow');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
}

function renderFcHeader(league){
  const leagueOrder=['dust','star','planet','nova','quasar'];
  const leagueNames={dust:'더스트',star:'스타',planet:'플래닛',nova:'노바',quasar:'퀘이사'};
  const idx=leagueOrder.indexOf(league);

  document.getElementById('fcName').textContent=DM.name;
  document.getElementById('fcLeague').textContent=leagueNames[league]+' 리그';
  document.getElementById('fcRank').textContent='#'+DM.rank;

  const top=document.getElementById('fcCompareTop');
  const bot=document.getElementById('fcCompareBot');

  if(league==='quasar'){
    top.innerHTML=`<div class="fc-special">👑 최상위 리그 달성!</div>`;
  } else {
    const upperLeague=leagueNames[leagueOrder[idx+1]];
    const myTop=Math.round(DM.score*1.15);
    const upperTop=Math.round(DM.score*1.32);
    const pct=Math.round((myTop/upperTop)*100);
    const diff=upperTop-myTop;
    top.innerHTML=`
      <div class="fc-compare-label">🔺 리그 1등 vs ${upperLeague} 1등</div>
      <div class="fc-compare-name">NOVA CORE</div>
      <div class="fc-compare-bar-wrap">
        <div class="fc-compare-bar-fill" style="width:0%" data-w="${pct}%"></div>
      </div>
      <div class="fc-compare-diff">${upperLeague}1등까지 -${diff.toLocaleString()}</div>`;
  }

  if(league==='dust'){
    bot.innerHTML=`<div class="fc-special">🌱 최하위 리그 — 여기서 시작!</div>`;
  } else {
    const lowerLeague=leagueNames[leagueOrder[idx-1]];
    const myBot=Math.round(DM.score*0.74);
    const lowerTop=Math.round(DM.score*0.68);
    const pct=Math.round((myBot/DM.score)*100);
    const diff=myBot-lowerTop;
    bot.innerHTML=`
      <div class="fc-compare-label">🔻 리그 꼴등 vs ${lowerLeague} 1등</div>
      <div class="fc-compare-name">SERENADE</div>
      <div class="fc-compare-bar-wrap">
        <div class="fc-compare-bar-fill" style="width:0%" data-w="${pct}%"></div>
      </div>
      <div class="fc-compare-diff">${lowerLeague}1등보다 +${diff.toLocaleString()} 앞서</div>`;
  }

  setTimeout(()=>{
    document.querySelectorAll('.fc-compare-bar-fill').forEach(el=>{
      el.style.width=el.dataset.w;
    });
  },100);
}
