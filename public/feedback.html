<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피드백 — ASTERIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--void:#020a18;--panel:rgba(5,12,30,0.93);--border:rgba(200,175,80,0.13);--gold:#f0c040;--accent:#4a90d9;--accent2:#7c5ce0;--text:#e8ecf4;--muted:rgba(160,180,210,0.5)}
html,body{width:100%;min-height:100%;background:var(--void);color:var(--text);font-family:'Noto Sans KR',sans-serif}

.starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden}
.starfield .star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.8}}

.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--panel);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 24px;height:56px}
.nav-logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.nav-back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
.nav-back:hover{color:var(--gold)}

.content{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:80px 24px 60px}
h1{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:36px;text-align:center}

.form-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;backdrop-filter:blur(24px)}
.form-label{display:block;font-size:14px;font-weight:600;color:var(--text);margin:20px 0 8px}
.form-label:first-child{margin-top:0}
.form-sublabel{font-size:12px;color:var(--muted);font-weight:400}

/* 별점 선택 */
.star-rating{display:flex;gap:8px;margin-bottom:8px}
.star-rating .star-btn{width:44px;height:44px;border-radius:50%;border:2px solid rgba(200,175,80,0.2);background:transparent;color:var(--muted);font-size:24px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.star-rating .star-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(240,192,64,0.1);box-shadow:0 0 12px rgba(240,192,64,0.3)}
.star-rating .star-btn:hover{border-color:var(--gold);color:var(--gold)}
.star-label{font-size:13px;color:var(--muted);min-height:20px}

select,textarea{width:100%;padding:12px;border:1px solid rgba(200,175,80,0.15);border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border .2s}
select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:100px}

.submit-btn{width:100%;margin-top:24px;padding:14px;border:none;border-radius:12px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;transition:all .2s;box-shadow:0 4px 16px rgba(74,144,217,0.3)}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(74,144,217,0.5)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.reward-info{margin-top:16px;text-align:center;font-size:13px;color:var(--gold);opacity:.7}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(5,12,30,.95);border:1px solid var(--gold);color:var(--gold);padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;z-index:10001;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){.content{padding:70px 16px 40px}h1{font-size:20px}.form-card{padding:20px}}
</style>
</head>
<body>

<div class="starfield" id="starfield"></div>

<nav class="top-nav">
  <a href="/" class="nav-logo">ASTERIA</a>
  <a href="/" class="nav-back">← 돌아가기</a>
  <div id="navFandomBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);"></div>
</nav>

<div class="content">
  <h1>피드백 / Feedback</h1>
  <p class="subtitle">당신의 한마디가 아스테리아를 더 빛나게 합니다 ⭐</p>

  <div class="form-card">
    <label class="form-label">만족도 <span class="form-sublabel">/ Satisfaction</span></label>
    <div class="star-rating" id="starRating">
      <button class="star-btn" data-val="1" onclick="setStar(1)">⭐</button>
      <button class="star-btn" data-val="2" onclick="setStar(2)">⭐</button>
      <button class="star-btn" data-val="3" onclick="setStar(3)">⭐</button>
      <button class="star-btn" data-val="4" onclick="setStar(4)">⭐</button>
      <button class="star-btn" data-val="5" onclick="setStar(5)">⭐</button>
    </div>
    <div class="star-label" id="starLabel"></div>

    <label class="form-label">가장 좋은 기능은? <span class="form-sublabel">/ Best Feature</span></label>
    <select id="bestFeature">
      <option value="">선택해주세요</option>
      <option value="league">리그 시스템</option>
      <option value="ai_chat">AI 채팅</option>
      <option value="room">내 방 꾸미기</option>
      <option value="competition">경쟁 시스템</option>
      <option value="avatar">아바타</option>
      <option value="shop">상점</option>
      <option value="wish">소원의 성궤</option>
      <option value="other">기타</option>
    </select>

    <label class="form-label">개선하면 좋을 점 <span class="form-sublabel">/ Improvements (최대 1000자)</span></label>
    <textarea id="improvement" maxlength="1000" placeholder="불편하거나 아쉬웠던 점이 있다면 알려주세요..."></textarea>

    <label class="form-label">새로 추가되면 좋겠는 기능 <span class="form-sublabel">/ Feature Request (최대 500자)</span></label>
    <textarea id="newFeature" maxlength="500" placeholder="이런 기능이 있으면 좋겠어요!"></textarea>

    <button class="submit-btn" id="submitBtn" onclick="submitFeedback()">제출하기 / Submit</button>
    <div class="reward-info">피드백 참여 보상: LOY+2, SOC+1 (월 1회)</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 별빛 배경
(function(){var f=document.getElementById('starfield');for(var i=0;i<120;i++){var s=document.createElement('div');s.className='star';var sz=Math.random()*2.5+.5;s.style.width=sz+'px';s.style.height=sz+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';s.style.animationDuration=(2+Math.random()*3)+'s';f.appendChild(s)}})();

// 별점 선택
let selectedStar = 0;
const starLabels = ['', '별로예요 😐', '그저 그래요 🙂', '괜찮아요 😊', '좋아요! 😄', '최고예요! 🤩'];

function setStar(val) {
  selectedStar = val;
  document.querySelectorAll('.star-btn').forEach(function(btn) {
    btn.classList.toggle('active', parseInt(btn.dataset.val) <= val);
  });
  document.getElementById('starLabel').textContent = starLabels[val];
}

// 토스트
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// 피드백 제출
async function submitFeedback() {
  if (selectedStar === 0) { showToast('만족도를 선택해주세요!'); return; }

  var token = localStorage.getItem('accessToken');
  if (!token) { showToast('로그인이 필요합니다.'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;

  try {
    var r = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        satisfaction: selectedStar,
        best_feature: document.getElementById('bestFeature').value,
        improvement: document.getElementById('improvement').value,
        new_feature_request: document.getElementById('newFeature').value
      })
    });
    var d = await r.json();
    if (r.ok) {
      showToast(d.message);
      setTimeout(function() { location.href = '/'; }, 2000);
    } else {
      showToast(d.message || '제출 실패');
      btn.disabled = false;
    }
  } catch (e) {
    showToast('네트워크 오류');
    btn.disabled = false;
  }
}
</script>
<script>
(function(){
  var token = localStorage.getItem('asteria_token');
  var btn = document.getElementById('navFandomBtn');
  if(!btn) return;
  if(token){
    btn.innerHTML = '<a href="/fandom.html" style="display:flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--gold,#f0c040);border-radius:20px;color:var(--gold,#f0c040);font-size:11px;text-decoration:none;font-weight:700;background:rgba(240,192,64,0.08);transition:all .2s;" onmouseover="this.style.background=\'var(--gold,#f0c040)\';this.style.color=\'#000\'" onmouseout="this.style.background=\'rgba(240,192,64,0.08)\';this.style.color=\'var(--gold,#f0c040)\'">🏘️ 내 팬덤</a>';
  } else {
    btn.innerHTML = '<a href="/login.html" style="display:flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--gold,#f0c040);border-radius:20px;color:var(--gold,#f0c040);font-size:11px;text-decoration:none;font-weight:700;background:rgba(240,192,64,0.08);">🚀 로그인</a>';
  }
})();
</script>
</body>
</html>
