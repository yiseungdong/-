<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아스트라 방 — ASTERIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --void:#030308; --panel:rgba(10,10,22,0.95);
  --border:rgba(180,150,255,0.13); --gold:#f0c040;
  --accent:#c084fc; --accent2:#818cf8; --accent3:#38bdf8;
  --text:#e8e4f0; --muted:rgba(200,190,220,0.5);
  --room-wall:#0d0820; --room-floor:#07051a;
  --room-accent:#c084fc;
}
html,body {
  width:100%; min-height:100%;
  background:var(--void); color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  -webkit-tap-highlight-color:transparent;
  user-select:none; overflow-x:hidden;
}
/* 모바일앱 기준이지만 2단 레이아웃은 더 넓게 */
#app { max-width:900px; margin:0 auto; min-height:100vh; position:relative; }
#bgCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ════════════════════════════
   2단 메인 레이아웃
════════════════════════════ */
.two-col {
  display:flex; align-items:flex-start;
  gap:0; min-height:calc(100vh - 120px);
}

/* 왼쪽 1/3 — 프로필 + 정보 */
.col-left {
  width:33.333%; flex-shrink:0;
  border-right:1px solid var(--border);
  overflow-y:auto; max-height:calc(100vh - 120px);
  position:sticky; top:120px;
}
.col-left::-webkit-scrollbar { width:3px; }
.col-left::-webkit-scrollbar-thumb { background:rgba(192,132,252,.3); border-radius:3px; }

/* 오른쪽 2/3 — 방 + 방명록 */
.col-right {
  width:66.667%; flex-shrink:0;
  overflow-y:auto;
}

/* ── 파티클 캔버스 ── */
#bgCanvas { position:fixed; inset:0; z-index:0; pointer-events:none;
  max-width:480px; left:50%; transform:translateX(-50%); }

/* ════════════════════════════
   TOP NAV
════════════════════════════ */



.top-nav-item.active { color:var(--accent); border-bottom-color:var(--accent); }
.top-nav-item:hover { color:var(--text); }
.top-nav-icon { font-size:18px; }
.top-nav-label { font-size:9px; font-weight:500; white-space:nowrap; }

/* ════════════════════════════
   TOP BAR
════════════════════════════ */
.topbar {
  position:sticky; top:0; z-index:200;
  display:flex; align-items:center; gap:12px;
  padding:13px 18px;
  background:var(--panel); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.tb-back { width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,.06); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; text-decoration:none; color:var(--text); }
.tb-info { flex:1; }
.tb-name { font-size:15px; font-weight:700; }
.tb-sub { font-size:10px; color:var(--muted); margin-top:1px; }
.tb-actions { display:flex; gap:8px; }
.tb-btn {
  padding:7px 14px; border-radius:20px; border:none;
  font-size:12px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all .2s;
}
.tb-btn-share { background:rgba(240,192,64,.15); border:1px solid rgba(240,192,64,.4); color:var(--gold); }
.tb-btn-share:hover { background:rgba(240,192,64,.25); }
.tb-btn-edit { background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#fff; }
.tb-btn-edit:hover { box-shadow:0 0 16px rgba(192,132,252,.4); }

/* ════════════════════════════
   방 소유자 프로필
════════════════════════════ */
.owner-profile {
  position:relative; z-index:10;
  padding:16px 14px 0;
  display:flex; align-items:center; gap:10px;
}
.owner-av {
  width:64px; height:64px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:30px;
  position:relative; flex-shrink:0;
  animation:avFloat 4s ease-in-out infinite;
}
@keyframes avFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.owner-av-ring {
  position:absolute; inset:-4px; border-radius:50%;
  border:2px solid transparent;
  animation:ringSpin 8s linear infinite;
}
@keyframes ringSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.owner-info { flex:1; }
.owner-name { font-size:18px; font-weight:900; }
.owner-grade { font-size:11px; font-weight:600; margin-top:3px;
  display:inline-flex; align-items:center; gap:6px; }
.owner-stats-row { display:flex; gap:14px; margin-top:8px; }
.owner-stat { font-size:11px; color:var(--muted); }
.owner-stat span { color:var(--text); font-weight:700; }

/* ════════════════════════════
   방 진화 단계 배너
════════════════════════════ */
.stage-banner {
  position:relative; z-index:10;
  margin:10px 14px 0;
  padding:8px 12px; border-radius:12px;
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.03); border:1px solid var(--border);
}
.stage-dots { display:flex; gap:6px; }
.stage-dot { width:28px; height:6px; border-radius:3px; background:rgba(255,255,255,.1); transition:all .5s; }
.stage-dot.active { background:var(--room-accent); box-shadow:0 0 8px var(--room-accent); }
.stage-info { flex:1; }
.stage-name { font-size:12px; font-weight:700; }
.stage-desc { font-size:10px; color:var(--muted); margin-top:1px; }
.stage-next { font-size:10px; color:var(--gold); font-weight:600; }

/* ════════════════════════════
   방 (THE ROOM) — 오른쪽 상단 크게
════════════════════════════ */
.room-wrap {
  position:relative; z-index:10;
  margin:14px 14px 0;
  border-radius:20px; overflow:hidden;
  border:1px solid var(--border);
  box-shadow:0 0 40px rgba(192,132,252,.1);
}
.room {
  position:relative; width:100%; height:400px;
  transition: background 1s ease;
  overflow:hidden; cursor:pointer;
}

/* 원근감 바닥 */
.room-floor {
  position:absolute; bottom:0; left:0; right:0; height:45%;
  transition: background 1s ease;
}
.room-floor::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px,
    transparent 1px, transparent 40px
  ),
  repeating-linear-gradient(
    0deg,
    rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px,
    transparent 1px, transparent 40px
  );
}

/* 방 벽 */
.room-wall {
  position:absolute; top:0; left:0; right:0; height:58%;
  transition: background 1s ease;
}
.room-wall::after {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px,
    transparent 1px, transparent 80px
  );
}

/* 천장 몰딩 */
.room-molding {
  position:absolute; top:40%; left:0; right:0; height:4px;
  transition: background .5s;
}

/* ── 배치된 아이템들 ── */
.room-items { position:absolute; inset:0; }
.placed-item {
  position:absolute;
  display:flex; flex-direction:column; align-items:center;
  cursor:grab; transition:filter .2s;
  animation:itemFloat 3s ease-in-out infinite;
}
.placed-item:hover { filter:brightness(1.3); }
.placed-item:active { cursor:grabbing; }
@keyframes itemFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.placed-item .item-emoji { font-size:36px; }
.placed-item .item-label {
  font-size:9px; color:rgba(255,255,255,.5); margin-top:3px;
  white-space:nowrap; text-align:center;
}
.placed-item .item-glow {
  position:absolute; inset:-10px; border-radius:50%;
  opacity:.3; filter:blur(12px);
  animation:glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100%{opacity:.2} 50%{opacity:.5} }

/* 빈 슬롯 힌트 */
.empty-slot {
  position:absolute; width:60px; height:60px;
  border:1.5px dashed rgba(192,132,252,.2); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:rgba(192,132,252,.2);
  cursor:pointer; transition:all .25s;
}
.empty-slot:hover {
  border-color:rgba(192,132,252,.5);
  color:rgba(192,132,252,.5);
  background:rgba(192,132,252,.05);
}

/* 아바타 in room */
.room-avatar {
  position:absolute; bottom:18%; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center;
  animation:avatarBob 3s ease-in-out infinite;
  z-index:5;
}
@keyframes avatarBob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-6px)} }
.room-avatar-body {
  width:56px; height:56px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:28px;
  position:relative;
}
.room-avatar-aura {
  position:absolute; inset:-6px; border-radius:50%;
  animation:auraRotate 6s linear infinite;
}
@keyframes auraRotate { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.room-avatar-shadow {
  width:40px; height:8px; border-radius:50%;
  background:rgba(0,0,0,.4); filter:blur(4px);
  margin-top:4px;
}

/* 파티클 in room */
.room-particles {
  position:absolute; inset:0; pointer-events:none; overflow:hidden;
}
.room-particle {
  position:absolute; width:3px; height:3px; border-radius:50%;
  animation:roomParticle linear infinite;
  opacity:.6;
}
@keyframes roomParticle {
  from { transform:translateY(100%) translateX(0); opacity:.6; }
  to   { transform:translateY(-20px) translateX(var(--dx,20px)); opacity:0; }
}

/* 방문자 수 오버레이 */
.room-visitor-badge {
  position:absolute; top:12px; right:12px;
  background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1); border-radius:20px;
  padding:5px 12px; font-size:11px; display:flex; align-items:center; gap:6px;
}
.visitor-dot { width:6px; height:6px; border-radius:50%; background:#10b981; animation:livePulse 1.2s infinite; }
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 방 테마 배지 */
.room-theme-badge {
  position:absolute; bottom:12px; left:12px;
  background:rgba(0,0,0,.5); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1); border-radius:20px;
  padding:5px 12px; font-size:11px; color:var(--muted);
}

/* ════════════════════════════
   방 통계 카드
════════════════════════════ */
.room-stats {
  position:relative; z-index:10;
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  margin:10px 14px 0;
}
.room-stat-card {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:14px; padding:12px; text-align:center;
}
.rsc-icon { font-size:18px; margin-bottom:4px; }
.rsc-val { font-size:16px; font-weight:900; }
.rsc-label { font-size:10px; color:var(--muted); margin-top:2px; }

/* ════════════════════════════
   아이템 인벤토리
════════════════════════════ */
.inventory-section {
  position:relative; z-index:10;
  padding:14px 14px 0;
}
.inv-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.section-title {
  font-size:10px; color:var(--muted); letter-spacing:2.5px;
  text-transform:uppercase; display:flex; align-items:center; gap:8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.inv-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.filter-chip {
  padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
  border:1px solid var(--border); background:transparent; color:var(--muted);
  cursor:pointer; transition:all .2s; font-family:'Noto Sans KR',sans-serif;
}
.filter-chip.active { background:rgba(192,132,252,.15); border-color:var(--accent); color:var(--accent); }
.inv-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.inv-item {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:14px; padding:12px 6px; text-align:center;
  cursor:pointer; transition:all .25s; position:relative; overflow:hidden;
}
.inv-item:hover { border-color:var(--accent); background:rgba(192,132,252,.08); transform:scale(1.03); }
.inv-item.placed { border-color:rgba(16,185,129,.5); background:rgba(16,185,129,.06); }
.inv-item-emoji { font-size:26px; margin-bottom:5px; }
.inv-item-name { font-size:9px; color:var(--text); font-weight:500; line-height:1.3; }
.inv-item-rarity {
  font-size:8px; margin-top:3px; font-weight:700; letter-spacing:.5px;
}
.rarity-common { color:#94a3b8; }
.rarity-rare { color:#38bdf8; }
.rarity-epic { color:#c084fc; }
.rarity-legendary { color:var(--gold); }
.rarity-genesis { color:#ff6b6b; }
.inv-item-lock {
  position:absolute; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center;
  border-radius:14px; font-size:18px;
}
.placed-badge {
  position:absolute; top:4px; right:4px;
  width:14px; height:14px; border-radius:50%;
  background:#10b981; display:flex; align-items:center; justify-content:center;
  font-size:8px;
}

/* ════════════════════════════
   테마 선택
════════════════════════════ */
.theme-section {
  position:relative; z-index:10;
  padding:14px 14px 0;
}
.theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.theme-card {
  border-radius:14px; overflow:hidden; cursor:pointer;
  border:2px solid transparent; transition:all .25s; position:relative;
  aspect-ratio:16/9;
}
.theme-card.active { border-color:var(--gold); box-shadow:0 0 16px rgba(240,192,64,.3); }
.theme-card:hover { transform:scale(1.02); }
.theme-preview { width:100%; height:100%; display:flex; align-items:flex-end; padding:6px 8px; }
.theme-name { font-size:10px; font-weight:700; text-shadow:0 1px 4px rgba(0,0,0,.8); }
.theme-active-badge {
  position:absolute; top:4px; right:4px;
  background:var(--gold); color:var(--void); border-radius:20px;
  font-size:8px; font-weight:900; padding:2px 6px;
}

/* ════════════════════════════
   방문자 & 방명록
════════════════════════════ */
.visitors-section {
  position:relative; z-index:10;
  padding:14px 14px 0;
}
.visitor-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.visitor-card {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px;
  display:flex; align-items:center; gap:10px;
}
.visitor-av {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:18px;
  flex-shrink:0;
}
.visitor-info { flex:1; }
.visitor-name { font-size:13px; font-weight:600; }
.visitor-msg { font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4; }
.visitor-time { font-size:10px; color:var(--muted); flex-shrink:0; }
.visitor-heart { font-size:16px; cursor:pointer; transition:transform .2s; }
.visitor-heart:hover { transform:scale(1.3); }

/* 방명록 입력 */
.gb-input-wrap { display:flex; gap:8px; }
.gb-input {
  flex:1; background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:12px; padding:10px 14px; color:var(--text); font-size:13px;
  font-family:'Noto Sans KR',sans-serif; outline:none; transition:border-color .2s;
}
.gb-input:focus { border-color:rgba(192,132,252,.5); }
.gb-send {
  padding:0 18px; border-radius:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border:none; color:#fff; font-size:13px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s;
  white-space:nowrap;
}
.gb-send:hover { box-shadow:0 0 16px rgba(192,132,252,.4); }

/* ════════════════════════════
   SNS 공유 버튼
════════════════════════════ */
.share-section {
  position:relative; z-index:10;
  padding:14px 14px 0;
}
.share-card {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:16px; padding:18px;
}
.share-preview {
  width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden;
  margin-bottom:14px; position:relative;
  background:linear-gradient(135deg,#0d0820,#07051a);
  display:flex; align-items:center; justify-content:center;
}
.share-preview-room { font-size:48px; }
.share-preview-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.8));
  display:flex; align-items:flex-end; padding:14px;
}
.share-preview-info { }
.share-preview-name { font-size:14px; font-weight:700; }
.share-preview-sub { font-size:11px; color:var(--muted); }
.share-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.share-btn {
  padding:10px 6px; border-radius:12px; border:1px solid var(--border);
  background:rgba(255,255,255,.04); cursor:pointer; text-align:center;
  font-size:11px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
  transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:4px;
}
.share-btn:hover { border-color:var(--accent); background:rgba(192,132,252,.08); }
.share-btn-icon { font-size:20px; }

/* ════════════════════════════
   경쟁 랭킹 배너
════════════════════════════ */
.ranking-banner {
  position:relative; z-index:10;
  margin:16px 18px 0;
  padding:14px 16px; border-radius:16px;
  background:linear-gradient(135deg,rgba(240,192,64,.08),rgba(192,132,252,.08));
  border:1px solid rgba(240,192,64,.2);
  display:flex; align-items:center; gap:12px;
}
.rb-trophy { font-size:28px; }
.rb-info { flex:1; }
.rb-title { font-size:12px; font-weight:700; color:var(--gold); }
.rb-desc { font-size:11px; color:var(--muted); margin-top:2px; }
.rb-rank {
  font-family:'Orbitron',monospace; font-size:22px; font-weight:900;
  color:var(--gold); text-align:center;
}
.rb-rank-label { font-size:9px; color:var(--muted); text-align:center; }

/* ════════════════════════════
   BOTTOM NAV
════════════════════════════ */






/* ════════════════════════════
   ITEM PLACE MODAL
════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; z-index:9000;
  background:rgba(0,0,0,.75); backdrop-filter:blur(12px);
  display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal-box {
  width:100%; max-width:480px;
  background:rgba(12,12,26,.98); border-top:1px solid var(--border);
  border-radius:24px 24px 0 0; padding:24px 20px 40px;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
  max-height:70vh; overflow-y:auto;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-box::-webkit-scrollbar{width:3px}
.modal-box::-webkit-scrollbar-thumb{background:rgba(192,132,252,.3);border-radius:3px}
.modal-handle { width:40px; height:4px; border-radius:2px; background:rgba(255,255,255,.2); margin:0 auto 20px; }
.modal-title { font-family:'Orbitron',monospace; font-size:14px; font-weight:700; color:var(--accent); margin-bottom:16px; }
.modal-item-info {
  display:flex; align-items:center; gap:14px;
  background:rgba(255,255,255,.04); border-radius:14px; padding:14px; margin-bottom:16px;
}
.modal-item-emoji { font-size:40px; }
.modal-item-detail { flex:1; }
.modal-item-name { font-size:15px; font-weight:700; }
.modal-item-rarity { font-size:11px; margin-top:2px; }
.modal-item-bonus { font-size:12px; color:var(--accent); margin-top:6px; }
.modal-slots { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.slot-btn {
  aspect-ratio:1; border-radius:12px; border:1.5px dashed rgba(192,132,252,.25);
  background:rgba(255,255,255,.03); display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer; transition:all .2s;
  font-size:12px; color:var(--muted); gap:4px;
}

const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
let W, H;
function rsz() { W=bgC.width=Math.min(480,window.innerWidth); H=bgC.height=window.innerHeight; }
rsz(); window.addEventListener('resize',rsz);
const bgStars = Array.from({length:160},()=>({
  x:Math.random()*480, y:Math.random()*800,
  s:Math.random()*1.2+.2, a:Math.random()*.4+.08,
  ph:Math.random()*Math.PI*2, sp:Math.random()*.012+.003,
  col:['#f0c040','#c084fc','#38bdf8','#fff'][Math.floor(Math.random()*4)]
}));
function bgLoop() {
  bgX.clearRect(0,0,W,H);
  bgStars.forEach(s=>{
    s.ph+=s.sp;
    bgX.globalAlpha=s.a*(.4+.6*Math.sin(s.ph));
    bgX.fillStyle=s.col;
    bgX.beginPath(); bgX.arc(s.x%W,s.y%H,s.s,0,Math.PI*2); bgX.fill();
  });
  bgX.globalAlpha=1;
  requestAnimationFrame(bgLoop);
}
bgLoop();

function applyTheme(themeId, save=true) {
  const t = THEMES.find(x=>x.id===themeId) || THEMES[0];
  currentTheme = themeId;

  document.getElementById('roomWall').style.background =
    `linear-gradient(to bottom, ${t.wall}, ${t.floor}88)`;
  document.getElementById('roomFloor').style.background =
    `linear-gradient(to bottom, ${t.floor}88, ${t.floor})`;
  document.getElementById('roomMolding').style.background =
    `linear-gradient(90deg, transparent, ${t.molding}60, ${t.accent}, ${t.molding}60, transparent)`;
  document.getElementById('roomMolding').style.boxShadow = `0 0 12px ${t.accent}80`;
  document.getElementById('roomThemeBadge').textContent = `${t.icon} ${t.name} 테마`;
  document.documentElement.style.setProperty('--room-accent', t.accent);

  // 방 파티클 색상
  document.querySelectorAll('.room-particle').forEach(p => p.style.background = t.accent);

  // 아바타 아우라 색상
  const ring = document.getElementById('roomAvatarAura');
  if(ring) ring.style.borderTopColor = t.accent+'80';

  // 테마 그리드 활성화
  document.querySelectorAll('.theme-card').forEach(c => {
    c.classList.toggle('active', c.dataset.theme === themeId);
  });

  if(save) showToast(`${t.icon} ${t.name} 테마로 변경됐어요!`);
  updateStage();
  renderRoomParticles(t.accent);
}

function renderRoomItems() {
  const container = document.getElementById('roomItems');
  container.innerHTML = '';

  // 배치된 아이템
  ITEMS.filter(i=>i.placed && i.pos).forEach(item=>{
    const div = document.createElement('div');
    div.className = 'placed-item';
    div.style.cssText = `left:${item.pos.left};top:${item.pos.top};animation-delay:${Math.random()*2}s`;
    div.innerHTML = `
      <div class="item-glow" style="background:var(--room-accent)"></div>
      <div class="item-emoji">${item.emoji}</div>
      <div class="item-label">${item.name}</div>
    `;
    div.onclick = (e) => { e.stopPropagation(); if(isEditMode) removeItem(item.id); };
    container.appendChild(div);
  });

  // 편집 모드일 때 빈 슬롯 표시
  if(isEditMode) {
    const emptySlots = [
      {left:'55%',top:'55%'}, {left:'20%',top:'30%'}, {left:'78%',top:'45%'}
    ];
    emptySlots.forEach((pos,i)=>{
      const div = document.createElement('div');
      div.className = 'empty-slot';
      div.style.cssText = `left:${pos.left};top:${pos.top}`;
      div.textContent = '+';
      div.onclick = (e) => { e.stopPropagation(); showToast('아래 인벤토리에서 아이템을 선택하세요!'); };
      container.appendChild(div);
    });
  }

  updateStage();
}

function renderRoomParticles(color='#c084fc') {
  const container = document.getElementById('roomParticles');
  container.innerHTML = '';
  for(let i=0;i<12;i++){
    const p = document.createElement('div');
    p.className = 'room-particle';
    p.style.cssText = `
      left:${Math.random()*100}%;
      bottom:${Math.random()*30}%;
      width:${Math.random()*3+1}px;
      height:${Math.random()*3+1}px;
      background:${color};
      box-shadow:0 0 4px ${color};
      animation-duration:${3+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
      --dx:${(Math.random()-0.5)*40}px;
    `;
    container.appendChild(p);
  }
}

    next='MAX ✦';
  } else if(placedCount >= 4) {
    stage=2; name='🔥 Ignition — 불꽃의 방';
    desc=`아이템 ${8-placedCount}개 더 배치하면 Supernova로 진화해요!`;
    next=`${placedCount}/8 ✦`;
  } else {
    desc=`아이템 ${4-placedCount}개 더 배치하면 Ignition 단계로 진화해요!`;
    next=`${placedCount}/4 ✦`;
  }

  for(let i=1;i<=3;i++) {
    document.getElementById(`sd${i}`).classList.toggle('active', i <= stage);
  }
  document.getElementById('stageName').textContent = name;
  document.getElementById('stageDesc').textContent = desc;
  document.getElementById('stageNext').textContent = next;

  // CP 업데이트
  const cp = placedCount * 60 + 200;
  document.getElementById('statCP').textContent = cp;
}

// ════════════════════════════════════
// INVENTORY
// ════════════════════════════════════
function renderInventory(filter='all') {
  const grid = document.getElementById('invGrid');
  const filtered = filter==='all' ? ITEMS : ITEMS.filter(i=>i.type===filter);

  grid.innerHTML = filtered.map(item=>`
    <div class="inv-item ${item.placed?'placed':''}" onclick="onItemClick(${item.id})">
      ${item.placed ? '<div class="placed-badge">✓</div>' : ''}
      ${item.locked ? `<div class="inv-item-lock" title="${item.lockMsg}">🔒</div>` : ''}
      <div class="inv-item-emoji">${item.emoji}</div>
      <div class="inv-item-name">${item.name}</div>
      <div class="inv-item-rarity rarity-${item.rarity}">${item.rarity.toUpperCase()}</div>
    </div>
  `).join('');
}

function filterItems(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderInventory(type);
}

function onItemClick(itemId) {
  const item = ITEMS.find(i=>i.id===itemId);
  if(!item) return;
  if(item.locked) { showToast(`🔒 ${item.lockMsg} 달성 시 해금!`); return; }
  if(item.placed) { removeItem(itemId); return; }
  openPlaceModal(item);
}

// ════════════════════════════════════
// PLACE MODAL
// ════════════════════════════════════
function openPlaceModal(item) {
  selectedItem = item;
  document.getElementById('modalTitle').textContent = `"${item.name}" 배치하기`;
  document.getElementById('modalItemInfo').innerHTML = `
    <div class="modal-item-emoji">${item.emoji}</div>
    <div class="modal-item-detail">
      <div class="modal-item-name">${item.name}</div>
      <div class="modal-item-rarity rarity-${item.rarity}">${item.rarity.toUpperCase()}</div>
      <div class="modal-item-bonus">✦ ${item.bonus}</div>
    </div>
  `;

  // 슬롯들
  const slots = document.getElementById('modalSlots');
  const SLOT_POSITIONS = [
    {left:'12%',top:'15%'}, {left:'70%',top:'12%'}, {left:'32%',top:'55%'},
    {left:'55%',top:'55%'}, {left:'20%',top:'30%'}, {left:'78%',top:'45%'},
    {left:'8%',top:'50%'},  {left:'85%',top:'25%'},
  ];
  slots.innerHTML = SLOT_POSITIONS.map((pos,i)=>{
    const occupant = ITEMS.find(x=>x.placed && x.slot===i+1);
    return `
      <div class="slot-btn ${occupant?'occupied':''}" onclick="placeItem(${i+1},'${pos.left}','${pos.top}')">
        <div class="slot-btn-emoji">${occupant ? occupant.emoji : '+'}</div>
        <div class="slot-btn-label">슬롯 ${i+1}</div>
      </div>
    `;
  }).join('');

  document.getElementById('placeModal').classList.add('show');
}

function placeItem(slot, left, top) {
  if(!selectedItem) return;
  // 기존 점유 해제
  ITEMS.forEach(i=>{ if(i.slot===slot) { i.placed=false; i.slot=null; i.pos=null; } });
  // 새 배치
  selectedItem.placed = true;
  selectedItem.slot = slot;
  selectedItem.pos = {left, top};
  closeModal();
  renderRoomItems();
  renderInventory(currentFilter);
  updateStage();
  showToast(`${selectedItem.emoji} ${selectedItem.name} 배치 완료! ${selectedItem.bonus}`);

  // 파티클 효과
  burstParticles(200, 300);
}

function removeItem(itemId) {
  const item = ITEMS.find(i=>i.id===itemId);
  if(!item) return;
  item.placed=false; item.slot=null; item.pos=null;
  renderRoomItems();
  renderInventory(currentFilter);
  updateStage();
  showToast(`${item.emoji} ${item.name} 제거됐어요.`);
}

function closeModal() {
  document.getElementById('placeModal').classList.remove('show');
  selectedItem = null;
}

// ════════════════════════════════════
// THEME GRID
// ════════════════════════════════════
function renderThemes() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = THEMES.map(t=>`
    <div class="theme-card ${t.id===currentTheme?'active':''}" data-theme="${t.id}" onclick="applyTheme('${t.id}')">
      <div class="theme-preview"
        style="background:linear-gradient(135deg,${t.wall},${t.floor});width:100%;height:100%;display:flex;align-items:flex-end;padding:6px 8px">
        <span style="font-size:16px">${t.icon}</span>
        <span style="font-size:10px;font-weight:700;margin-left:4px;text-shadow:0 1px 4px rgba(0,0,0,.8)">${t.name}</span>
      </div>
      ${t.id===currentTheme?'<div class="theme-active-badge">현재</div>':''}
    </div>
  `).join('');
}

// ════════════════════════════════════
// GUESTBOOK
// ════════════════════════════════════
function renderGuestbook() {
  const list = document.getElementById('visitorList');
  list.innerHTML = GUESTBOOK.map((g,i)=>`
    <div class="visitor-card">
      <div class="visitor-av" style="background:radial-gradient(circle,rgba(192,132,252,.3),rgba(7,7,15,.9))">${g.emoji}</div>
      <div class="visitor-info">
        <div class="visitor-name">${g.name}</div>
        <div class="visitor-msg">${g.msg}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
        <div class="visitor-time">${g.time}</div>
        <div class="visitor-heart" onclick="heartEntry(${i})">❤️ ${g.hearts}</div>
      </div>
    </div>
  `).join('');
}

function heartEntry(idx) {
  GUESTBOOK[idx].hearts++;
  renderGuestbook();
  showToast('💜 하트를 남겼어요!');
  document.getElementById('heartCount').textContent = parseInt(document.getElementById('heartCount').textContent)+1;
  document.getElementById('statHeart').textContent = parseInt(document.getElementById('statHeart').textContent)+1;
}

function sendGuestbook() {
  const input = document.getElementById('gbInput');
  const msg = input.value.trim();
  if(!msg) return;
  GUESTBOOK.unshift({ name:'나', emoji:'🌟', msg, time:'방금', hearts:0 });
  input.value = '';
  renderGuestbook();
  showToast('✨ 방명록을 남겼어요!');
}

// ════════════════════════════════════
// EDIT MODE
// ════════════════════════════════════
function toggleEditMode() {
  isEditMode = !isEditMode;
  const btn = document.getElementById('editBtn');
  btn.textContent = isEditMode ? '완료 ✓' : '꾸미기 ✏️';
  btn.style.background = isEditMode
    ? 'linear-gradient(90deg,#10b981,#059669)'
    : 'linear-gradient(90deg,var(--accent),var(--accent2))';
  renderRoomItems();
  showToast(isEditMode ? '✏️ 편집 모드 ON — 아이템을 클릭해 배치/제거하세요!' : '✓ 방 꾸미기 완료!');
}

function onRoomTap(e) {
  if(!isEditMode) {
    // 방 탭 시 파티클 효과
    const rect = e.currentTarget.getBoundingClientRect();
    burstParticles(e.clientX, e.clientY);
  }
}

// ════════════════════════════════════
// SHARE
// ════════════════════════════════════
function shareRoom() {
  const url = `https://asteria.me.kr/room.html`;
  if(navigator.share) {
    navigator.share({ title:'별빛 탐험가의 아스트라 방', text:'내 방 구경하러 와요! 🌟', url })
      .catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(()=>showToast('🔗 링크가 복사됐어요!'));
  }
}

function shareToSNS(platform) {
  const url = encodeURIComponent('https://asteria.me.kr/room.html');
  const text = encodeURIComponent('별빛 탐험가의 아스트라 방을 구경해보세요! 🌟 #아스테리아 #팬덤');
  const urls = {
    twitter: `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
    kakao: `https://story.kakao.com/share?url=${url}`,
    instagram: null,
    copy: null,
  };
  if(platform==='copy') {
    navigator.clipboard.writeText('https://asteria.me.kr/room.html')
      .then(()=>showToast('🔗 링크가 복사됐어요!'));
    return;
  }
  if(platform==='instagram') {
    showToast('📸 이미지를 저장하고 인스타에 올려보세요!'); return;
  }
  if(urls[platform]) window.open(urls[platform],'_blank');
  showToast('공유 완료! 🎉');
}

// ════════════════════════════════════
// PARTICLES BURST
// ════════════════════════════════════
function burstParticles(x, y) {
  for(let i=0;i<15;i++){
    const p = document.createElement('div');
    const colors=['#f0c040','#c084fc','#38bdf8','#fff','#10b981'];
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=Math.random()*5+2;
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*70+20;
    p.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color};z-index:9999;pointer-events:none;transition:all ${.4+Math.random()*.3}s ease-out;transform:translate(-50%,-50%)`;
    document.body.appendChild(p);
    requestAnimationFrame(()=>{
      p.style.transform=`translate(calc(-50% + ${Math.cos(angle)*dist}px),calc(-50% + ${Math.sin(angle)*dist}px))`;
      p.style.opacity='0';
    });
    setTimeout(()=>p.remove(),800);
  }
}

// ════════════════════════════════════
// TOAST
// ════════════════════════════════════
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);
}

// ════════════════════════════════════
// LIVE VISITORS 시뮬
// ════════════════════════════════════
function updateLiveVisitors() {
  const n = Math.floor(Math.random()*5)+1;
  document.getElementById('liveVisitors').textContent = `${n}명 방문 중`;
}
setInterval(updateLiveVisitors, 8000);

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
applyTheme('void', false);
renderRoomItems();
renderInventory();
renderThemes();
renderGuestbook();
</script>
