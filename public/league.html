<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>리그 랭킹 맵 — ASTERIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#020a18;--panel:rgba(5,12,30,.96);
  --border:rgba(200,175,80,.13);--gold:#f0c040;
  --accent:#4a90d9;--accent2:#2c6fbd;
  --text:#e8ecf4;--muted:rgba(160,180,210,.5);
}
html,body{width:100%;height:100%;background:var(--void);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
#app{width:100%;height:100vh;display:flex;flex-direction:column;max-width:1200px;margin:0 auto}

/* ── 상단 네비 ── */
.top-nav{display:flex;align-items:center;background:var(--panel);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.top-nav::-webkit-scrollbar{display:none}
.top-nav-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:10px 14px;cursor:pointer;text-decoration:none;color:var(--muted);border-bottom:2px solid transparent;gap:3px;transition:all .2s}
.top-nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.top-nav-icon{font-size:18px}.top-nav-label{font-size:9px;font-weight:500;white-space:nowrap}

/* ── 메인 레이아웃 ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── 왼쪽 리그 네비 ── */
.league-nav{width:70px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:8px 0;gap:4px;overflow-y:auto}
.ln-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;transition:all .2s;border-left:3px solid transparent;font-size:9px;font-weight:600}
.ln-btn.active{color:var(--text);border-left-color:var(--gold);background:rgba(240,192,64,.08)}
.ln-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.ln-icon{font-size:20px}
.ln-label{font-size:8px;letter-spacing:.5px}

/* ── 오른쪽 영역 ── */
.right-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* 승격/강등 비교 바 */
.compare-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);font-size:10px;flex-shrink:0}
.compare-bar.bottom{border-bottom:none;border-top:1px solid var(--border)}
.cb-label{color:var(--muted);flex-shrink:0;min-width:60px}
.cb-track{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.cb-fill{height:100%;border-radius:4px;transition:width .5s}
.cb-fill.safe{background:linear-gradient(90deg,#10b981,#059669)}
.cb-fill.warn{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.cb-score{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;min-width:80px;text-align:right}
.cb-score .hi{color:var(--gold)}.cb-score .lo{color:var(--muted)}

/* ── 맵 영역 ── */
.map-viewport{flex:1;overflow:hidden;position:relative;cursor:grab}
.map-viewport:active{cursor:grabbing}
.map-world{position:absolute;width:3000px;height:3000px;transform-origin:0 0}

/* 팬클럽 노드 */
.fc-node{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .3s;transform:translate(-50%,-50%)}
.fc-node:hover{transform:translate(-50%,-50%) scale(1.15);z-index:10}
.fc-circle{border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;transition:all .3s}
.fc-rank{font-family:'Orbitron',monospace;font-size:10px;color:rgba(255,255,255,.7);margin-top:3px;text-align:center}
.fc-node.mine .fc-circle{animation:minePulse 1.5s ease-in-out infinite}
@keyframes minePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}

/* 1등 파티클 */
.glow-particle{position:absolute;border-radius:50%;background:var(--gold);pointer-events:none;animation:glowFloat 3s ease-in-out infinite}
@keyframes glowFloat{0%,100%{transform:translate(0,0) scale(1);opacity:.6}50%{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0}}

/* ── 상세 모달 ── */
.detail-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px}
.detail-overlay.show{display:flex}
.detail-card{background:rgba(8,8,22,.97);border:1px solid var(--border);border-radius:20px;width:360px;max-width:95vw;padding:24px;text-align:center}
.dc-close{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.dc-icon{font-size:48px;margin:10px 0}
.dc-name{font-size:18px;font-weight:900;margin-bottom:4px}
.dc-rank{font-family:'Orbitron',monospace;font-size:14px;color:var(--gold);margin-bottom:12px}
.dc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.dc-stat{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 4px}
.dc-stat-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:900}
.dc-stat-label{font-size:9px;color:var(--muted);margin-top:2px}
.dc-change{font-size:12px;margin-bottom:14px}
.dc-change .up{color:#10b981}.dc-change .down{color:#ef4444}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(12,12,26,.97);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* 줌/바로가기 */
.zoom-controls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:20}
.zoom-btn{width:36px;height:36px;border-radius:50%;background:rgba(12,12,26,.85);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text);backdrop-filter:blur(8px)}
.zoom-btn:hover{border-color:var(--gold);background:rgba(240,192,64,.1)}
.goto-mine{position:absolute;bottom:16px;left:16px;z-index:20;padding:8px 14px;border-radius:20px;background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.4);color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.goto-mine:hover{background:rgba(240,192,64,.25)}
</style>
</head>
<body>

<div class="detail-overlay" id="detailOv">
  <div class="detail-card">
    <button class="dc-close" onclick="closeDetail()">✕</button>
    <div class="dc-icon" id="dcIcon">⭐</div>
    <div class="dc-name" id="dcName"></div>
    <div class="dc-rank" id="dcRank"></div>
    <div class="dc-stats" id="dcStats"></div>
    <div class="dc-change" id="dcChange"></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<div id="app">
  <nav class="top-nav">
    <a class="top-nav-item" href="/"><div class="top-nav-icon">🏠</div><div class="top-nav-label">홈</div></a>
    <a class="top-nav-item" href="/astra.html"><div class="top-nav-icon">⭐</div><div class="top-nav-label">아스트라</div></a>
    <a class="top-nav-item" href="/room3d.html"><div class="top-nav-icon">🏡</div><div class="top-nav-label">내 방</div></a>
    <a class="top-nav-item active" href="/league.html"><div class="top-nav-icon">🌌</div><div class="top-nav-label">리그</div></a>
    <a class="top-nav-item" href="/avatar.html"><div class="top-nav-icon">🎭</div><div class="top-nav-label">아바타</div></a>
    <a class="top-nav-item" href="/shop.html"><div class="top-nav-icon">🛒</div><div class="top-nav-label">상점</div></a>
  </nav>

  <div class="main">
    <div class="league-nav" id="leagueNav"></div>
    <div class="right-area">
      <div class="compare-bar" id="promoteBar">
        <div class="cb-label">승격 — Promote</div>
        <div class="cb-track"><div class="cb-fill safe" id="promFill" style="width:60%"></div></div>
        <div class="cb-score" id="promScore"></div>
      </div>
      <div class="map-viewport" id="mapViewport">
        <div class="map-world" id="mapWorld"></div>
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="zoomMap(1.2)">🔍</button>
          <button class="zoom-btn" onclick="zoomMap(0.8)">🔎</button>
          <button class="zoom-btn" onclick="resetZoom()">🔄</button>
        </div>
        <button class="goto-mine" onclick="goToMine()">📍 내 팬클럽 — My Fanclub</button>
      </div>
      <div class="compare-bar bottom">
        <div class="cb-label">강등 — Relegate</div>
        <div class="cb-track"><div class="cb-fill warn" id="relFill" style="width:30%"></div></div>
        <div class="cb-score" id="relScore"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  리그 설정
// ══════════════════════════════════════════
const LEAGUES=[
  {id:'dust',name:'더스트',nameEn:'Dust',icon:'🌑',count:50,
   bg1:'#08080c',bg2:'#040406',sizeMin:40,sizeMax:60,rank1Size:70,
   color:'#888',colorRgb:'136,136,136',ringOuter:'rgba(160,160,160,.4)'},
  {id:'star',name:'스타',nameEn:'Star',icon:'⭐',count:40,
   bg1:'#0a0c1a',bg2:'#040610',sizeMin:50,sizeMax:80,rank1Size:95,
   color:'#c0c0c0',colorRgb:'192,192,192',ringOuter:'rgba(220,220,240,.4)'},
  {id:'planet',name:'플래닛',nameEn:'Planet',icon:'🪐',count:20,
   bg1:'#061210',bg2:'#030a08',sizeMin:60,sizeMax:100,rank1Size:115,
   color:'#2ecc71',colorRgb:'46,204,113',ringOuter:'rgba(100,255,160,.3)'},
  {id:'nova',name:'노바',nameEn:'Nova',icon:'💜',count:10,
   bg1:'#120820',bg2:'#080414',sizeMin:120,sizeMax:180,rank1Size:210,
   color:'#a855f7',colorRgb:'168,85,247',ringOuter:'rgba(200,140,255,.35)'},
  {id:'quasar',name:'퀘이사',nameEn:'Quasar',icon:'👑',count:5,
   bg1:'#18140a',bg2:'#0c0a04',sizeMin:360,sizeMax:540,rank1Size:600,
   color:'#f0c040',colorRgb:'240,192,64',ringOuter:'rgba(255,255,255,.3)'},
];
const FC_POOL=['ARMY','BLINK','ONCE','STAY','MY','ATINY','MIDZY','ENGENE','MOA','CARAT','ORBIT','NEVERLAND','REVELUV','UNIVERSE','FANTASY','BUDDY','MONBEBE','AROHA','MELODY','INSPIRIT','EXOL','VIP','SHAWOL','CASSIOPEIA','ELF','SONE','AHGASE','IGOT7','BABY','WANNABLE','MOOMOO','INNER CIRCLE','TREASURE MAKERS','LULLET','PLORY','SWITCH','SWITH','WENEE','KETCHY','FEARNOT','ERIGOM','LUNÉ','ZE:A','ALICE','REVE','DANITY','IKONICS','MONSTA X','GOLDENNESS','UJUNG'];
const FC_ICONS=['⭐','🌟','💫','✨','🔥','💜','🌙','☀️','🪐','💎'];
const MY_FC='ARMY';
let currentLeague='dust', mapScale=1, mapX=0, mapY=0;
let dragging=false, dragStart={x:0,y:0}, dragMapStart={x:0,y:0};
let leagueData={};

// ══════════════════════════════════════════
//  데이터 생성 (리그별 차등 개수)
// ══════════════════════════════════════════
// 팬클럽 고유 색상
const FC_COLORS={
  ARMY:'#f0c040',BLINK:'#ff69b4',ONCE:'#4a90d9',STAY:'#a855f7',MY:'#ff8c00',
  ATINY:'#e74c3c',MIDZY:'#00bcd4',ENGENE:'#6c5ce7',MOA:'#2ecc71',CARAT:'#e8c4f0',
  ORBIT:'#38bdf8',NEVERLAND:'#f472b6',REVELUV:'#c084fc',UNIVERSE:'#fbbf24',FANTASY:'#10b981',
  BUDDY:'#ff6b6b',MONBEBE:'#c0392b',AROHA:'#8e44ad',MELODY:'#3498db',INSPIRIT:'#f39c12',
  EXOL:'#c0c0c0',VIP:'#f0c040',SHAWOL:'#1abc9c',CASSIOPEIA:'#e74c3c',ELF:'#3498db',
  SONE:'#ff69b4',AHGASE:'#2ecc71',IGOT7:'#2ecc71',BABY:'#ff8c00',WANNABLE:'#a855f7',
};
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `${r},${g},${b}`}
function randomFcColor(){const h=Math.floor(Math.random()*360),s=60+Math.random()*30,l=55+Math.random()*15;return `hsl(${h},${s}%,${l}%)`}

function generateData(){
  LEAGUES.forEach(lg=>{
    const clubs=[];
    for(let i=0;i<lg.count;i++){
      const name=i<FC_POOL.length?FC_POOL[i]:`FC_${i+1}`;
      const color=FC_COLORS[name]||randomFcColor();
      // hsl→hex 변환 불필요, rgb 직접 계산
      const tmp=document.createElement('div');tmp.style.color=color;document.body.appendChild(tmp);
      const rgb=getComputedStyle(tmp).color.match(/\d+/g);document.body.removeChild(tmp);
      const colorRgb=rgb?`${rgb[0]},${rgb[1]},${rgb[2]}`:'200,200,200';
      clubs.push({
        name, icon:FC_ICONS[i%10], color, colorRgb,
        score:Math.max(1000, 10000-i*Math.floor(8000/lg.count)+Math.floor(Math.random()*300)),
        members:Math.floor(500+Math.random()*9500),
        change:Math.floor(Math.random()*7)-3,
        isMine:name===MY_FC,
      });
    }
    clubs.sort((a,b)=>b.score-a.score);
    clubs.forEach((c,i)=>c.rank=i+1);
    leagueData[lg.id]=clubs;
  });
}

// ══════════════════════════════════════════
//  리그 네비
// ══════════════════════════════════════════
function renderNav(){
  document.getElementById('leagueNav').innerHTML=LEAGUES.map(l=>`
    <button class="ln-btn ${l.id===currentLeague?'active':''}" onclick="switchLeague('${l.id}')">
      <div class="ln-icon">${l.icon}</div><div class="ln-label">${l.name}</div>
    </button>`).join('');
}
function switchLeague(id){
  currentLeague=id; renderNav(); renderMap(); updateBars();
  setTimeout(()=>goToMine(),100);
}

// ══════════════════════════════════════════
//  맵 렌더 (나선형 배치)
// ══════════════════════════════════════════
function renderMap(){
  const lg=LEAGUES.find(l=>l.id===currentLeague);
  const clubs=leagueData[currentLeague];
  const w=document.getElementById('mapWorld');
  const cx=1500, cy=1500;

  // 리그별 배경 분위기
  const bgStyles={
    dust:`radial-gradient(circle at 50% 50%,${lg.bg1},${lg.bg2})`,
    star:`radial-gradient(circle at 50% 50%,${lg.bg1},${lg.bg2})`,
    planet:`radial-gradient(circle at 50% 50%,${lg.bg1},${lg.bg2})`,
    nova:`radial-gradient(circle at 40% 40%,#1a0830,${lg.bg1},${lg.bg2})`,
    quasar:`radial-gradient(circle at 50% 50%,#1a1508,${lg.bg1},${lg.bg2})`,
  };
  w.style.background=bgStyles[lg.id]||bgStyles.dust;
  w.innerHTML='';

  // 리그별 배경 파티클
  const particleCounts={dust:40,star:60,planet:50,nova:80,quasar:100};
  const particleColors={dust:'rgba(100,100,110,.3)',star:'rgba(200,190,120,.25)',planet:'rgba(80,200,140,.2)',nova:'rgba(180,100,255,.3)',quasar:'rgba(240,192,64,.35)'};
  for(let p=0;p<(particleCounts[lg.id]||40);p++){
    const dot=document.createElement('div');
    const sz=lg.id==='quasar'?2+Math.random()*4:1+Math.random()*2.5;
    dot.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:${particleColors[lg.id]};left:${Math.random()*3000}px;top:${Math.random()*3000}px;pointer-events:none`;
    w.appendChild(dot);
  }

  // 나선형 간격 — 팬클럽 적을수록 넓게
  const spiralGap = Math.max(20, 50 - lg.count * 0.5);

  clubs.forEach((club,i)=>{
    let x,y,size;
    if(lg.id==='quasar'){
      // 퀘이사: 십자 배치 (1위 중앙, 2위 위, 3위 오른쪽, 4위 아래, 5위 왼쪽)
      const qGap = 620; // 팬클럽 간 간격 (겹침 방지)
      const qPositions = [
        [cx, cy],              // 1위: 정중앙
        [cx, cy - qGap],       // 2위: 위
        [cx + qGap, cy],       // 3위: 오른쪽
        [cx, cy + qGap],       // 4위: 아래
        [cx - qGap, cy],       // 5위: 왼쪽
      ];
      x = qPositions[i][0];
      y = qPositions[i][1];
      if(i===0) size = lg.rank1Size;
      else {
        const t = Math.max(0, 1 - (i-1)/(lg.count-1));
        size = Math.round(lg.sizeMin + (lg.sizeMax-lg.sizeMin)*t);
      }
    } else if(i===0){
      x=cx; y=cy; size=lg.rank1Size;
    } else {
      const angle=i*0.8+Math.PI/4;
      const radius=lg.rank1Size*0.7 + i*spiralGap;
      x=cx+Math.cos(angle)*radius;
      y=cy+Math.sin(angle)*radius;
      const t=Math.max(0, 1 - (i-1)/(lg.count-1));
      size=Math.round(lg.sizeMin + (lg.sizeMax-lg.sizeMin)*t);
    }
    const brightness=Math.max(.25, 1-i/(lg.count*1.2));
    const col=club.color, colRgb=club.colorRgb;
    const ringOutRgb=colRgb; // 바깥 링도 팬클럽 고유색 (밝게)

    const node=document.createElement('div');
    node.className=`fc-node${i===0?' rank1':''}${club.isMine?' mine':''}`;
    node.style.left=x+'px'; node.style.top=y+'px';
    node.onclick=()=>{ location.href=`/fandom.html?name=${encodeURIComponent(club.name)}&league=${lg.id}&rank=${club.rank}`; };
    node.oncontextmenu=(e)=>{ e.preventDefault(); showDetail(club); };

    // 이중 링: 안쪽(팬클럽색) + 바깥쪽(팬클럽색 밝게)
    const innerBorder=`3px solid ${col}`;
    const outerRing=`0 0 0 ${Math.max(3,size*0.03)}px rgba(${ringOutRgb},.3)`;
    const glowShadow=`0 0 ${size*0.25}px rgba(${colRgb},${brightness*0.15})`;
    const nameSize=Math.max(8, Math.min(24, size*0.12));
    const iconSize=Math.max(14, size*0.22);
    const champion=i===0?`<div style="font-size:${Math.max(12,size*.08)}px;margin-bottom:2px">👑</div><div style="font-family:'Orbitron',monospace;font-size:${Math.max(7,size*.04)}px;color:${col};letter-spacing:1px;margin-bottom:4px">CHAMPION</div>`:'';

    node.innerHTML=`
      <div class="fc-circle" style="width:${size}px;height:${size}px;border:${innerBorder};box-shadow:${outerRing},${glowShadow};background:radial-gradient(circle at 40% 35%,rgba(${colRgb},${brightness*.2}),rgba(${colRgb},${brightness*.06}) 50%,rgba(0,0,0,.6));display:flex;flex-direction:column;align-items:center;justify-content:center">
        ${champion}
        <div style="font-size:${iconSize}px">${club.icon}</div>
        <div style="font-family:'Orbitron',monospace;font-size:${nameSize}px;font-weight:900;color:${col};margin-top:4px;text-shadow:0 0 8px rgba(${colRgb},.5);max-width:${size*0.8}px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${club.name}</div>
      </div>
      <div class="fc-rank" style="color:${col};font-size:${Math.max(9,size*.06)}px">#${club.rank}</div>`;
    w.appendChild(node);

    // 각 팬클럽 주변 작은 별 파티클 (팬클럽 고유색)
    const orbitCount=i===0?(lg.id==='quasar'?24:lg.id==='nova'?16:8):Math.max(3,Math.floor(size/20));
    for(let p=0;p<orbitCount;p++){
      const el=document.createElement('div');
      el.className='glow-particle';
      const a=(p/orbitCount)*Math.PI*2+Math.random()*.3;
      const d=(size*0.5)+Math.random()*(i===0?size*0.5:size*0.35);
      const pSize=i===0?(lg.id==='quasar'?6+Math.random()*8:lg.id==='nova'?5+Math.random()*6:3+Math.random()*4):2+Math.random()*2;
      el.style.cssText=`width:${pSize}px;height:${pSize}px;left:${x}px;top:${y}px;background:${col};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;animation-delay:${p*.2+Math.random()*.5}s;animation-duration:${2+Math.random()*2}s`;
      w.appendChild(el);
    }
  });
}

// ══════════════════════════════════════════
//  승격/강등 비교 바
// ══════════════════════════════════════════
function updateBars(){
  const clubs=leagueData[currentLeague];
  const li=LEAGUES.findIndex(l=>l.id===currentLeague);
  const first=clubs[0], last=clubs[clubs.length-1];

  if(li<LEAGUES.length-1){
    const upper=leagueData[LEAGUES[li+1].id];
    const upperLast=upper[upper.length-1];
    const r=Math.min(100,Math.floor(first.score/upperLast.score*100));
    document.getElementById('promFill').style.width=r+'%';
    document.getElementById('promFill').className='cb-fill '+(r>80?'safe':'warn');
    document.getElementById('promScore').innerHTML=`<span class="hi">${first.score.toLocaleString()}</span> / <span class="lo">${upperLast.score.toLocaleString()}</span>`;
  } else {
    document.getElementById('promScore').innerHTML='<span class="hi">MAX LEAGUE</span>';
    document.getElementById('promFill').style.width='100%';
  }
  if(li>0){
    const lower=leagueData[LEAGUES[li-1].id];
    const lowerFirst=lower[0];
    const r=Math.min(100,Math.floor(lowerFirst.score/last.score*100));
    document.getElementById('relFill').style.width=r+'%';
    document.getElementById('relFill').className='cb-fill '+(r>70?'warn':'safe');
    document.getElementById('relScore').innerHTML=`<span class="lo">${last.score.toLocaleString()}</span> / <span class="hi">${lowerFirst.score.toLocaleString()}</span>`;
  } else {
    document.getElementById('relScore').innerHTML='<span class="lo">LOWEST LEAGUE</span>';
    document.getElementById('relFill').style.width='0%';
  }
}

// ══════════════════════════════════════════
//  맵 드래그/줌
// ══════════════════════════════════════════
const vp=document.getElementById('mapViewport');
const mw=document.getElementById('mapWorld');
function updateTx(){mw.style.transform=`translate(${mapX}px,${mapY}px) scale(${mapScale})`}

vp.addEventListener('mousedown',e=>{dragging=true;dragStart={x:e.clientX,y:e.clientY};dragMapStart={x:mapX,y:mapY}});
window.addEventListener('mousemove',e=>{if(!dragging)return;mapX=dragMapStart.x+(e.clientX-dragStart.x);mapY=dragMapStart.y+(e.clientY-dragStart.y);updateTx()});
window.addEventListener('mouseup',()=>{dragging=false});
vp.addEventListener('wheel',e=>{e.preventDefault();mapScale=Math.max(.3,Math.min(3,mapScale*(e.deltaY>0?.92:1.08)));updateTx()},{passive:false});

let pinchDist=null;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};dragMapStart={x:mapX,y:mapY}}
  else if(e.touches.length===2){dragging=false;pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
},{passive:true});
vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){const t=e.touches[0];mapX=dragMapStart.x+(t.clientX-dragStart.x);mapY=dragMapStart.y+(t.clientY-dragStart.y);updateTx()}
  else if(e.touches.length===2&&pinchDist!==null){const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);mapScale=Math.max(.3,Math.min(3,mapScale*nd/pinchDist));pinchDist=nd;updateTx()}
},{passive:false});
vp.addEventListener('touchend',()=>{dragging=false;pinchDist=null});

function zoomMap(f){mapScale=Math.max(.3,Math.min(3,mapScale*f));updateTx()}
function resetZoom(){mapScale=1;goToMine()}

// ══════════════════════════════════════════
//  내 팬클럽 바로가기
// ══════════════════════════════════════════
function goToMine(){
  const lg=LEAGUES.find(l=>l.id===currentLeague);
  const clubs=leagueData[currentLeague];
  const mine=clubs.find(c=>c.isMine);
  if(!mine){mapX=vp.clientWidth/2-1500*mapScale;mapY=vp.clientHeight/2-1500*mapScale;updateTx();return}
  const i=mine.rank-1;
  let tx=1500,ty=1500;
  if(lg.id==='quasar'){
    const qGap=800;
    const qPos=[[1500,1500],[1500,1500-qGap],[1500+qGap,1500],[1500,1500+qGap],[1500-qGap,1500]];
    if(i<qPos.length){tx=qPos[i][0];ty=qPos[i][1]}
  } else if(i>0){
    const spiralGap=Math.max(20, 50-lg.count*0.5);
    const a=i*.8+Math.PI/4,r=lg.rank1Size*0.7+i*spiralGap;
    tx=1500+Math.cos(a)*r;ty=1500+Math.sin(a)*r;
  }
  mapX=vp.clientWidth/2-tx*mapScale;
  mapY=vp.clientHeight/2-ty*mapScale;
  updateTx();
  showToast(`📍 ${MY_FC} — #${mine.rank}`);
}

// ══════════════════════════════════════════
//  상세 모달
// ══════════════════════════════════════════
function showDetail(c){
  document.getElementById('dcIcon').textContent=c.icon;
  document.getElementById('dcName').textContent=c.name;
  document.getElementById('dcRank').textContent=`#${c.rank} — ${LEAGUES.find(l=>l.id===currentLeague).name} 리그`;
  document.getElementById('dcStats').innerHTML=`
    <div class="dc-stat"><div class="dc-stat-val">${c.score.toLocaleString()}</div><div class="dc-stat-label">점수 — Score</div></div>
    <div class="dc-stat"><div class="dc-stat-val">${c.members.toLocaleString()}</div><div class="dc-stat-label">멤버 — Members</div></div>
    <div class="dc-stat"><div class="dc-stat-val">#${c.rank}</div><div class="dc-stat-label">순위 — Rank</div></div>`;
  const ch=c.change;
  document.getElementById('dcChange').innerHTML=(ch>0?`<span class="up">▲ ${ch}칸 상승 — Up ${ch}</span>`:ch<0?`<span class="down">▼ ${Math.abs(ch)}칸 하락 — Down ${Math.abs(ch)}</span>`:'— 변동 없음 — No change')
    +`<div style="margin-top:12px"><button onclick="location.href='/fandom.html?name=${encodeURIComponent(c.name)}&league=${currentLeague}&rank=${c.rank}'" style="padding:10px 20px;border-radius:16px;border:1px solid var(--gold);background:rgba(240,192,64,.1);color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif">🏘️ 팬덤 마을 방문 — Visit Village</button></div>`;
  document.getElementById('detailOv').classList.add('show');
}
function closeDetail(){document.getElementById('detailOv').classList.remove('show')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
generateData(); renderNav(); renderMap(); updateBars();
setTimeout(()=>goToMine(),200);
</script>
