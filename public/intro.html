<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTERIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;width:100vw;height:100vh}
        canvas{display:block;position:fixed;top:0;left:0}
        #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50}
        #ui{position:fixed;inset:0;z-index:30;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .msg-wrap{position:absolute;top:20%;text-align:center;opacity:0;transition:opacity 1.5s ease}
        .msg{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:clamp(36px,5.5vw,56px);line-height:1.5;
            background:linear-gradient(90deg,#f0c040,#fbbf24,#c084fc,#a78bfa,#f0c040);
            background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
            animation:gflow 4s linear infinite;position:relative}
        .msg::after{content:'';position:absolute;inset:0;
            background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.55) 44%,rgba(255,255,255,.75) 50%,rgba(255,255,255,.55) 56%,transparent 65%);
            background-size:250% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
            animation:shim 3.2s ease-in-out infinite}
        .msg-en{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(18px,2.5vw,26px);
            color:#f0c040;letter-spacing:5px;margin-top:14px;text-shadow:0 0 20px rgba(240,192,64,.3)}
        @keyframes gflow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
        @keyframes shim{0%,100%{background-position:200% 50%}50%{background-position:-60% 50%}}
        .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:11px;opacity:0;transition:opacity 1s ease}
        .hw{position:relative;width:66px;height:66px;display:flex;align-items:center;justify-content:center}
        .rp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(240,192,64,.7);animation:rpo 2.6s ease-out infinite}
        .rp:nth-child(2){animation-delay:.85s}.rp:nth-child(3){animation-delay:1.7s}
        @keyframes rpo{0%{width:28px;height:28px;opacity:.7}100%{width:120px;height:120px;opacity:0}}
        .ht{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:5px;text-indent:5px;color:rgba(255,255,255,.7);text-transform:uppercase}
        .logo-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity 2s ease}
        .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(34px,7.5vw,82px);color:#f0c040;letter-spacing:6px;
            text-shadow:0 0 30px rgba(240,192,64,.5),0 0 60px rgba(240,192,64,.2),0 0 100px rgba(192,132,252,.12)}
        .tag{font-family:'Orbitron',sans-serif;font-weight:400;font-size:clamp(10px,1.3vw,14px);color:#e8e4f0;letter-spacing:3px;margin-top:14px;text-shadow:0 0 10px rgba(232,228,240,.2)}
        .fin{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:clamp(14px,1.8vw,20px);color:#f0c040;letter-spacing:2px;margin-top:22px;text-shadow:0 0 15px rgba(240,192,64,.3)}
        .serial{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(14px,1.6vw,18px);color:#f0c040;letter-spacing:2px;margin-top:28px;
            text-shadow:0 0 12px rgba(240,192,64,.4);opacity:0;animation:serialIn 1.5s ease 0.5s forwards}
        .serial-label{font-family:'Noto Sans KR',sans-serif;font-weight:400;font-size:clamp(10px,1.1vw,12px);color:#c084fc;letter-spacing:1px;margin-top:6px}
        .remember{font-family:'Noto Sans KR',sans-serif;font-weight:400;font-size:clamp(13px,1.5vw,18px);color:#e8e4f0;letter-spacing:1px;margin-top:22px;line-height:1.7;opacity:0;animation:serialIn 1.5s ease 1s forwards}
        .remember-en{font-family:'Orbitron',sans-serif;font-weight:400;font-size:clamp(8px,1vw,11px);color:rgba(232,228,240,.5);letter-spacing:2px;margin-top:4px}
        .enter-btn{display:inline-block;margin-top:28px;padding:12px 36px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(11px,1.2vw,14px);
            color:#f0c040;letter-spacing:3px;text-transform:uppercase;text-decoration:none;
            border:2px solid #f0c040;border-radius:4px;background:transparent;cursor:pointer;pointer-events:auto;
            transition:all .3s ease;opacity:0;animation:serialIn 1.5s ease 1.5s forwards}
        .enter-btn:hover{background:#f0c040;color:#000;box-shadow:0 0 25px rgba(240,192,64,.4)}
        @keyframes serialIn{to{opacity:1}}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="ui">
    <div class="msg-wrap" id="mw">
        <div class="msg">당신의 별이 되어주세요</div>
        <div class="msg-en">Be your star</div>
    </div>
    <div class="hint" id="hint">
        <div class="hw">
            <div class="rp"></div><div class="rp"></div><div class="rp"></div>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                <path d="M12 2a1 1 0 011 1v8.59l2.3-2.3a1 1 0 111.4 1.42l-4 4a1 1 0 01-1.4 0l-4-4a1 1 0 111.4-1.42L11 11.59V3a1 1 0 011-1z" fill="rgba(255,255,255,.8)"/>
                <path d="M8 14a4 4 0 008 0h2a6 6 0 01-12 0h2z" fill="rgba(255,255,255,.55)"/>
                <circle cx="12" cy="22" r="1" fill="rgba(255,255,255,.4)"/>
            </svg>
        </div>
        <div class="ht">touch</div>
    </div>
    <div class="logo-area" id="la">
        <div class="logo">ASTER1A</div>
        <div class="tag">Every star begins with a single fan</div>
        <div class="fin">별의 제국에 오신 것을 환영합니다</div>
        <div class="serial">#00,000,001</div>
        <div class="serial-label">성궤 번호 — Orbit Serial</div>
        <div class="remember">이 번호를 기억하세요. 당신만의 우주가 시작됩니다</div>
        <div class="remember-en">Remember this number. Your universe begins now.</div>
        <a class="enter-btn" id="enterBtn" href="index.html">제국에 입장하기 — Enter the Empire</a>
    </div>
</div>

<script>
(()=>{
// ===== SETUP =====
const cv=document.getElementById('c'),X=cv.getContext('2d');
const fl=document.getElementById('flash'),mw=document.getElementById('mw');
const hintEl=document.getElementById('hint'),la=document.getElementById('la');
let W,H,DPR;

// Offscreen canvases for static layers
let nebulaCv,nebulaX,staticCv,staticX;

function resize(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=innerWidth;H=innerHeight;
    cv.width=W*DPR;cv.height=H*DPR;
    X.setTransform(DPR,0,0,DPR,0,0);
    buildNebula();
    // don't rebuild static stars on resize — positions are scaled
}
function buildNebula(){
    // offscreen nebula gas layer
    nebulaCv=document.createElement('canvas');
    nebulaCv.width=W;nebulaCv.height=H;
    nebulaX=nebulaCv.getContext('2d');

    // paint diagonal milky way gas
    const cx=W/2,cy=H/2;
    // angle ~-35deg diagonal
    const ang=-35*Math.PI/180;
    const cos=Math.cos(ang),sin=Math.sin(ang);
    const len=Math.max(W,H)*1.2;

    // multiple elliptical gradients for gas
    const layers=[
        {dx:0,dy:0,rx:len*0.55,ry:H*0.28,c:'rgba(90,60,160,',a:[0.025,0.012,0]},
        {dx:len*0.1,dy:H*0.02,rx:len*0.45,ry:H*0.2,c:'rgba(60,80,180,',a:[0.02,0.008,0]},
        {dx:-len*0.08,dy:-H*0.03,rx:len*0.5,ry:H*0.15,c:'rgba(120,80,200,',a:[0.015,0.006,0]},
    ];
    nebulaX.save();
    nebulaX.translate(cx,cy);
    nebulaX.rotate(ang);
    for(const l of layers){
        const g=nebulaX.createRadialGradient(l.dx,l.dy,0,l.dx,l.dy,l.rx);
        g.addColorStop(0,l.c+l.a[0]+')');
        g.addColorStop(0.5,l.c+l.a[1]+')');
        g.addColorStop(1,l.c+l.a[2]+')');
        nebulaX.fillStyle=g;
        nebulaX.beginPath();
        nebulaX.ellipse(l.dx,l.dy,l.rx,l.ry,0,0,Math.PI*2);
        nebulaX.fill();
    }
    nebulaX.restore();
}

resize();
addEventListener('resize',()=>{
    const ow=W,oh=H;resize();
    const sx=W/ow,sy=H/oh;
    for(const s of stars){s.x*=sx;s.y*=sy;s.hx*=sx;s.hy*=sy;}
    staticDirty=true;
});

// ===== 8000 STARS =====
const N=8000;
const stars=new Array(N);

// Band: diagonal from bottom-left to top-right, covering ~60% of screen
// signed distance to band center line
const bandAng=-35*Math.PI/180;
const bandNx=Math.sin(bandAng),bandNy=-Math.cos(bandAng);
const bandWidth=Math.max(W,H)*0.30; // half-width

function bandSignedDist(x,y){
    return (x-W/2)*bandNx+(y-H/2)*bandNy;
}

for(let i=0;i<N;i++){
    // 70% in band (with density falloff from center), 30% scattered
    const inBand=Math.random()<0.70;
    let x,y;
    if(inBand){
        // gaussian along band axis
        const along=(Math.random()-0.5)*Math.max(W,H)*1.3;
        // gaussian perpendicular (narrower = denser center)
        const perp=(Math.random()+Math.random()+Math.random()-1.5)/1.5*bandWidth;
        const ca=Math.cos(bandAng),sa=Math.sin(bandAng);
        x=W/2+along*ca-perp*(-sa);
        y=H/2+along*sa-perp*(ca);
        // S-curve wobble
        const t=along/(Math.max(W,H)*1.3)+0.5;
        const wobble=Math.sin(t*Math.PI*3)*H*0.03;
        x+=wobble*(-sa);
        y+=wobble*(ca);
    } else {
        x=Math.random()*W;
        y=Math.random()*H;
    }

    // clamp to visible area with margin
    x=Math.max(-50,Math.min(W+50,x));
    y=Math.max(-50,Math.min(H+50,y));

    // size: realistic, mostly tiny
    const sz=Math.random();
    const r=sz<0.55?Math.random()*0.3+0.2
            :sz<0.82?Math.random()*0.4+0.5
            :sz<0.94?Math.random()*0.5+0.9
            :Math.random()*0.6+1.4;

    // color: real star distribution
    const c=Math.random();
    let cr,cg,cb;
    if(c<0.50){cr=225+Math.random()*30;cg=230+Math.random()*25;cb=242+Math.random()*13;} // white blue-white
    else if(c<0.70){cr=240+Math.random()*15;cg=232+Math.random()*15;cb=215+Math.random()*15;} // warm white
    else if(c<0.84){cr=185+Math.random()*25;cg=205+Math.random()*25;cb=248+Math.random()*7;} // pale blue
    else if(c<0.93){cr=248+Math.random()*7;cg=222+Math.random()*18;cb=165+Math.random()*35;} // yellow
    else{cr=145+Math.random()*35;cg=165+Math.random()*35;cb=242+Math.random()*13;} // blue

    const bd=Math.abs(bandSignedDist(x,y));
    const bandBoost=bd<bandWidth?0.12*(1-bd/bandWidth):0;
    const ba=Math.min(0.65,Math.random()*0.25+0.05+bandBoost);

    stars[i]={
        x,y,hx:x,hy:y,r,
        cr:Math.min(255,cr|0),cg:Math.min(255,cg|0),cb:Math.min(255,cb|0),
        ocr:Math.min(255,cr|0),ocg:Math.min(255,cg|0),ocb:Math.min(255,cb|0),
        ba,vx:0,vy:0,
        tw:Math.random()*1.2+0.15, // twinkle speed
        to:Math.random()*6.28, // twinkle offset
        dr:Math.random()*6.28, // drift phase
        ds:Math.random()*0.0008+0.0002,
        gold:0,
        od:Math.random()>0.5?1:-1, // orbit dir
        os:Math.random()*0.5+0.7
    };
}

// Pre-render static star layer (no twinkle, just positions)
let staticDirty=true;
function renderStatic(alpha){
    staticCv=document.createElement('canvas');
    staticCv.width=W*DPR;staticCv.height=H*DPR;
    staticX=staticCv.getContext('2d');
    staticX.setTransform(DPR,0,0,DPR,0,0);
    for(const s of stars){
        const a=s.ba*0.5*alpha; // base layer, half brightness
        if(a<0.003)continue;
        staticX.beginPath();
        staticX.arc(s.x,s.y,s.r,0,6.28);
        staticX.fillStyle=`rgba(${s.cr},${s.cg},${s.cb},${a})`;
        staticX.fill();
    }
    staticDirty=false;
}

// ===== SPARKS =====
const sparks=[];

// ===== STATE =====
let phase='fadein',phaseT=0,time=0,lastNow=performance.now();
let clickX=W/2,clickY=H/2;
let shakeX=0,shakeY=0;
let starVis=0; // 0→1

const FADE_DUR=2.2,FLOW_DUR=3.0;

function easeIC(t){return t*t*t;}
function easeOC(t){return 1-(1-t)*(1-t)*(1-t);}

// ===== INTERACTION =====
function onClick(){
    if(phase!=='ready')return;
    clickX=W/2;clickY=H/2;phase='flow';phaseT=0;
    hintEl.style.opacity='0';
    mw.style.transition='opacity 0.7s';mw.style.opacity='0';
}
cv.addEventListener('click',()=>onClick());
cv.addEventListener('touchstart',e=>{e.preventDefault();onClick();},{passive:false});

// ===== PHYSICS =====
function update(dt){
    const d6=dt*60;
    if(phase==='flow'){
        const rp=Math.min(1,phaseT/FLOW_DUR);
        const p=easeIC(rp);
        for(let i=0;i<N;i++){
            const s=stars[i];
            const dx=clickX-s.x,dy=clickY-s.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<0.3)continue;
            const nx=dx/dist,ny=dy/dist;
            const pull=(0.035+p*1.6)*d6;
            s.vx+=nx*pull;s.vy+=ny*pull;
            const sw=(0.055-rp*0.045)*s.od*s.os*d6;
            s.vx+=(-ny)*sw;s.vy+=(nx)*sw;
            s.gold=Math.min(1,s.gold+rp*rp*0.035*d6);
        }
        const damp=0.93-p*0.08;
        for(let i=0;i<N;i++){stars[i].vx*=damp;stars[i].vy*=damp;}
        shakeX=(Math.random()-.5)*p*9;shakeY=(Math.random()-.5)*p*9;
    }else if(phase==='quasar'||phase==='done'){
        for(let i=0;i<N;i++){
            const s=stars[i];
            const dx=s.hx-s.x,dy=s.hy-s.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist>0.5){s.vx+=(dx/dist)*0.016*d6;s.vy+=(dy/dist)*0.016*d6;}
            s.gold*=Math.pow(0.987,d6);
            s.cr+=(s.ocr-s.cr)*0.007*d6;
            s.cg+=(s.ocg-s.cg)*0.007*d6;
            s.cb+=(s.ocb-s.cb)*0.007*d6;
            s.vx*=0.97;s.vy*=0.97;
        }
        shakeX*=0.88;shakeY*=0.88;
    }else{
        for(let i=0;i<N;i++){
            const s=stars[i];
            s.dr+=s.ds;
            s.vx+=Math.sin(s.dr)*0.0004*d6;
            s.vy+=Math.cos(s.dr*0.7)*0.0003*d6;
            s.vx*=0.993;s.vy*=0.993;
        }
    }
    for(let i=0;i<N;i++){
        const s=stars[i];
        const sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy);
        if(sp>22){const f=22/sp;s.vx*=f;s.vy*=f;}
        s.x+=s.vx;s.y+=s.vy;
    }
}

// ===== QUASAR =====
function quasar(){
    phase='quasar';phaseT=0;
    fl.style.transition='none';fl.style.opacity='1';
    setTimeout(()=>{fl.style.transition='opacity 1.4s ease-out';fl.style.opacity='0';},50);
    for(let i=0;i<N;i++){
        const s=stars[i];
        const dx=s.x-clickX,dy=s.y-clickY;
        let d=Math.sqrt(dx*dx+dy*dy);if(d<2)d=2;
        const f=15+Math.random()*11;
        s.vx=(dx/d)*f;s.vy=(dy/d)*f;s.gold=1;
    }
    const cols=[{h:45,s:90},{h:50,s:85},{h:38,s:95},{h:270,s:68},{h:280,s:55},{h:0,s:0},{h:320,s:58}];
    for(let i=0;i<200;i++){
        const a=Math.random()*6.28,sp=Math.random()*14+3;
        const c=cols[Math.random()*cols.length|0];
        sparks.push({x:clickX,y:clickY,vx:Math.cos(a)*sp*(.4+Math.random()*.6),vy:Math.sin(a)*sp*(.4+Math.random()*.6),
            r:Math.random()*3.5+1,life:1,decay:Math.random()*.006+.003,hue:c.h,sat:c.s});
    }
    setTimeout(()=>{la.style.opacity='1';},700);
    setTimeout(()=>{phase='done';},3500);

}

// ===== DRAW =====
function drawBg(){
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    // nebula gas (only when stars visible and not exploding)
    if(starVis>0.05&&phase!=='quasar'){
        X.globalAlpha=starVis*(phase==='flow'?1-easeIC(Math.min(1,phaseT/FLOW_DUR)):1);
        X.drawImage(nebulaCv,0,0,W,H);
        X.globalAlpha=1;
    }
}

function drawStars(){
    if(starVis<0.001)return;
    const sx=shakeX,sy=shakeY;
    const isIdle=phase==='fadein'||phase==='ready';

    // In idle/fadein: draw static base + twinkle overlay (perf optimization)
    // In flow/quasar/done: draw all dynamically (positions change)
    if(isIdle&&!staticDirty&&staticCv){
        // draw pre-rendered static layer
        X.globalAlpha=starVis;
        X.drawImage(staticCv,0,0,W,H);
        X.globalAlpha=1;
    }

    // dynamic layer: twinkle variation + gold overlay + moving stars
    for(let i=0;i<N;i++){
        const s=stars[i];
        const gm=s.gold;
        const cr=s.cr*(1-gm)+240*gm|0;
        const cg=s.cg*(1-gm)+192*gm|0;
        const cb=s.cb*(1-gm)+64*gm|0;
        const tw=Math.sin(time*s.tw+s.to)*.5+.5;

        let a;
        if(isIdle){
            // only draw the twinkle delta (the bright pulse) on top of static
            a=s.ba*tw*0.5*starVis; // twinkle-only portion
            if(a<0.008)continue;
        }else{
            a=s.ba*(0.35+tw*0.65)*starVis;
            if(a<0.005)continue;
        }

        const px=s.x+sx,py=s.y+sy;
        X.beginPath();X.arc(px,py,s.r,0,6.28);
        X.fillStyle=`rgba(${cr},${cg},${cb},${a})`;X.fill();

        // glow
        if((s.r>1.1||gm>0.25)&&a>0.04){
            const gr=s.r*(2+gm*2.5);
            const gg=X.createRadialGradient(px,py,0,px,py,gr);
            gg.addColorStop(0,`rgba(${cr},${cg},${cb},${a*.3})`);
            gg.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
            X.beginPath();X.arc(px,py,gr,0,6.28);
            X.fillStyle=gg;X.fill();
        }
    }
}

function drawFlowGlow(){
    if(phase!=='flow')return;
    const p=easeIC(Math.min(1,phaseT/FLOW_DUR));
    const r=Math.max(15,200*(1-p));
    const g=X.createRadialGradient(clickX+shakeX,clickY+shakeY,0,clickX+shakeX,clickY+shakeY,r);
    g.addColorStop(0,`rgba(255,235,150,${p*.75})`);
    g.addColorStop(0.2,`rgba(240,192,64,${p*.4})`);
    g.addColorStop(0.5,`rgba(192,132,252,${p*.12})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=g;X.fillRect(0,0,W,H);
}

function drawSparks(){
    for(let i=sparks.length-1;i>=0;i--){
        const s=sparks[i];
        s.x+=s.vx;s.y+=s.vy;s.vx*=.977;s.vy*=.977;s.vy+=.015;
        s.life-=s.decay;
        if(s.life<=0){sparks.splice(i,1);continue;}
        const a=s.life;
        X.beginPath();X.arc(s.x,s.y,s.r*s.life,0,6.28);
        X.fillStyle=`hsla(${s.hue},${s.sat}%,${55+s.life*25}%,${a})`;X.fill();
        if(s.r>1.2){
            const g=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5*s.life);
            g.addColorStop(0,`hsla(${s.hue},${s.sat}%,65%,${a*.3})`);
            g.addColorStop(1,`hsla(${s.hue},${s.sat}%,50%,0)`);
            X.beginPath();X.arc(s.x,s.y,s.r*5*s.life,0,6.28);
            X.fillStyle=g;X.fill();
        }
    }
}

function drawVignette(){
    const g=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.18,W/2,H/2,Math.max(W,H)*.72);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');
    X.fillStyle=g;X.fillRect(0,0,W,H);
}

// ===== LOOP =====
function frame(now){
    const dt=Math.min((now-lastNow)/1000,.05);
    lastNow=now;time+=dt;phaseT+=dt;

    if(phase==='fadein'){
        starVis=easeOC(Math.min(1,phaseT/FADE_DUR));
        if(starVis>.15&&staticDirty)renderStatic(1);
        if(phaseT>1)mw.style.opacity='1';
        if(phaseT>=FADE_DUR){phase='ready';phaseT=0;hintEl.style.opacity='1';}
    }else if(phase==='ready'){
        starVis=1;
        if(staticDirty)renderStatic(1);
    }else if(phase==='flow'){
        starVis=1;
        if(phaseT>=FLOW_DUR)quasar();
    }else{
        starVis=1;
    }

    update(dt);
    drawBg();
    drawStars();
    drawFlowGlow();
    drawSparks();
    drawVignette();
    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
