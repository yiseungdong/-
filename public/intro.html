<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTERIA — 은하에 오신 것을 환영합니다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#030308;--gold:#f0c040;--accent:#4a90d9;
  --text:#e8ecf4;--muted:rgba(160,180,210,0.5);
}
html,body{width:100%;height:100%;background:var(--void);overflow:hidden;font-family:'Noto Sans KR',sans-serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* 플래시 효과 */
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:5;transition:opacity 0.15s}

/* 상단 영역: 로고 + 태그라인 (화면 상단 25%) */
#logoContainer{
  position:fixed;top:20%;left:0;width:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;opacity:0;transition:opacity 1.2s ease;
}
.logo{
  font-family:'Orbitron',monospace;font-size:clamp(36px,8vw,72px);font-weight:900;
  letter-spacing:8px;color:var(--gold);
  text-shadow:0 0 40px rgba(240,192,64,0.5),0 0 80px rgba(240,192,64,0.2);
}
.tagline{
  font-size:clamp(13px,2.2vw,17px);color:#e8e4f0;opacity:0.8;
  margin-top:16px;text-align:center;padding:0 20px;font-weight:300;letter-spacing:1px;
}
.tagline-en{font-family:'Orbitron',monospace;font-size:clamp(11px,1.6vw,14px);margin-top:8px;letter-spacing:2px;opacity:0.6}

/* 중앙 영역: 성궤번호 (화면 정중앙) */
#orbitContainer{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  pointer-events:none;opacity:0;transition:opacity 1s ease;
}
.orbit-label{font-size:clamp(13px,2vw,16px);color:var(--gold);opacity:0.85;letter-spacing:0.5px}
.orbit-number{
  font-family:'Orbitron',monospace;font-size:clamp(28px,5vw,36px);font-weight:900;
  color:var(--gold);letter-spacing:5px;
  text-shadow:0 0 30px rgba(240,192,64,0.5),0 0 60px rgba(240,192,64,0.2);
}
.orbit-remember{font-size:clamp(11px,1.5vw,13px);color:var(--gold);opacity:0.6;letter-spacing:0.5px}

/* 하단 영역: 입장 버튼 (화면 하단 10%) */
#entryContainer{
  position:fixed;bottom:10%;left:0;width:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  opacity:0;transition:opacity 1s ease;
}
.enter-btn{
  padding:15px 44px;border:2px solid #c084fc;border-radius:30px;
  background:rgba(192,132,252,0.15);color:#c084fc;font-family:'Orbitron',monospace;
  font-size:clamp(13px,1.8vw,16px);font-weight:700;letter-spacing:2px;
  cursor:pointer;pointer-events:auto;transition:all 0.3s;
  text-shadow:0 0 10px rgba(192,132,252,0.3);
}
.enter-btn:hover{
  background:#c084fc;color:var(--void);
  box-shadow:0 0 30px rgba(192,132,252,0.5);transform:scale(1.05);
}
.tap-hint{
  font-size:13px;color:#c084fc;opacity:0.5;letter-spacing:1px;
  animation:blink 1.8s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}

/* 스킵 버튼 */
.skip-btn{
  position:fixed;bottom:24px;right:28px;z-index:20;
  background:none;border:none;color:var(--muted);
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  cursor:pointer;pointer-events:auto;transition:color 0.2s;letter-spacing:1px;
}
.skip-btn:hover{color:#fff}

@media(max-width:768px){
  #logoContainer{top:15%}
  .logo{letter-spacing:4px}
  #entryContainer{bottom:8%}
  .enter-btn{padding:13px 32px}
  .skip-btn{bottom:16px;right:16px}
}
</style>
</head>
<body>

<!-- 별 캔버스 -->
<canvas id="starCanvas"></canvas>

<!-- 플래시 효과 -->
<div id="flash"></div>

<!-- 상단: 로고 + 태그라인 -->
<div id="logoContainer">
  <h1 class="logo">ASTERIA</h1>
  <p class="tagline">먼지에서 은하로, 팬이 주권을 갖는 우주</p>
  <p class="tagline tagline-en">From Dust to Galaxy — Where Fans Own the Universe</p>
</div>

<!-- 중앙: 성궤번호 -->
<div id="orbitContainer">
  <p class="orbit-label">아스테리아가 당신에게 부여한 유일한 별</p>
  <p class="orbit-number">#00,000,001</p>
  <p class="orbit-remember">이 번호를 기억하세요 / Remember your number</p>
</div>

<!-- 하단: 입장 버튼 -->
<div id="entryContainer">
  <button class="enter-btn" onclick="goToMain()">은하에 입장하기 / Enter the Galaxy</button>
  <p class="tap-hint" id="tapHint">화면을 터치하세요 / Tap to Enter</p>
</div>

<!-- 스킵 버튼 -->
<button class="skip-btn" onclick="goToMain()">건너뛰기 / Skip ▶</button>

<script>
// ══════════════════════════════════════════════
//  아스테리아 인트로 — Canvas 별 시스템
// ══════════════════════════════════════════════

const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');

// 캔버스 크기 설정
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 메인 페이지 이동
function goToMain() { location.href = 'index.html'; }

// ── 별 색상 풀 ──
const starColors = [
  '#ffffff','#ffffff','#ffffff','#ffffff','#ffffff', // 흰색 다수
  '#ffffff','#ffffff','#ffffff',
  '#aac8ff','#8bb4ff',   // 파랑
  '#c8a0ff','#b088ee',   // 보라
  '#f0c040','#ffd866'    // 금색
];

function getRandomStarColor() {
  return starColors[Math.floor(Math.random() * starColors.length)];
}

// ── 별 클래스 ──
const STAR_COUNT = 280;
const stars = [];

class Star {
  constructor() {
    this.originX = Math.random() * canvas.width;
    this.originY = Math.random() * canvas.height;
    this.x = this.originX;
    this.y = this.originY;
    this.size = Math.random() * 1.5 + 0.5;
    this.isCross = Math.random() < 0.05; // 5%는 십자가 큰 별
    if (this.isCross) this.size = Math.random() * 1.5 + 2.5;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
    this.opacity = 0; // 탄생 단계에서 서서히 나타남
    this.maxOpacity = Math.random() * 0.5 + 0.5;
    this.color = getRandomStarColor();
    this.birthDelay = Math.random() * 3000; // 0~3초 사이 랜덤 등장
    // gather 단계에서 원형 배치 목표 (중앙 기준 반지름 80px 원 위)
    const gatherAngle = Math.random() * Math.PI * 2;
    this.gatherX = 0; // animate에서 cx + cos * 80 계산
    this.gatherY = 0;
    this.born = false;
  }
}

for (let i = 0; i < STAR_COUNT; i++) stars.push(new Star());

// ── 유성 시스템 ──
const meteors = [];

class Meteor {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width * 1.2;
    this.y = -20;
    this.speed = Math.random() * 6 + 4;
    this.angle = Math.PI / 4 + Math.random() * 0.3; // 대각선
    this.length = Math.random() * 80 + 60;
    this.opacity = 1;
    this.alive = true;
  }
  update() {
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.opacity -= 0.008;
    if (this.opacity <= 0 || this.y > canvas.height + 50) this.alive = false;
  }
  draw() {
    const tailX = this.x - Math.cos(this.angle) * this.length;
    const tailY = this.y - Math.sin(this.angle) * this.length;
    const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
    grad.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tailX, tailY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// 초기 유성 3개
for (let i = 0; i < 3; i++) {
  const m = new Meteor();
  m.x = Math.random() * canvas.width * 0.6;
  m.y = Math.random() * canvas.height * 0.3;
  meteors.push(m);
}

// ── 애니메이션 단계 ──
let phase = 'birth';
let startTime = performance.now();
let elapsed = 0;
let centerGlow = 0;

// 방문 횟수 체크 (버전 분기)
const visitCount = parseInt(localStorage.getItem('asteria_visit_count') || '0');
localStorage.setItem('asteria_visit_count', String(visitCount + 1));
const isFirstVisit = visitCount === 0;

// 재방문: 짧은 버전 (로고+버튼 즉시 표시, 클릭으로만 이동)
if (!isFirstVisit) {
  phase = 'idle';
  stars.forEach(s => { s.born = true; s.opacity = s.maxOpacity; });
  document.getElementById('logoContainer').style.opacity = '1';
  document.getElementById('orbitContainer').style.opacity = '1';
  document.getElementById('entryContainer').style.opacity = '1';
}

// ── 별 그리기 함수 ──
function drawStar(star) {
  if (star.opacity <= 0) return;
  ctx.globalAlpha = star.opacity;

  if (star.isCross) {
    // 십자가 모양 큰 별
    const s = star.size;
    ctx.fillStyle = star.color;
    ctx.fillRect(star.x - s / 2, star.y - 0.5, s, 1);
    ctx.fillRect(star.x - 0.5, star.y - s / 2, 1, s);
    // 중심 glow
    ctx.beginPath();
    ctx.arc(star.x, star.y, s * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = star.color;
    ctx.fill();
  } else {
    // 일반 원형 별
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = star.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── 중앙 glow 그리기 ──
function drawCenterGlow(intensity) {
  if (intensity <= 0) return;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200 * intensity);
  grad.addColorStop(0, `rgba(240,192,64,${0.3 * intensity})`);
  grad.addColorStop(0.5, `rgba(180,140,255,${0.1 * intensity})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── 메인 애니메이션 루프 ──
function animate(now) {
  elapsed = now - startTime;
  ctx.fillStyle = '#030308';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  if (isFirstVisit) {
    // ── Step 1: 별 탄생 (0~3초) ──
    if (phase === 'birth') {
      stars.forEach(s => {
        if (elapsed >= s.birthDelay && !s.born) {
          s.born = true;
        }
        if (s.born && s.opacity < s.maxOpacity) {
          s.opacity = Math.min(s.maxOpacity, s.opacity + 0.015);
        }
        // 반짝임
        s.twinklePhase += s.twinkleSpeed;
        if (s.born) {
          s.opacity = s.maxOpacity * (0.6 + 0.4 * Math.sin(s.twinklePhase));
        }
      });

      if (elapsed >= 3000) {
        phase = 'gather';
        // gather 시작 시 각 별의 원형 목표 좌표 계산 (중앙 반지름 80px 원 위)
        const radius = 80;
        stars.forEach((s, i) => {
          const a = (i / STAR_COUNT) * Math.PI * 2;
          s.gatherX = cx + Math.cos(a) * radius;
          s.gatherY = cy + Math.sin(a) * radius;
        });
      }
    }

    // ── Step 2: 중앙으로 원형 모임 (3~7초, 4초간) ──
    if (phase === 'gather') {
      const gatherProgress = Math.min(1, (elapsed - 3000) / 4000);
      // ease-in: 처음 느리게 → 점점 빨라짐
      const eased = gatherProgress * gatherProgress;
      centerGlow = eased;

      stars.forEach(s => {
        // 원형 목표 좌표를 향해 소용돌이치며 이동
        const dx = s.gatherX - s.x;
        const dy = s.gatherY - s.y;
        const angle = Math.atan2(dy, dx);
        const dist = Math.sqrt(dx * dx + dy * dy);

        // 소용돌이 회전 + 원형 목표로 수렴
        const spiralStrength = 0.5 + eased * 0.3;
        const moveSpeed = 0.015 + eased * 0.035;
        s.x += Math.cos(angle + spiralStrength) * dist * moveSpeed;
        s.y += Math.sin(angle + spiralStrength) * dist * moveSpeed;

        // 반짝임
        s.twinklePhase += s.twinkleSpeed;
        s.opacity = s.maxOpacity * (0.7 + 0.3 * Math.sin(s.twinklePhase));
      });

      if (elapsed >= 7000) {
        phase = 'explode';
        // 플래시 효과
        const flash = document.getElementById('flash');
        flash.style.transition = 'opacity 0.15s';
        flash.style.opacity = '0.8';
        setTimeout(() => { flash.style.transition = 'opacity 0.4s'; flash.style.opacity = '0'; }, 150);
      }
    }

    // ── Step 3: 폭발 (7~8초) ──
    if (phase === 'explode') {
      const explodeProgress = Math.min(1, (elapsed - 7000) / 1000);
      centerGlow = Math.max(0, 1 - explodeProgress * 2);

      stars.forEach(s => {
        const dx = s.originX - s.x;
        const dy = s.originY - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 2) {
          // 원래 위치로 이동 (처음 빠르게 → 감속)
          const speed = Math.max(1, dist * 0.08);
          const angle = Math.atan2(dy, dx);
          s.x += Math.cos(angle) * speed;
          s.y += Math.sin(angle) * speed;
        } else {
          s.x = s.originX;
          s.y = s.originY;
        }

        s.twinklePhase += s.twinkleSpeed;
        s.opacity = s.maxOpacity * (0.6 + 0.4 * Math.sin(s.twinklePhase));
      });

      // 로고 + 성궤번호 페이드인 (7.3초부터)
      if (elapsed >= 7300) {
        document.getElementById('logoContainer').style.opacity = '1';
        document.getElementById('orbitContainer').style.opacity = '1';
      }

      if (elapsed >= 8000) {
        phase = 'idle';
        // 입장 버튼 표시
        document.getElementById('entryContainer').style.opacity = '1';
      }
    }

    // ── Step 4: 대기 (5초~) ──
    if (phase === 'idle') {
      stars.forEach(s => {
        s.twinklePhase += s.twinkleSpeed;
        s.opacity = s.maxOpacity * (0.5 + 0.5 * Math.sin(s.twinklePhase));
        // 원래 위치로 부드럽게 정착
        s.x += (s.originX - s.x) * 0.05;
        s.y += (s.originY - s.y) * 0.05;
      });
    }
  } else {
    // 재방문: 반짝임만
    stars.forEach(s => {
      s.twinklePhase += s.twinkleSpeed;
      s.opacity = s.maxOpacity * (0.5 + 0.5 * Math.sin(s.twinklePhase));
    });
  }

  // ── 별 그리기 ──
  stars.forEach(drawStar);

  // ── 중앙 glow ──
  drawCenterGlow(centerGlow);

  // ── 유성 업데이트 ──
  meteors.forEach(m => {
    if (m.alive) { m.update(); m.draw(); }
  });

  // 유성 재생성 (idle 상태에서 10초마다)
  if (phase === 'idle' && Math.random() < 0.001) {
    const m = new Meteor();
    meteors.push(m);
  }

  requestAnimationFrame(animate);
}

// 시작
requestAnimationFrame(animate);
</script>
</body>
</html>
